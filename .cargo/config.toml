[env]
# Match sherpa-onnx's prebuilt Windows libraries, which are compiled with the
# static MSVC runtime (`/MT`). This keeps llama.cpp from linking with `/MD`.
LLAMA_STATIC_CRT = "1"
# `llama-cpp-sys-2` also builds wrapper sources with `cc::Build`, outside the
# CMake path. These target-specific flags keep that path on the static CRT too.
CFLAGS_x86_64_pc_windows_msvc = "/MT /FS"
CXXFLAGS_x86_64_pc_windows_msvc = "/MT /FS"
