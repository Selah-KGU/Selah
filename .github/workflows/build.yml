name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Read version (shared) ─────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  # ── macOS (universal) ─────────────────────────────────────────────────────
  build-macos:
    needs: prepare
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing release if tag occupied
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" -eq "$RELEASE_ID" ] 2>/dev/null; then
            echo "Deleting existing release ${TAG} (id=${RELEASE_ID})"
            gh api -X DELETE "repos/${{ github.repository }}/releases/${RELEASE_ID}"
          fi
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Deleting existing tag ${TAG}"
            git push origin --delete "${TAG}" || true
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (universal, signed + notarized)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Temporary keychain password (any random string works)
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          args: --target universal-apple-darwin --config '{"bundle":{"macOS":{"entitlements":"Entitlements.DeveloperID.plist"},"targets":["dmg","app"]}}'
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Selah ${{ needs.prepare.outputs.tag }}"
          releaseBody: "See the assets for installers."
          releaseDraft: true
          prerelease: false

  # ── Windows (x64) ─────────────────────────────────────────────────────────
  build-windows:
    needs: prepare
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Vulkan SDK
        run: choco install vulkan-sdk -y
        shell: pwsh

      - name: Set VULKAN_SDK env
        run: |
          $candidates = @("C:\VulkanSDK", "C:\Program Files\VulkanSDK", "C:\Program Files (x86)\VulkanSDK")
          $sdk = $null
          foreach ($base in $candidates) {
            if (Test-Path $base) {
              $sub = Get-ChildItem $base -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1
              if ($sub) { $sdk = $sub.FullName } else { $sdk = $base }
              break
            }
          }
          if (-not $sdk) {
            $found = Get-ChildItem "C:\", "C:\Program Files", "C:\Program Files (x86)" -Filter "VulkanSDK" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $sdk = $found.FullName }
          }
          if (-not $sdk) { Write-Error "VulkanSDK not found"; exit 1 }
          Write-Host "VULKAN_SDK=$sdk"
          echo "VULKAN_SDK=$sdk" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Selah ${{ needs.prepare.outputs.tag }}"
          releaseBody: "See the assets for installers."
          releaseDraft: true
          prerelease: false
