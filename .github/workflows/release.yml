name: Release

on:
  workflow_dispatch:
    inputs:
      major_minor:
        description: "主版本号.副版本号 (例 1.0)。留空则使用 package.json 当前的 major.minor。"
        required: false
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versions.outputs.version }}
      tag: ${{ steps.versions.outputs.tag }}
      notes: ${{ steps.notes.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute release version
        id: versions
        shell: bash
        env:
          MAJOR_MINOR: ${{ inputs.major_minor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${MAJOR_MINOR}" ]; then
            VERSION_JSON=$(node scripts/resolve-release-version.mjs --base "${MAJOR_MINOR}" --github --json)
          else
            VERSION_JSON=$(node scripts/resolve-release-version.mjs --github --json)
          fi
          VERSION=$(node -e 'const data = JSON.parse(process.argv[1]); console.log(data.version)' "$VERSION_JSON")
          TAG=$(node -e 'const data = JSON.parse(process.argv[1]); console.log(data.tag)' "$VERSION_JSON")
          REASON=$(node -e 'const data = JSON.parse(process.argv[1]); console.log(data.reason)' "$VERSION_JSON")
          DATE_FLOOR=$(node -e 'const data = JSON.parse(process.argv[1]); console.log(data.dateFloor)' "$VERSION_JSON")
          echo "Computed version: ${VERSION} (${REASON}, date floor ${DATE_FLOOR})"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          TAG: ${{ steps.versions.outputs.tag }}
        run: |
          set -euo pipefail
          PREV=$(git tag -l 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -n1 || true)
          if [ -n "${PREV}" ]; then
            LOG=$(git log "${PREV}..HEAD" --no-merges --pretty=format:'- %s (%h)' || true)
            HEADER="## Changes since ${PREV}"
          else
            LOG=$(git log --no-merges --pretty=format:'- %s (%h)' || true)
            HEADER="## Commit history"
          fi
          if [ -z "${LOG}" ]; then
            LOG="- (no new commits)"
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "${HEADER}"
            echo ""
            echo "${LOG}"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  release-macos:
    needs: prepare
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Apply release version
        run: node scripts/apply-version.mjs ${{ needs.prepare.outputs.version }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build sherpa-onnx universal shared runtime
        run: |
          ./scripts/build-macos-sherpa-runtime.sh \
            --lib-dir /tmp/sherpa-universal-lib \
            --framework-dir "$PWD/src-tauri/macos-runtime"

      - name: Verify updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required to publish updater artifacts."
            exit 1
          fi

      - name: Build and publish macOS release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          SHERPA_ONNX_LIB_DIR: /tmp/sherpa-universal-lib
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Selah ${{ needs.prepare.outputs.tag }}"
          releaseBody: ${{ needs.prepare.outputs.notes }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target universal-apple-darwin --features stt-shared,self-updater --config '{"bundle":{"createUpdaterArtifacts":true,"macOS":{"entitlements":"Entitlements.DeveloperID.plist","frameworks":["macos-runtime/libsherpa-onnx-c-api.dylib","macos-runtime/libonnxruntime.1.24.4.dylib"]},"targets":["dmg","app"]}}' -- --no-default-features

      - name: Verify macOS updater artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f "src-tauri/target/universal-apple-darwin/release/bundle/macos/Selah.app.tar.gz"
          test -f "src-tauri/target/universal-apple-darwin/release/bundle/macos/Selah.app.tar.gz.sig"
          test -f "latest.json"
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const feed = JSON.parse(fs.readFileSync("latest.json", "utf8"));
          const required = ["darwin-aarch64", "darwin-x86_64", "darwin-aarch64-app", "darwin-x86_64-app"];
          for (const key of required) {
            const item = feed.platforms?.[key];
            if (!item?.url || !item?.signature) {
              throw new Error(`latest.json missing ${key} url/signature`);
            }
          }
          NODE

  release-windows:
    needs: [prepare, release-macos]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          path: s

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: s/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Apply release version
        working-directory: s
        run: node scripts/apply-version.mjs ${{ needs.prepare.outputs.version }}

      - name: Install Vulkan SDK
        run: choco install vulkan-sdk -y
        shell: pwsh

      - name: Set VULKAN_SDK env
        run: |
          $candidates = @("C:\VulkanSDK", "C:\Program Files\VulkanSDK", "C:\Program Files (x86)\VulkanSDK")
          $sdk = $null
          foreach ($base in $candidates) {
            if (Test-Path $base) {
              $sub = Get-ChildItem $base -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1
              if ($sub) { $sdk = $sub.FullName } else { $sdk = $base }
              break
            }
          }
          if (-not $sdk) {
            $found = Get-ChildItem "C:\", "C:\Program Files", "C:\Program Files (x86)" -Filter "VulkanSDK" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $sdk = $found.FullName }
          }
          if (-not $sdk) { Write-Error "VulkanSDK not found"; exit 1 }
          Write-Host "VULKAN_SDK=$sdk"
          echo "VULKAN_SDK=$sdk" >> $env:GITHUB_ENV
          if (Test-Path "$sdk\Bin") { echo "$sdk\Bin" >> $env:GITHUB_PATH }
        shell: pwsh

      - name: Install frontend dependencies
        run: npm ci
        working-directory: s

      - name: Shorten temp paths
        run: |
          New-Item -ItemType Directory -Force -Path "D:\tmp" | Out-Null
          echo "TMP=D:\tmp" >> $env:GITHUB_ENV
          echo "TEMP=D:\tmp" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Clean cached llama-cpp build artifacts
        run: |
          if (Test-Path "s/src-tauri/target") {
            Get-ChildItem "s/src-tauri/target" -Recurse -Directory -Filter "llama-cpp-sys-2-*" -ErrorAction SilentlyContinue |
              ForEach-Object { Remove-Item $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }
          }
          if (Test-Path "D:\t") {
            Remove-Item "D:\t" -Recurse -Force -ErrorAction SilentlyContinue
          }
        shell: pwsh

      - name: Cargo clean (Windows)
        run: |
          $env:CARGO_TARGET_DIR = "D:\t"
          cargo clean --manifest-path s/src-tauri/Cargo.toml
        shell: pwsh

      - name: Probe Vulkan and MSVC toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "VULKAN_SDK=$env:VULKAN_SDK"
          Write-Host "PATH=$env:Path"
          & where.exe glslc 2>&1 | Out-Host
          & glslc --version 2>&1 | Out-Host
          & where.exe cl 2>&1 | Out-Host
          & where.exe msbuild 2>&1 | Out-Host
          & msbuild -version 2>&1 | Out-Host
          exit 0

      - name: Fetch Cargo dependencies
        working-directory: s/src-tauri
        run: cargo fetch --target x86_64-pc-windows-msvc
        shell: pwsh

      - name: Patch llama.cpp to bypass vulkan-shaders-gen ExternalProject
        shell: pwsh
        run: |
          $registryCacheRoot = "$env:USERPROFILE\.cargo\registry\cache"
          $registrySrcRoot   = "$env:USERPROFILE\.cargo\registry\src"

          $cacheIdx = Get-ChildItem $registryCacheRoot -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cacheIdx) { Write-Error "No registry cache index directory found"; exit 1 }

          $srcIdxPath = Join-Path $registrySrcRoot $cacheIdx.Name
          New-Item -ItemType Directory -Path $srcIdxPath -Force | Out-Null

          $crateDir = Get-ChildItem $srcIdxPath -Directory -Filter "llama-cpp-sys-2-*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $crateDir) {
            $crateFile = Get-ChildItem $cacheIdx.FullName -Filter "llama-cpp-sys-2-*.crate" | Select-Object -First 1
            if (-not $crateFile) { Write-Error "llama-cpp-sys-2 crate not found in cache"; exit 1 }
            Write-Host "Unpacking $($crateFile.FullName) -> $srcIdxPath"
            tar -xzf $crateFile.FullName -C $srcIdxPath
            $crateDir = Get-ChildItem $srcIdxPath -Directory -Filter "llama-cpp-sys-2-*" | Select-Object -First 1
            if (-not $crateDir) { Write-Error "Unpack did not produce a crate directory"; exit 1 }
            New-Item -ItemType File -Path (Join-Path $crateDir.FullName ".cargo-ok") -Force | Out-Null
          }
          Write-Host "Patching $($crateDir.FullName)"

          $cmakeFile = Join-Path $crateDir.FullName "llama.cpp\ggml\src\ggml-vulkan\CMakeLists.txt"
          if (-not (Test-Path $cmakeFile)) { Write-Error "CMakeLists.txt not found at $cmakeFile"; exit 1 }

          $lines = [System.IO.File]::ReadAllLines($cmakeFile)

          if (($lines -join "`n") -match 'CI patch: use add_subdirectory') {
            Write-Host "Patch already applied, skipping"
            exit 0
          }

          $startIdx = -1; $addStart = -1; $endIdx = -1
          for ($i = 0; $i -lt $lines.Length; $i++) {
            if ($startIdx -lt 0 -and $lines[$i] -match '^\s*include\(ExternalProject\)\s*$') { $startIdx = $i; continue }
            if ($startIdx -ge 0 -and $addStart -lt 0 -and $lines[$i] -match '^\s*ExternalProject_Add\(') { $addStart = $i; continue }
            if ($addStart -ge 0 -and $lines[$i] -match '^\s*\)\s*$') { $endIdx = $i; break }
          }
          if ($startIdx -lt 0 -or $addStart -lt 0 -or $endIdx -lt 0) {
            Write-Error "Could not locate ExternalProject block (start=$startIdx add=$addStart end=$endIdx)"
            exit 1
          }

          $replacement = @(
            '    # CI patch: use add_subdirectory instead of ExternalProject_Add to avoid',
            '    # MSBuild parallel scheduling race on vulkan-shaders-gen step stamps.',
            '    foreach(_arg IN LISTS VULKAN_SHADER_GEN_CMAKE_ARGS)',
            '        if(_arg MATCHES "^-D([^=]+)=(.*)$")',
            '            set(${CMAKE_MATCH_1} ${CMAKE_MATCH_2})',
            '        endif()',
            '    endforeach()',
            '    add_subdirectory(vulkan-shaders vulkan-shaders-gen-build)',
            '    set_target_properties(vulkan-shaders-gen PROPERTIES',
            '        RUNTIME_OUTPUT_DIRECTORY "${CMAKE_BINARY_DIR}/$<CONFIG>")'
          )

          $newLines = @()
          if ($startIdx -gt 0) { $newLines += $lines[0..($startIdx-1)] }
          $newLines += $replacement
          if ($endIdx + 1 -le $lines.Length - 1) { $newLines += $lines[($endIdx+1)..($lines.Length-1)] }

          [System.IO.File]::WriteAllLines($cmakeFile, $newLines)
          Write-Host "Patched $cmakeFile (replaced lines $startIdx..$endIdx)"

          $checksumFile = Join-Path $crateDir.FullName ".cargo-checksum.json"
          if (Test-Path $checksumFile) {
            $json = Get-Content $checksumFile -Raw | ConvertFrom-Json -AsHashtable
            $relPath = "llama.cpp/ggml/src/ggml-vulkan/CMakeLists.txt"
            $newHash = (Get-FileHash -Algorithm SHA256 -Path $cmakeFile).Hash.ToLower()
            $json.files[$relPath] = $newHash
            ($json | ConvertTo-Json -Depth 100 -Compress) | Set-Content -Path $checksumFile -NoNewline
            Write-Host "Updated checksum entry: $relPath -> $newHash"
          }

      - name: Build sherpa-onnx DirectML runtime
        shell: pwsh
        working-directory: s
        run: |
          .\scripts\build-windows-directml-runtime.ps1 `
            -WorkRoot "D:\directml-runtime" `
            -LibStageDir "D:\directml-runtime\lib" `
            -RuntimeStageDir "$PWD\src-tauri\windows-runtime"

      - name: Verify updater signing secret
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY is required to publish updater artifacts."
            exit 1
          }

      - name: Build and publish Windows release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUST_BACKTRACE: 1
          CARGO_TARGET_DIR: D:/t
          CARGO_INCREMENTAL: 0
          CARGO_BUILD_JOBS: 1
          CMAKE_BUILD_PARALLEL_LEVEL: 1
          CMAKE_VS_GLOBALS: UseMultiToolTask=false;EnforceProcessCountAcrossBuilds=true;CL_MPCount=1
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          GGML_CCACHE: OFF
          LLAMA_STATIC_CRT: 1
          CL: /FS
          _CL_: /FS
          CFLAGS: /FS
          CXXFLAGS: /FS
          SELAH_ENABLE_STT_DIRECTML: 1
          SHERPA_ONNX_LIB_DIR: D:/directml-runtime/lib
        with:
          projectPath: s
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Selah ${{ needs.prepare.outputs.tag }}"
          releaseBody: ${{ needs.prepare.outputs.notes }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target x86_64-pc-windows-msvc --features stt-shared,self-updater --config '{"bundle":{"createUpdaterArtifacts":true}}' -- --no-default-features

      - name: Verify Windows updater artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $setup = "D:\t\x86_64-pc-windows-msvc\release\bundle\nsis\Selah_${{ needs.prepare.outputs.version }}_x64-setup.exe"
          $sig = "$setup.sig"
          if (-not (Test-Path $setup)) { throw "Missing updater installer: $setup" }
          if (-not (Test-Path $sig)) { throw "Missing updater signature: $sig" }
          if (-not (Test-Path "latest.json")) { throw "Missing latest.json" }
          $feed = Get-Content "latest.json" -Raw | ConvertFrom-Json
          foreach ($key in @("darwin-aarch64", "darwin-x86_64", "windows-x86_64", "windows-x86_64-nsis")) {
            $item = $feed.platforms.PSObject.Properties[$key].Value
            if (-not $item -or [string]::IsNullOrWhiteSpace($item.url) -or [string]::IsNullOrWhiteSpace($item.signature)) {
              throw "latest.json missing $key url/signature"
            }
          }

  verify-updater-release:
    needs: [prepare, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify draft updater feed
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/releases/tags/${TAG}"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "$api" -o release.json
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const names = new Set((release.assets || []).map((asset) => asset.name));
          if (!names.has("latest.json")) throw new Error("Release asset latest.json is missing");
          if (![...names].some((name) => name.endsWith(".app.tar.gz.sig"))) {
            throw new Error("macOS updater signature asset is missing");
          }
          if (![...names].some((name) => name.endsWith("-setup.exe.sig"))) {
            throw new Error("Windows updater signature asset is missing");
          }
          const latest = (release.assets || []).find((asset) => asset.name === "latest.json");
          fs.writeFileSync("latest_asset_url.txt", latest.url);
          NODE
          curl -fsSL \
            -H "Accept: application/octet-stream" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -L "$(cat latest_asset_url.txt)" \
            -o latest.json
          # Reconcile latest.json signatures against the actual .sig artifacts.
          # tauri-action runs macOS and Windows in separate jobs; the Windows job can re-sign
          # the macOS .tar.gz (or produce a mismatched .sig), leaving latest.json stale.
          # This step downloads every .sig artifact, encodes it to base64, and patches
          # latest.json in-place so all platform signatures match the uploaded artifacts.
          # The corrected latest.json is then re-uploaded to the draft release.
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import https from "node:https";

          const token = process.env.GITHUB_TOKEN;
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const feed = JSON.parse(fs.readFileSync("latest.json", "utf8"));

          async function downloadText(asset) {
            return new Promise((resolve, reject) => {
              function get(u, withAuth) {
                const opts = {
                  headers: {
                    "Accept": "application/octet-stream",
                    "User-Agent": "selah-ci",
                    ...(withAuth ? { "Authorization": `Bearer ${token}` } : {}),
                  },
                };
                https.get(u, opts, (res) => {
                  if (res.statusCode === 301 || res.statusCode === 302) { get(res.headers.location, false); return; }
                  let buf = "";
                  res.setEncoding("utf8");
                  res.on("data", (d) => buf += d);
                  res.on("end", () => resolve(buf));
                  res.on("error", reject);
                }).on("error", reject);
              }
              get(asset.url, true);
            });
          }

          // Convert raw minisign sig text to the base64 string tauri-plugin-updater expects.
          function sigToBase64(sigText) {
            return Buffer.from(sigText).toString("base64");
          }

          // Extract raw sig line (second non-empty line) from a base64-encoded sig.
          function rawSigLine(b64) {
            const lines = Buffer.from(b64, "base64").toString("utf8").split("\n").map(l => l.trim()).filter(Boolean);
            return lines[1] ?? "";
          }

          const assets = release.assets || [];

          // Find macOS and Windows .sig assets
          const macSigAsset = assets.find((a) => a.name.endsWith(".app.tar.gz.sig"));
          const winSigAsset = assets.find((a) => a.name.endsWith("-setup.exe.sig"));

          if (!macSigAsset) throw new Error("macOS .app.tar.gz.sig asset not found on release");
          if (!winSigAsset) throw new Error("Windows -setup.exe.sig asset not found on release");

          const macSigText = await downloadText(macSigAsset);
          const winSigText = await downloadText(winSigAsset);
          const macSigB64 = sigToBase64(macSigText);
          const winSigB64 = sigToBase64(winSigText);

          const macPlatforms = ["darwin-aarch64", "darwin-x86_64", "darwin-aarch64-app", "darwin-x86_64-app"];
          const winPlatforms = ["windows-x86_64", "windows-x86_64-nsis"];
          const required = [...macPlatforms, ...winPlatforms];

          let patched = 0;
          for (const key of required) {
            const item = feed.platforms?.[key];
            if (!item?.url || !item?.signature) {
              throw new Error(`latest.json missing ${key} url/signature`);
            }
            const correctB64 = macPlatforms.includes(key) ? macSigB64 : winSigB64;
            if (rawSigLine(item.signature) !== rawSigLine(correctB64)) {
              console.log(`Patching latest.json [${key}]: stale sig → sig from ${macPlatforms.includes(key) ? macSigAsset.name : winSigAsset.name}`);
              item.signature = correctB64;
              patched++;
            }
          }

          if (patched > 0) {
            fs.writeFileSync("latest.json", JSON.stringify(feed, null, 2) + "\n");
            fs.writeFileSync("needs_reupload", "1");
            console.log(`Patched ${patched} platform(s) in latest.json — will re-upload`);
          } else {
            console.log("latest.json signatures already consistent with .sig artifacts — skipping re-upload");
          }
          NODE

          # Re-upload latest.json if it was patched (delete old asset first, then upload)
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import https from "node:https";

          const token = process.env.GITHUB_TOKEN;
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));

          async function apiRequest(method, path, body) {
            return new Promise((resolve, reject) => {
              const data = body ? JSON.stringify(body) : null;
              const req = https.request({
                hostname: "api.github.com",
                path,
                method,
                headers: {
                  "Accept": "application/vnd.github+json",
                  "Authorization": `Bearer ${token}`,
                  "User-Agent": "selah-ci",
                  ...(data ? { "Content-Type": "application/json", "Content-Length": Buffer.byteLength(data) } : {}),
                },
              }, (res) => {
                let buf = "";
                res.on("data", (d) => buf += d);
                res.on("end", () => resolve({ status: res.statusCode, body: buf }));
                res.on("error", reject);
              });
              req.on("error", reject);
              if (data) req.write(data);
              req.end();
            });
          }

          async function uploadAsset(uploadUrl, name, content) {
            const base = uploadUrl.replace(/\{[^}]+\}/, "");
            const url = new URL(base);
            url.searchParams.set("name", name);
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: "POST",
                headers: {
                  "Accept": "application/vnd.github+json",
                  "Authorization": `Bearer ${token}`,
                  "User-Agent": "selah-ci",
                  "Content-Type": "application/octet-stream",
                  "Content-Length": Buffer.byteLength(content),
                },
              }, (res) => {
                let buf = "";
                res.on("data", (d) => buf += d);
                res.on("end", () => resolve({ status: res.statusCode, body: buf }));
                res.on("error", reject);
              });
              req.on("error", reject);
              req.write(content);
              req.end();
            });
          }

          if (!fs.existsSync("needs_reupload")) {
            console.log("No re-upload needed");
            process.exit(0);
          }

          const currentFeed = fs.readFileSync("latest.json", "utf8");
          const latestAsset = (release.assets || []).find((a) => a.name === "latest.json");
          if (!latestAsset) throw new Error("latest.json asset not found on release");

          // Delete old latest.json asset
          const delRes = await apiRequest("DELETE", `/repos/${process.env.GITHUB_REPOSITORY}/releases/assets/${latestAsset.id}`);
          if (delRes.status !== 204) {
            throw new Error(`Failed to delete old latest.json asset: ${delRes.status} ${delRes.body}`);
          }
          console.log("Deleted old latest.json from release");

          // Upload new latest.json
          const upRes = await uploadAsset(release.upload_url, "latest.json", Buffer.from(currentFeed));
          if (upRes.status !== 201) {
            throw new Error(`Failed to upload new latest.json: ${upRes.status} ${upRes.body}`);
          }
          console.log("Re-uploaded latest.json with reconciled signatures");
