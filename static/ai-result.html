<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 選課分析</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f7;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #98989d;
    --border: rgba(0, 0, 0, 0.08);
    --accent: #002855;
    color-scheme: light;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg-primary: #1c1c1e;
      --bg-secondary: #2c2c2e;
      --text-primary: #f5f5f7;
      --text-secondary: #98989d;
      --text-tertiary: #6e6e73;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #4a90d9;
      color-scheme: dark;
    }
  }
  [data-theme="dark"] {
    --bg-primary: #1c1c1e;
    --bg-secondary: #2c2c2e;
    --text-primary: #f5f5f7;
    --text-secondary: #98989d;
    --text-tertiary: #6e6e73;
    --border: rgba(255, 255, 255, 0.08);
    --accent: #4a90d9;
    color-scheme: dark;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 13px;
    line-height: 1.6;
    padding: 24px;
    -webkit-user-select: text;
    user-select: text;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 0.5px solid var(--border);
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
  }
  .header .subtitle {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }
  .refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    border: 0.5px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    transition: all 0.15s ease;
    flex-shrink: 0;
  }
  .refresh-btn:hover { background: var(--border); color: var(--text-primary); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .refresh-btn .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .content { }
  .content h3 { font-size: 14px; font-weight: 600; margin: 16px 0 8px; }
  .content h3:first-child { margin-top: 0; }
  .content h4 { font-size: 13px; font-weight: 600; margin: 12px 0 6px; }
  .content ul { margin: 4px 0 8px 0; padding-left: 18px; }
  .content li { margin: 2px 0; }
  .content strong { font-weight: 600; }

  .error {
    color: #ff3b30;
    padding: 12px;
    border-radius: 8px;
    background: rgba(255, 59, 48, 0.08);
    font-size: 13px;
  }
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    padding: 40px 0;
    color: var(--text-secondary);
    font-size: 13px;
  }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
</style>
</head>
<body>
  <div class="header">
    <div>
      <h1>AI 選課分析</h1>
      <div class="subtitle" id="timestamp"></div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="requestRefresh()">
      <svg id="refreshIcon" width="13" height="13" viewBox="0 0 16 16" fill="none">
        <path d="M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M14 2v4h-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      再分析
    </button>
  </div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <span>結果を読み込み中...</span>
    </div>
  </div>
  <script>
    (function() {
      var t = localStorage.getItem('selah-theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
      }
    })();

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatResult(text) {
      return escapeHtml(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/^# (.+)$/gm, '<h3>$1</h3>')
        .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; })
        .replace(/\n{2,}/g, '<br><br>')
        .replace(/\n/g, '<br>');
    }

    function showResult(result, error) {
      var el = document.getElementById('content');
      var ts = document.getElementById('timestamp');
      ts.textContent = new Date().toLocaleString('ja-JP');
      if (error) {
        el.innerHTML = '<div class="error">' + escapeHtml(error) + '</div>';
      } else if (result) {
        el.innerHTML = '<div class="content">' + formatResult(result) + '</div>';
      }
    }

    function requestRefresh() {
      var btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      document.getElementById('refreshIcon').classList.add('spin');
      document.getElementById('content').innerHTML =
        '<div class="loading"><div class="spinner"></div><span>再分析中...</span></div>';

      // Try invoke first, fallback to emit
      var invoke = window.__TAURI__?.core?.invoke;
      var emit = window.__TAURI__?.event?.emit;
      console.log('[ai-result] requestRefresh: invoke=', !!invoke, 'emit=', !!emit);

      if (invoke) {
        invoke('request_ai_refresh').then(function() {
          console.log('[ai-result] invoke request_ai_refresh succeeded');
        }).catch(function(e) {
          console.error('[ai-result] invoke failed:', e);
          // Fallback: try emit
          if (emit) emit('ai-refresh-request', {});
        });
      } else if (emit) {
        emit('ai-refresh-request', {});
      } else {
        console.error('[ai-result] No Tauri API available');
        finishRefresh();
        showResult('', 'Tauri API が利用できません。アプリを再起動してください。');
      }
    }

    function finishRefresh() {
      var btn = document.getElementById('refreshBtn');
      btn.disabled = false;
      document.getElementById('refreshIcon').classList.remove('spin');
    }

    document.addEventListener('DOMContentLoaded', function() {
      var listen = window.__TAURI__?.event?.listen;
      if (listen) {
        listen('ai-result', function(ev) {
          finishRefresh();
          showResult(ev.payload.result, ev.payload.error);
        });
      }
    });
  </script>
</body>
</html>
