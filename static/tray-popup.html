<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://ipc.localhost; script-src 'self' 'unsafe-inline' https://ipc.localhost; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selah</title>
<style>
  :root {
    --bg-primary: #f2f2f7;
    --bg-popup: rgba(242,242,247,0.92);
    --bg-card: rgba(255,255,255,0.6);
    --bg-hover: rgba(0,0,0,0.04);
    --glass-bg: rgba(255,255,255,0.5);
    --glass-border: rgba(255,255,255,0.5);
    --glass-highlight: inset 0 0.5px 0 rgba(255,255,255,0.8);
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --accent: #002855;
    --blue: #007aff;
    --green: #34c759;
    --orange: #ff9500;
    --red: #ff3b30;
    --purple: #af52de;
    --accent-light: rgba(0, 40, 85, 0.08);
    --border: rgba(0,0,0,0.06);
    --border-strong: rgba(0,0,0,0.12);
    --shadow-card: 0 0.5px 0 rgba(0,0,0,0.04);
    --shadow-glass: 0 2px 16px rgba(0,0,0,0.05), 0 0 0.5px rgba(0,0,0,0.08);
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #000;
      --bg-popup: rgba(28,28,30,0.92);
      --bg-card: rgba(44,44,46,0.5);
      --bg-hover: rgba(255,255,255,0.06);
      --glass-bg: rgba(44,44,46,0.45);
      --glass-border: rgba(255,255,255,0.1);
      --glass-highlight: inset 0 0.5px 0 rgba(255,255,255,0.08);
      --text-primary: #f5f5f7;
      --text-secondary: #98989d;
      --text-tertiary: #636366;
      --accent: #4a90d9;
      --blue: #0a84ff;
      --green: #30d158;
      --orange: #ff9f0a;
      --red: #ff453a;
      --purple: #bf5af2;
      --accent-light: rgba(74, 144, 217, 0.15);
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.12);
      --shadow-card: 0 0.5px 0 rgba(0,0,0,0.25);
      --shadow-glass: 0 2px 16px rgba(0,0,0,0.2), 0 0 0.5px rgba(0,0,0,0.3);
      color-scheme: dark;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
    color: var(--text-primary);
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
    font-size: 13px;
    line-height: 1.4;
  }
  .container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    background: var(--bg-popup);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    backdrop-filter: blur(40px) saturate(200%);
    border-radius: 12px;
    border: 0.5px solid var(--glass-border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0.5px rgba(0,0,0,0.15);
    contain: content;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    /* Initial hidden state - no transition so first paint is instant */
    transform: translate3d(0, -6px, 0) scale3d(0.98, 0.98, 1);
    opacity: 0;
  }
  /* Entrance: slide down + fade in */
  .container.popup-enter {
    will-change: transform, opacity;
    transform: translate3d(0, 0, 0) scale3d(1, 1, 1);
    opacity: 1;
    transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.25, 1),
                opacity 0.16s ease-out;
  }
  /* Exit: slide up + fade out */
  .container.popup-exit {
    will-change: transform, opacity;
    transform: translate3d(0, -4px, 0) scale3d(0.97, 0.97, 1);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.14s cubic-bezier(0.4, 0, 1, 1),
                opacity 0.12s ease-in;
  }
  /* Keep cards visible during container exit to prevent snap-back flash */
  .popup-exit .task {
    opacity: 1;
    transform: none;
    transition: none;
  }

  /* ===== Header ===== */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px 8px;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .brand-logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 0;
  }
  .brand-logo img {
    height: 20px;
    width: auto;
    display: block;
  }
  .header-student {
    font-size: 11px;
    color: var(--text-secondary);
    margin-left: auto;
    max-width: 155px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-variant-numeric: tabular-nums;
  }
  /* ===== Scrollable content ===== */
  .content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: none;
  }
  .content::-webkit-scrollbar { display: none; }

  /* ===== Section ===== */
  .section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .count {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--accent-light);
    padding: 0px 8px;
    border-radius: 12px;
  }
  .count-warn {
    color: var(--orange);
    background: rgba(255, 149, 0, 0.12);
  }

  /* ===== AI Box (matching HomePage ai-notif-box) ===== */
  .ai-box {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 0.5px solid rgba(175, 82, 222, 0.15);
    background: linear-gradient(160deg, var(--bg-card) 0%, color-mix(in srgb, var(--bg-card) 96%, rgba(175, 82, 222, 0.08)) 100%);
  }
  .ai-header {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ai-badge {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: linear-gradient(135deg, #c480e8, #6bacf0);
    border-radius: 50px;
    padding: 2px 7px 2px 5px;
  }
  .ai-badge svg { flex-shrink: 0; }
  .ai-badge-text {
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .ai-suggestions-row {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .ai-sep { color: var(--text-tertiary); font-size: 9px; }
  .ai-suggestion {
    font-size: 10px;
    font-weight: 500;
    background: linear-gradient(135deg, rgba(175,82,222,0.85), rgba(0,122,255,0.85));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ai-summary {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .ai-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .ai-tag {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 3px 8px;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(175,82,222,0.08), rgba(0,122,255,0.08));
    border: 0.5px solid rgba(175,82,222,0.18);
    transition: background 0.15s, border-color 0.15s;
  }
  .ai-tag[data-clickable] {
    cursor: pointer;
  }
  .ai-tag[data-clickable]:hover {
    background: linear-gradient(135deg, rgba(175,82,222,0.15), rgba(0,122,255,0.15));
    border-color: rgba(175,82,222,0.35);
  }
  .ai-tag-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ai-tag-reason {
    font-size: 9px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  /* ===== Hero card (NOW / NEXT) ===== */
  .hero-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid var(--glass-border);
    background: var(--bg-card);
    box-shadow: var(--glass-highlight), var(--shadow-card);
  }
  .hero-card.hero-live {
    border-color: color-mix(in srgb, var(--green) 30%, var(--glass-border));
    background: color-mix(in srgb, var(--green) 5%, var(--bg-card));
  }
  .hero-card.hero-next {
    border-color: color-mix(in srgb, var(--blue) 25%, var(--glass-border));
    background: color-mix(in srgb, var(--blue) 5%, var(--bg-card));
  }
  .hero-tag {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.5px;
    padding: 1px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .hero-live .hero-tag { background: var(--green); color: #fff; }
  .hero-next .hero-tag { background: var(--blue); color: #fff; }
  .hero-info { flex: 1; min-width: 0; }
  .hero-course {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }
  .hero-meta {
    font-size: 10px;
    color: var(--text-secondary);
    display: block;
  }
  .hero-status {
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .hero-live .hero-status { color: var(--green); }
  .hero-next .hero-status { color: var(--blue); }

  /* ===== Class list ===== */
  .class-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .class-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 8px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
  }
  .class-row.cancelled { opacity: 0.4; }
  .class-period {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-secondary);
    min-width: 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .class-name {
    flex: 1;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .class-row.cancelled .class-name { text-decoration: line-through; }
  .class-room {
    font-size: 9px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .class-time {
    font-size: 9px;
    color: var(--text-tertiary);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .class-badge-cancel {
    font-size: 8px;
    font-weight: 700;
    color: var(--red);
    background: color-mix(in srgb, var(--red) 10%, transparent);
    padding: 1px 4px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ===== Next day ===== */
  .next-day {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 8px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    font-size: 11px;
    color: var(--text-secondary);
  }
  .next-day-label {
    font-weight: 700;
    color: var(--text-primary);
  }

  /* ===== Todo ===== */
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .task {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    height: 48px;
    min-height: 48px;
    max-height: 48px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    transition: background 0.15s ease, border-color 0.15s ease;
    position: relative;
    overflow: hidden;
    /* Defer card animation until popup entrance completes */
    opacity: 0;
    transform: translate3d(0, 6px, 0);
  }
  .popup-enter .task {
    opacity: 1;
    transform: translate3d(0, 0, 0);
    transition: background 0.15s ease, border-color 0.15s ease,
                opacity 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) calc(0.15s + var(--delay, 0s)),
                transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) calc(0.15s + var(--delay, 0s));
  }
  .task[data-url] {
    cursor: pointer;
  }
  .task:hover {
    background: var(--bg-hover);
  }

  .urgency-bar {
    width: 4px;
    align-self: stretch;
    border-radius: 2px;
    background: var(--accent-light);
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
    margin: 1px 0;
  }
  .urgency-fill {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: height 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .urgency-bar.overdue .urgency-fill { background: var(--red); }
  .urgency-bar.overdue { background: rgba(255, 59, 48, 0.15); }
  .urgency-bar.critical .urgency-fill {
    background: var(--orange);
    animation: bar-pulse 2s ease-in-out infinite;
  }
  .urgency-bar.critical { background: rgba(255, 149, 0, 0.15); }
  .urgency-bar.soon .urgency-fill { background: #e6b800; }
  .urgency-bar.soon { background: rgba(245, 197, 66, 0.15); }

  @keyframes bar-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .task-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    overflow: hidden;
  }
  .task-name {
    font-size: 11px;
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    line-clamp: 1;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .task-sub {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-course,
  .task-type,
  .task-date {
    font-size: 9px;
    color: var(--text-tertiary);
    white-space: nowrap;
  }
  .task-course {
    max-width: 120px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-sep {
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--text-tertiary);
    opacity: 0.5;
  }
  .task-feedback {
    margin-top: 0;
    font-size: 9px;
    color: var(--text-tertiary);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: none;
  }

  .remaining {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 6px;
    background: var(--accent-light);
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .remaining.overdue {
    background: rgba(255, 59, 48, 0.1);
    color: var(--red);
  }
  .remaining.critical {
    background: rgba(255, 149, 0, 0.12);
    color: var(--orange);
  }
  .remaining.soon {
    background: rgba(245, 197, 66, 0.12);
    color: #b8900a;
  }
  .task-arrow {
    flex-shrink: 0;
    color: var(--text-tertiary);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .task:hover .task-arrow {
    opacity: 0.65;
    transform: translateX(0);
  }

  /* ===== Empty state ===== */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 28px 0;
    color: var(--text-tertiary);
  }
  .empty-greeting {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .empty-sub {
    font-size: 12px;
  }

  /* ===== Footer ===== */
  .footer {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px 10px;
    border-top: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .footer-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 5px 0;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, opacity 0.12s, border-color 0.12s;
  }
  .footer-btn.primary {
    background: var(--accent);
    color: #fff;
  }
  .footer-btn.primary:hover { opacity: 0.85; }
  .footer-btn.secondary {
    background: var(--bg-card);
    color: var(--text-secondary);
    border: 0.5px solid var(--border);
  }
  .footer-btn.secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
  .footer-btn.quit {
    background: none;
    color: var(--red);
    flex: 0 0 auto;
    padding: 5px 8px;
    border: 0.5px solid transparent;
  }
  .footer-btn.quit:hover { background: color-mix(in srgb, var(--red) 8%, transparent); }

  /* Accessibility: skip animations for users who prefer reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .container { transform: none; opacity: 1; }
    .container.popup-enter,
    .container.popup-exit { transition: none; will-change: auto; }
    .task { opacity: 1; transform: none; }
    .popup-enter .task {
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    @keyframes bar-pulse { 0%, 100% { opacity: 1; } }
  }
</style>
</head>

<div class="container">
  <!-- Header -->
  <div class="header">
    <span class="brand-logo" aria-label="Selah" id="brand-logo"><img id="brand-logo-img" alt="Selah"></span>
    <span class="header-student" id="student-meta">未ログイン</span>
  </div>

  <!-- Scrollable Content -->
  <div class="content" id="content"></div>

  <!-- Footer -->
  <div class="footer">
    <button class="footer-btn primary" id="btn-open">Selah を開く</button>
    <button class="footer-btn quit" id="btn-quit">終了</button>
  </div>
</div>

<script>
const { invoke } = window.__TAURI__.core;
const { getCurrentWindow } = window.__TAURI__.window;
const container = document.querySelector('.container');
let isClosing = false;

// ---- Entrance animation ----
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (prefersReducedMotion) {
  container.classList.add('popup-enter');
} else {
  // Double-rAF ensures the browser has painted the initial hidden frame
  // before we add the transition class, guaranteeing the animation runs.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      container.classList.add('popup-enter');
      container.addEventListener('transitionend', function onDone(e) {
        if (e.target === container && e.propertyName === 'transform') {
          container.removeEventListener('transitionend', onDone);
          container.style.willChange = 'auto';
        }
      });
    });
  });
}

// ---- Exit animation ----
function closePopup() {
  if (isClosing) return;
  isClosing = true;
  let closed = false;
  const doClose = () => {
    if (closed) return;
    closed = true;
    getCurrentWindow().close().catch(() => {});
  };
  if (prefersReducedMotion) { doClose(); return; }
  container.classList.remove('popup-enter');
  container.classList.add('popup-exit');
  container.addEventListener('transitionend', function onDone(e) {
    if (e.target === container && e.propertyName === 'transform') {
      container.removeEventListener('transitionend', onDone);
      doClose();
    }
  });
  setTimeout(doClose, 180);
}

const PERIOD_TIMES = {
  1: { start: "9:00",  end: "10:30", sh: 9, sm: 0,  eh: 10, em: 30 },
  2: { start: "11:00", end: "12:30", sh: 11, sm: 0,  eh: 12, em: 30 },
  3: { start: "13:30", end: "15:00", sh: 13, sm: 30, eh: 15, em: 0 },
  4: { start: "15:10", end: "16:40", sh: 15, sm: 10, eh: 16, em: 40 },
  5: { start: "16:50", end: "18:20", sh: 16, sm: 50, eh: 18, em: 20 },
  6: { start: "18:30", end: "20:00", sh: 18, sm: 30, eh: 20, em: 0 },
  7: { start: "20:10", end: "21:40", sh: 20, sm: 10, eh: 21, em: 40 },
};
const DAY_MAP = { 1: "月", 2: "火", 3: "水", 4: "木", 5: "金", 6: "土" };
const DAY_LABELS = ["日","月","火","水","木","金","土"];

function jsDayToUnified(d) { return d === 0 ? 7 : d; }

function readAiCache() {
  try {
    const raw = localStorage.getItem("ai-notif-cache");
    if (!raw) return null;
    const p = JSON.parse(raw);
    if (!p || !p.result) return null;
    return { ...p.result, _sources: Array.isArray(p.sources) ? p.sources : [] };
  } catch { return null; }
}

async function openAiNotif(idx) {
  const sources = window._aiSources || [];
  const n = sources[idx];
  if (!n) { try { await invoke("show_main_window"); } catch(e) {} return; }
  try {
    if (n.source === "luna" && n.url) {
      await invoke("luna_open_detail_window", { path: n.url, title: n.title });
    } else if (n.source === "kwic" && n.kwicId) {
      await invoke("kwic_open_detail_window", {
        title: n.title,
        informationId: n.kwicId,
        informationType: n.informationType || "",
        personCategoryCd: n.personCategoryCd || "",
        categoryCd: n.categoryCd || "",
      });
    } else {
      await invoke("show_main_window");
    }
  } catch(e) {
    console.error("Failed to open AI notif source:", e);
  }
}

function updateStudentMeta(data) {
  const sid = String(data?.student_id || "").trim();
  const name = String(data?.student_name || "").trim();
  const el = document.getElementById("student-meta");
  if (!el) return;
  if (sid && name) {
    el.textContent = `${sid} ${name}`;
    return;
  }
  if (sid) {
    el.textContent = sid;
    return;
  }
  if (name) {
    el.textContent = name;
    return;
  }
  el.textContent = "未ログイン";
}

function esc(s) {
  const el = document.createElement("span");
  el.textContent = s || "";
  return el.innerHTML;
}

function escAttr(s) {
  return esc(s).replace(/"/g, "&quot;");
}

function parseDeadlineMs(deadline) {
  if (!deadline) return Infinity;
  return new Date(String(deadline).replace(/\//g, "-")).getTime();
}

function todoUrgency(deadline, nowTs) {
  if (!deadline) return "normal";
  const diff = parseDeadlineMs(deadline) - nowTs;
  if (diff <= 0) return "overdue";
  if (diff < 1 * 86400000) return "critical";
  if (diff <= 4 * 86400000) return "soon";
  return "normal";
}

function todoUrgencyPct(deadline, nowTs) {
  if (!deadline) return 0;
  const diff = parseDeadlineMs(deadline) - nowTs;
  if (diff <= 0) return 1;
  const horizon = 7 * 86400000;
  if (diff >= horizon) return 0;
  return 1 - diff / horizon;
}

async function openTodoDetail(url, title) {
  if (!url) return;
  try {
    await invoke("luna_open_detail_window", { path: url, title });
  } catch (e) {
    console.error("Failed to open todo detail:", e);
  }
}

function todoRemaining(deadline, nowTs) {
  if (!deadline) return "";
  const diff = parseDeadlineMs(deadline) - nowTs;
  if (diff <= 0) {
    const elapsed = -diff;
    if (elapsed < 3600000) return `${Math.floor(elapsed / 60000)}分超過`;
    if (elapsed < 86400000) return `${Math.floor(elapsed / 3600000)}時間超過`;
    return `${Math.floor(elapsed / 86400000)}日超過`;
  }
  if (diff < 3600000) return `残り${Math.ceil(diff / 60000)}分`;
  if (diff < 86400000) return `残り${Math.floor(diff / 3600000)}時間`;
  return `残り${Math.floor(diff / 86400000)}日`;
}

async function loadAndRender() {
  let data;
  try {
    data = await invoke("get_tray_popup_data");
    updateStudentMeta(data);
  } catch {
    updateStudentMeta(null);
    document.getElementById("content").innerHTML =
      '<div class="empty-state"><span class="empty-sub">データ取得に失敗しました</span></div>';
    return;
  }

  const now = new Date();
  const nowTs = now.getTime();
  const todayUnified = jsDayToUnified(now.getDay());
  const todayLabel = DAY_MAP[todayUnified] || "";
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const html = [];

  // ---- AI Summary ----
  const ai = readAiCache();
  if (ai && (ai.summary || ai.important?.length || ai.suggestions?.length)) {
    window._aiSources = ai._sources || [];
    html.push('<div class="section">');  
    html.push('<div class="ai-box">');
    // header row
    html.push('<div class="ai-header">');
    html.push('<span class="ai-badge"><svg width="10" height="10" viewBox="0 0 20 20" fill="none" stroke-width="1.3"><path d="M10 2l2 4.5L16.5 8l-4.5 2L10 14.5 8 10 3.5 8l4.5-2z" stroke="#fff" stroke-linejoin="round"/><path d="M15 13l1 2.2L18.2 16l-2.2 1L15 19.2 14 17l-2.2-1L14 15z" stroke="#fff" stroke-linejoin="round" stroke-width="1"/></svg><span class="ai-badge-text">AI</span></span>');
    if (Array.isArray(ai.suggestions) && ai.suggestions.length > 0) {
      html.push('<span class="ai-suggestions-row">');
      for (let i = 0; i < Math.min(ai.suggestions.length, 2); i++) {
        if (i > 0) html.push('<span class="ai-sep">&middot;</span>');
        html.push(`<span class="ai-suggestion">${esc(ai.suggestions[i])}</span>`);
      }
      html.push('</span>');
    }
    html.push('</div>');
    // summary
    if (ai.summary) {
      html.push(`<div class="ai-summary">${esc(ai.summary)}</div>`);
    }
    // important tags
    if (Array.isArray(ai.important) && ai.important.length > 0) {
      html.push('<div class="ai-tags">');
      for (const it of ai.important.slice(0, 4)) {
        const src = (ai._sources || [])[it.index];
        const clickable = src && (src.url || src.kwicId);
        const clickAttr = clickable ? ` data-clickable="1" data-idx="${Number(it.index)}"` : "";
        html.push(`<span class="ai-tag"${clickAttr}><span class="ai-tag-title">${esc(it.title || "")}</span><span class="ai-tag-reason">${esc(it.reason || "")}</span></span>`);
      }
      html.push('</div>');
    }
    html.push('</div>');
    html.push('</div>');
  }

  // ---- Today's classes ----
  const entries = data.entries || [];
  const todayClasses = entries
    .filter(e => e.day === todayLabel && !e.is_cancelled)
    .sort((a, b) => a.period - b.period);
  const todayCancelled = entries
    .filter(e => e.day === todayLabel && e.is_cancelled)
    .sort((a, b) => a.period - b.period);

  // Separate hero (NOW / NEXT) from the rest
  const heroItems = [];
  const restClasses = [];
  for (const cls of todayClasses) {
    const pt = PERIOD_TIMES[cls.period];
    if (!pt) continue;
    const startMin = pt.sh * 60 + pt.sm;
    const endMin = pt.eh * 60 + pt.em;
    const isLive = nowMin >= startMin && nowMin < endMin;
    const isNext = !isLive && nowMin < startMin;
    const isPast = nowMin >= endMin;
    if (isLive || (isNext && heroItems.length < 2 && !heroItems.some(h => h.isLive === false))) {
      heroItems.push({ cls, pt, isLive, startMin, endMin });
    } else if (!isPast || heroItems.length === 0) {
      restClasses.push({ cls, pt, startMin, endMin, isPast });
    } else {
      restClasses.push({ cls, pt, startMin, endMin, isPast });
    }
  }

  // Hero cards
  if (heroItems.length > 0) {
    html.push('<div class="section">');
    for (const h of heroItems) {
      const tag = h.isLive ? "NOW" : "NEXT";
      const cls = h.isLive ? "hero-live" : "hero-next";
      let status = "";
      if (h.isLive) {
        status = `残${h.endMin - nowMin}分`;
      } else {
        const diff = h.startMin - nowMin;
        status = diff <= 60 ? `${diff}分後` : h.pt.start;
      }
      const room = h.cls.room ? ` / ${h.cls.room}` : "";
      html.push(`<div class="hero-card ${cls}">
        <span class="hero-tag">${tag}</span>
        <div class="hero-info">
          <span class="hero-course">${esc(h.cls.course_name)}</span>
          <span class="hero-meta">${h.pt.start} - ${h.pt.end}${esc(room)}</span>
        </div>
        <span class="hero-status">${status}</span>
      </div>`);
    }
    html.push('</div>');
  }

  // Remaining classes today
  const otherActive = restClasses.filter(c => !c.isPast);
  if (otherActive.length > 0 || todayCancelled.length > 0) {
    html.push('<div class="section">');
    html.push(`<span class="section-label">今日の授業</span>`);
    html.push('<div class="class-list">');
    for (const c of otherActive) {
      const room = c.cls.room ? `<span class="class-room">${esc(c.cls.room)}</span>` : "";
      html.push(`<div class="class-row">
        <span class="class-period">${c.cls.period}</span>
        <span class="class-name">${esc(c.cls.course_name)}</span>
        ${room}
        <span class="class-time">${c.pt.start}</span>
      </div>`);
    }
    for (const cls of todayCancelled) {
      html.push(`<div class="class-row cancelled">
        <span class="class-period">${cls.period}</span>
        <span class="class-name">${esc(cls.course_name)}</span>
        <span class="class-badge-cancel">休講</span>
      </div>`);
    }
    html.push('</div>');
    html.push('</div>');
  }

  // ---- Next school day (if no active classes today) ----
  const hasActiveToday = todayClasses.some(c => {
    const pt = PERIOD_TIMES[c.period];
    return pt && nowMin < pt.eh * 60 + pt.em;
  });
  if (!hasActiveToday) {
    for (let offset = 1; offset <= 7; offset++) {
      const jsDay = (now.getDay() + offset) % 7;
      const unified = jsDayToUnified(jsDay);
      const dayLabel = DAY_MAP[unified] || "";
      const dayClasses = entries.filter(e => e.day === dayLabel && !e.is_cancelled).sort((a, b) => a.period - b.period);
      if (dayClasses.length > 0) {
        const d = new Date(now);
        d.setDate(d.getDate() + offset);
        const label = offset === 1 ? "明日" : `${d.getMonth()+1}/${d.getDate()}(${DAY_LABELS[jsDay]})`;
        const first = dayClasses[0];
        const pt = PERIOD_TIMES[first.period];
        html.push('<div class="section">');
        html.push(`<span class="section-label">次の授業</span>`);
        html.push(`<div class="next-day">
          <span class="next-day-label">${label}</span>
          <span>${dayClasses.length}コマ</span>
          <span>${pt ? first.period + "限 " + pt.start + "~" : ""}</span>
        </div>`);
        // Show first few classes of that day
        if (dayClasses.length > 0) {
          html.push('<div class="class-list">');
          for (const cls of dayClasses.slice(0, 4)) {
            const pt2 = PERIOD_TIMES[cls.period];
            const room = cls.room ? `<span class="class-room">${esc(cls.room)}</span>` : "";
            html.push(`<div class="class-row">
              <span class="class-period">${cls.period}</span>
              <span class="class-name">${esc(cls.course_name)}</span>
              ${room}
              <span class="class-time">${pt2 ? pt2.start : ""}</span>
            </div>`);
          }
          html.push('</div>');
        }
        html.push('</div>');
        break;
      }
    }
  }

  // ---- TODOs ----
  const todos = data.todos || [];
  const pending = todos
    .filter(t => !String(t.status || "").includes("提出済"))
    .sort((a, b) => {
      const da = parseDeadlineMs(a.deadline);
      const db = parseDeadlineMs(b.deadline);
      return da - db;
    })
    .slice(0, 5);

  if (pending.length > 0) {
    html.push('<div class="section">');
    const warnClass = pending.length >= 10 ? ' count-warn' : '';
    html.push(`<span class="section-label">TODO <span class="count${warnClass}">${pending.length}</span></span>`);
    html.push('<div class="todo-list">');
    for (let i = 0; i < pending.length; i++) {
      const t = pending[i];
      const urgency = todoUrgency(t.deadline, nowTs);
      const urgencyPct = todoUrgencyPct(t.deadline, nowTs);
      const remaining = todoRemaining(t.deadline, nowTs);
      const course = t.course_name ? `<span class="task-course">${esc(t.course_name)}</span>` : "";
      const type = t.content_type ? `<span class="task-type">${esc(t.content_type)}</span>` : "";
      const date = t.deadline ? `<span class="task-date">${esc(t.deadline)}</span>` : "";
      const feedback = t.feedback ? `<div class="task-feedback">${esc(t.feedback)}</div>` : "";

      const metaParts = [course, type, date].filter(Boolean);
      const meta = metaParts.join('<span class="task-sep"></span>');

      const taskUrl = t.url || "";
      const taskTitle = t.content_name || t.content_type || "課題";
      const clickAttr = taskUrl ? ` data-url="${escAttr(taskUrl)}" data-title="${escAttr(taskTitle)}"` : "";
      html.push(`<div class="task"${clickAttr} style="--delay:${Math.min(i * 0.04, 0.2)}s">
        <span class="urgency-bar ${urgency}"><span class="urgency-fill" style="height:${Math.max(urgencyPct * 100, 6)}%"></span></span>
        <div class="task-body">
          <span class="task-name">${esc(t.content_name || t.content_type || "課題")}</span>
          <div class="task-sub">${meta}</div>
          ${feedback}
        </div>
        ${remaining ? `<span class="remaining ${urgency}">${remaining}</span>` : ""}
        <svg class="task-arrow" width="6" height="10" viewBox="0 0 7 12" fill="none" aria-hidden="true">
          <path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`);
    }
    html.push('</div>');
    html.push('</div>');
  }

  // ---- Empty state ----
  if (html.length === 0) {
    const h = now.getHours();
    let greet = "予定なし";
    if (h < 5) greet = "おやすみなさい";
    else if (h < 11) greet = "おはよう";
    else if (h < 17) greet = "こんにちは";
    else greet = "おつかれさま";
    const m = now.getMonth() + 1;
    const d = now.getDate();
    const dayStr = DAY_LABELS[now.getDay()];
    html.push(`<div class="empty-state">
      <span class="empty-greeting">${greet}</span>
      <span class="empty-sub">${m}月${d}日（${dayStr}）の予定はありません</span>
    </div>`);
  }

  document.getElementById("content").innerHTML = html.join("");
}

// Actions
document.getElementById("btn-open").addEventListener("click", async () => {
  await invoke("show_main_window");
  closePopup();
});
document.getElementById("btn-quit").addEventListener("click", async () => {
  await invoke("quit_app");
});

// Focus loss = close popup with exit animation
window.addEventListener("blur", () => {
  if (!isClosing) closePopup();
});

// Native focus-loss event from Rust (more reliable than JS blur on macOS)
getCurrentWindow().listen("popup-blur", () => {
  if (!isClosing) closePopup();
});

// Escape key = close
window.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && !isClosing) closePopup();
});

// Event delegation for todo & AI tag clicks (avoids inline handlers)
document.getElementById("content").addEventListener("click", (e) => {
  const task = e.target.closest(".task[data-url]");
  if (task) {
    openTodoDetail(task.dataset.url, task.dataset.title || "課題");
    return;
  }
  const tag = e.target.closest(".ai-tag[data-clickable]");
  if (tag && tag.dataset.idx !== undefined) {
    openAiNotif(parseInt(tag.dataset.idx, 10));
  }
});

// Set brand logo
(function(){ document.getElementById('brand-logo-img').src='logo.png'; })();

// Initial load
loadAndRender();
</script>
