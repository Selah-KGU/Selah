<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://ipc.localhost; script-src 'self' 'unsafe-inline' https://ipc.localhost; style-src 'self' 'unsafe-inline'; connect-src ipc: http://ipc.localhost https://ipc.localhost; img-src 'self' data: https:">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f7;
    --bg-tertiary: #ededf0;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --border: rgba(0,0,0,0.05);
    --border-strong: rgba(0,0,0,0.10);
    --accent: #007aff;
    --accent-bg: rgba(0,122,255,0.08);
    --red: #ff3b30;
    --red-bg: rgba(255,59,48,0.08);
    --orange: #ff9500;
    --orange-bg: rgba(255,149,0,0.08);
    --green: #34c759;
    --green-bg: rgba(52,199,89,0.08);
    --yellow: #e6b800;
    --yellow-bg: rgba(245,197,66,0.10);
    --purple: #af52de;
    --purple-bg: rgba(175,82,222,0.08);
    --card-bg: #ffffff;
    --card-bg-hover: #ffffff;
    --card-border: rgba(0,0,0,0.03);
    --card-border-hover: rgba(0,0,0,0.08);
    --card-shadow: 0 0.5px 2px rgba(0,0,0,0.04);
    --card-shadow-hover: 0 2px 8px rgba(0,0,0,0.07);
    --card-radius: 16px;
    --inner-radius: 12px;
    color-scheme: light;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg-primary: #000000;
      --bg-secondary: #1c1c1e;
      --bg-tertiary: #2c2c2e;
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --text-tertiary: #7c7c80;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --accent: #0a84ff;
      --accent-bg: rgba(10,132,255,0.15);
      --red: #ff453a;
      --red-bg: rgba(255,69,58,0.15);
      --orange: #ff9f0a;
      --orange-bg: rgba(255,159,10,0.15);
      --green: #30d158;
      --green-bg: rgba(48,209,88,0.15);
      --yellow: #ffd60a;
      --yellow-bg: rgba(255,214,10,0.12);
      --purple: #bf5af2;
      --purple-bg: rgba(191,90,242,0.15);
      --card-bg: #2c2c2e;
      --card-bg-hover: #3a3a3c;
      --card-border: rgba(255,255,255,0.10);
      --card-border-hover: rgba(255,255,255,0.22);
      --card-shadow: none;
      --card-shadow-hover: none;
      color-scheme: dark;
    }
  }
  [data-theme="dark"] {
    --bg-primary: #000000;
    --bg-secondary: #1c1c1e;
    --bg-tertiary: #2c2c2e;
    --text-primary: #f5f5f7;
    --text-secondary: #a1a1a6;
    --text-tertiary: #7c7c80;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --accent: #0a84ff;
    --accent-bg: rgba(10,132,255,0.15);
    --red: #ff453a;
    --red-bg: rgba(255,69,58,0.15);
    --orange: #ff9f0a;
    --orange-bg: rgba(255,159,10,0.15);
    --green: #30d158;
    --green-bg: rgba(48,209,88,0.15);
    --yellow: #ffd60a;
    --yellow-bg: rgba(255,214,10,0.12);
    --purple: #bf5af2;
    --purple-bg: rgba(191,90,242,0.15);
    --card-bg: #2c2c2e;
    --card-bg-hover: #3a3a3c;
    --card-border: rgba(255,255,255,0.10);
    --card-border-hover: rgba(255,255,255,0.22);
    --card-shadow: none;
    --card-shadow-hover: none;
    color-scheme: dark;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  button { -webkit-appearance:none; appearance:none; }
  body {
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
    -webkit-user-select: text;
    user-select: text;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* Window Title Bar */
  .window-titlebar {
    position:sticky; top:0; z-index:200;
    height:32px;
    display:flex; align-items:center; justify-content:flex-end;
    padding:0 14px 0 78px;
    -webkit-app-region:drag;
    background:color-mix(in srgb, var(--bg-primary) 80%, transparent);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:0.5px solid var(--border);
  }
  .window-titlebar .luna-open-btn {
    -webkit-app-region:no-drag;
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:6px;
    font-size:11px; font-weight:500; letter-spacing:0.01em;
    color:var(--text-secondary); background:transparent;
    border:none; cursor:pointer; font-family:inherit;
    transition:background .15s, color .15s;
  }
  .window-titlebar .luna-open-btn:hover {
    background:var(--border); color:var(--text-primary);
  }
  .window-titlebar .luna-open-btn:active {
    background:var(--border-strong);
  }
  .window-titlebar .luna-open-btn svg { opacity:0.55; }

  /* Loading / Error */
  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; color:var(--text-tertiary); gap:12px; }
  .spinner { width:28px; height:28px; border:3px solid var(--border-strong); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error { color:var(--red); text-align:center; padding:40px 24px; font-size:14px; }

  /* Hero Header */
  .hero { padding:14px 24px 20px; background:var(--bg-primary); border-bottom:0.5px solid var(--border); }
  .hero-label { display:inline; font-size:12px; font-weight:500; color:var(--text-tertiary); letter-spacing:0.02em; }
  .hero-title-row { display:flex; align-items:flex-start; gap:10px; margin-bottom:2px; }
  .hero-title { font-size:22px; font-weight:700; line-height:1.25; letter-spacing:-0.02em; flex:1; min-width:0; }
  .hero-info-row { display:flex; align-items:center; flex-wrap:wrap; gap:4px 10px; margin-top:6px; min-width:0; }
  .hero-subtitle { font-size:13px; color:var(--text-secondary); display:inline-flex; align-items:center; gap:6px; flex-shrink:0; }
  .hero-subtitle svg { flex-shrink:0; opacity:0.5; }
  .hero-teachers { flex-shrink:1; min-width:0; }
  .hero-sep { width:1px; height:14px; background:var(--border-strong); flex-shrink:0; opacity:0.7; }
  .hero-ta-tag { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary); flex-shrink:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hero-ta-tag .ta-label { font-weight:600; color:var(--text-tertiary); font-size:10px; letter-spacing:0.03em; flex-shrink:0; }
  .hero-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .hero-badge {
    display:inline-flex; align-items:center; gap:4px;
    padding:6px 12px; border-radius:8px; font-size:11px; font-weight:600;
    cursor:pointer; border:none; font-family:inherit; transition:opacity .15s;
  }
  .hero-badge:hover { opacity:0.8; }
  .hero-badge.zoom { background:#2d8cff; color:#fff; }
  .hero-badge.panopto { background:#00a651; color:#fff; }
  .hero-badge.syllabus { background:#1a3a6c; color:#ffd60a; }
  .hero-badge.syllabus:hover { opacity:0.85; }
  .hero-badge.zoom:hover { opacity:0.85; background:#2d8cff; }
  .hero-badge.panopto:hover { opacity:0.85; background:#00a651; }
  .hero-badge.luna-link { display:none; }
  .hero-badge.ta { display:none; }

  /* Content Sections */
  .sections-scroll { padding:16px 20px; display:flex; flex-direction:column; gap:20px; }
  .sec { display:flex; flex-direction:column; gap:8px; }
  .sec-head { display:flex; align-items:center; gap:6px; padding:0 4px; }
  .sec-label { font-size:14px; font-weight:700; color:var(--text-primary); letter-spacing:-0.01em; }
  .sec-count { font-size:12px; font-weight:600; color:var(--text-tertiary); }
  .sec-badge { margin-left:2px; }
  .sec-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .sec-grid.mat-grid { grid-template-columns:repeat(3,1fr); align-items:stretch; }
  .sec-empty { font-size:12px; color:var(--text-tertiary); padding:8px 4px; }

  /* Item Cards (Bento tiles) */
  .item-card {
    background:var(--card-bg); border-radius:var(--inner-radius); box-shadow:var(--card-shadow);
    padding:12px; cursor:pointer; border:0.5px solid var(--card-border); width:100%; text-align:left; font-family:inherit;
    display:flex; flex-direction:column; gap:4px; height:80px; overflow:hidden;
    transition:box-shadow .15s, border-color .15s, background .15s;
  }
  .item-card:hover { background:var(--card-bg-hover); box-shadow:var(--card-shadow-hover); border-color:var(--card-border-hover); }

  /* List Items (inside cards) */
  .item-row { display:flex; align-items:flex-start; gap:6px; flex-wrap:wrap; }
  .item-title {
    font-size:13px;
    font-weight:500;
    color:var(--text-primary);
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    line-height:1.4;
    word-break:break-word;
    flex:1;
    /* 标准属性 line-clamp 以实现兼容性 */
    display:box;
    box-orient:vertical;
    line-clamp:2;
  }
  .item-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; flex-shrink:0; white-space:nowrap; }
  .item-badge.new { background:var(--red-bg); color:var(--red); }
  .item-badge.pending { background:var(--orange-bg); color:var(--orange); }
  .item-badge.done { background:var(--green-bg); color:var(--green); }
  .item-sub { font-size:11px; color:var(--text-tertiary); margin-top:auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* Material Card - fixed size + file download */
  .mat-card {
    background:var(--card-bg); border-radius:var(--inner-radius); box-shadow:var(--card-shadow);
    padding:10px; cursor:pointer; border:0.5px solid var(--card-border); width:100%; text-align:left; font-family:inherit;
    display:flex; flex-direction:column; gap:3px;
    min-height:70px; overflow:hidden;
    transition:box-shadow .15s, border-color .15s, background .15s;
  }
  .mat-card:hover { background:var(--card-bg-hover); box-shadow:var(--card-shadow-hover); border-color:var(--card-border-hover); }
  .mat-title {
    font-size:12px;
    font-weight:500;
    color:var(--text-primary);
    display:-webkit-box;
    display:box;
    -webkit-line-clamp:2;
    line-clamp:2;
    -webkit-box-orient:vertical;
    box-orient:vertical;
    overflow:hidden;
    line-height:1.3;
    word-break:break-word;
  }
  .mat-time { font-size:10px; color:var(--text-tertiary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mat-desc {
    font-size:11px; color:var(--text-secondary); line-height:1.35;
    display:-webkit-box; line-clamp:2; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; word-break:break-word;
  }
  .mat-files { display:flex; flex-wrap:wrap; gap:3px; margin-top:auto; flex-shrink:0; }
  .mat-file-btn {
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 7px; border-radius:6px; border:none; cursor:pointer;
    background:var(--accent-bg); color:var(--accent);
    font-size:10px; font-weight:500; font-family:inherit; text-align:left;
    transition:background .15s;
    max-width:100%; overflow:hidden;
  }
  .mat-file-btn:hover { background:color-mix(in srgb, var(--accent) 15%, transparent); }
  .mat-file-btn:disabled { opacity:0.5; cursor:default; }
  .mat-file-btn svg { flex-shrink:0; opacity:0.7; }
  .mat-file-btn span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mat-link-btn { color:var(--text-secondary); background:color-mix(in srgb, var(--text-secondary) 8%, transparent); }
  .mat-link-btn:hover { background:color-mix(in srgb, var(--text-secondary) 15%, transparent); }
  .mat-more { font-size:10px; color:var(--text-tertiary); padding:0 2px; }

  /* Task-style Cards (Reports/Exams) - matches LunaTodo layout */
  .task-list { display:flex; flex-direction:column; gap:4px; }
  .task-card {
    display:flex; align-items:center; gap:14px;
    padding:14px; border-radius:12px;
    background:var(--card-bg); border:0.5px solid var(--card-border);
    box-shadow:var(--card-shadow);
    cursor:pointer; font-family:inherit; text-align:left; width:100%;
    transition:border-color .15s, box-shadow .15s, transform .1s;
    position:relative;
  }
  .task-card:hover { background:var(--card-bg-hover); border-color:var(--card-border-hover); box-shadow:var(--card-shadow-hover); }
  .task-card:active { transform:scale(0.99); }

  /* Urgency bar (4px vertical) */
  .urgency-bar {
    flex-shrink:0; width:4px; border-radius:2px;
    background:var(--accent-bg); overflow:hidden; position:relative;
    align-self:stretch; margin:2px 0;
  }
  .urgency-fill {
    position:absolute; bottom:0; left:0; width:100%; border-radius:2px;
    background:var(--accent); transition:height .5s cubic-bezier(.2,.8,.2,1);
  }
  .urgency-bar.done { background:var(--green-bg); }
  .urgency-bar.done .urgency-fill { background:var(--green); }
  .urgency-bar.overdue { background:var(--red-bg); }
  .urgency-bar.overdue .urgency-fill { background:var(--red); }
  .urgency-bar.critical { background:var(--orange-bg); }
  .urgency-bar.critical .urgency-fill { background:var(--orange); animation:bar-pulse 2s ease-in-out infinite; }
  .urgency-bar.soon { background:var(--yellow-bg); }
  .urgency-bar.soon .urgency-fill { background:var(--yellow); }
  @keyframes bar-pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  /* Task body */
  .task-body { flex:1; min-width:0; }
  .task-name {
    font-size:14px; font-weight:600; color:var(--text-primary); line-height:1.35;
    margin-bottom:4px; overflow:hidden; text-overflow:ellipsis;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    display:box; line-clamp:2; box-orient:vertical;
  }
  .task-sub { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-tertiary); flex-wrap:wrap; }
  .task-sep { width:2px; height:2px; border-radius:50%; background:var(--text-tertiary); flex-shrink:0; opacity:0.5; }
  .task-type { white-space:nowrap; }
  .task-date { white-space:nowrap; font-variant-numeric:tabular-nums; }

  /* Remaining label (right side) */
  .remaining {
    flex-shrink:0; font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px;
    background:var(--accent-bg); color:var(--accent); white-space:nowrap; font-variant-numeric:tabular-nums;
  }
  .remaining.done { background:var(--green-bg); color:var(--green); }
  .remaining.overdue { background:var(--red-bg); color:var(--red); }
  .remaining.critical { background:var(--orange-bg); color:var(--orange); }
  .remaining.soon { background:var(--yellow-bg); color:var(--yellow); }

  /* Arrow */
  .task-arrow { flex-shrink:0; color:var(--text-tertiary); opacity:0.5; }

  /* Attendance cards */
  .attendance-list { display:flex; flex-direction:column; gap:6px; }
  .attendance-card {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:12px 14px; border-radius:12px;
    background:var(--card-bg); border:0.5px solid var(--card-border); box-shadow:var(--card-shadow);
  }
  .attendance-main { min-width:0; flex:1; }
  .attendance-title { font-size:13px; font-weight:600; color:var(--text-primary); line-height:1.35; }
  .attendance-date { font-size:11px; color:var(--text-tertiary); margin-top:2px; }
  .attendance-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .attendance-status { font-size:11px; color:var(--text-secondary); }
  .attendance-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; white-space:nowrap; }
  .attendance-badge.present { background:var(--green-bg); color:var(--green); }
  .attendance-badge.absent { background:var(--yellow-bg); color:var(--yellow); }
  .attendance-badge.open { background:var(--accent-bg); color:var(--accent); }
  .attendance-send-btn { padding:6px 10px; border-radius:8px; border:none; cursor:pointer; font-size:11px; font-weight:600; background:var(--accent); color:#fff; }
  .attendance-send-btn:disabled { opacity:0.55; cursor:default; }
  .attendance-open-btn { margin-left:auto; padding:5px 10px; border-radius:8px; border:none; cursor:pointer; font-size:11px; font-weight:600; background:var(--bg-tertiary); color:var(--text-secondary); }
  .attendance-open-btn:hover { background:var(--border-strong); color:var(--text-primary); }

  .btn { padding:8px 14px; border-radius:10px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; text-align:center; transition:opacity .15s,background .15s; }
  .btn:disabled { opacity:0.4; cursor:default; }
  .btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .btn.primary { background:var(--accent); color:#fff; }
  .btn.primary:hover:not(:disabled) { opacity:0.85; }
  .btn.secondary { background:var(--bg-tertiary); color:var(--text-primary); }
  .btn.secondary:hover:not(:disabled) { background:var(--border-strong); }
  .btn.success { background:#4caf50; color:#fff; }
  .text-input { width:100%; padding:8px 12px; border:0.5px solid var(--border-strong); border-radius:10px; background:var(--bg-tertiary); color:var(--text-primary); font-size:13px; font-family:inherit; resize:vertical; }
  .text-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg); }

  /* Report Submit */
  .report-submit-section { padding:0 24px 24px; }
  .report-file-zone { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 16px; border:2px dashed var(--border-strong); border-radius:12px; cursor:pointer; transition:border-color .15s,background .15s; }
  .report-file-zone:hover, .report-file-zone.dragover { border-color:var(--accent); background:var(--accent-bg); }
  .report-file-icon { margin-bottom:8px; opacity:0.5; }
  .report-file-icon svg { width:24px; height:24px; }
  .report-file-label { font-size:14px; font-weight:600; color:var(--text-primary); }
  .report-file-hint { font-size:11px; color:var(--text-secondary); margin-top:4px; }
  .report-file-selected { display:flex; align-items:center; padding:10px 14px; background:var(--bg-tertiary); border-radius:10px; font-size:13px; }
  .report-file-selected span:first-child { font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .report-remove-btn { background:none; border:none; font-size:18px; cursor:pointer; color:var(--text-secondary); padding:0 0 0 8px; line-height:1; }
  .report-remove-btn:hover { color:var(--red, #e53935); }
  .report-progress-bar { height:4px; background:var(--bg-tertiary); border-radius:2px; overflow:hidden; }
  .report-progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s ease; width:0; }

  /* Detail / Generic View */
  .detail-wrap { padding:24px; }
  .detail-wrap .page-title { font-size:20px; font-weight:700; margin-bottom:6px; letter-spacing:-0.01em; }
  .detail-wrap .course-label { font-size:12px; color:var(--text-tertiary); margin-bottom:4px; }
  .meta-table { background:var(--card-bg); border-radius:var(--card-radius); box-shadow:var(--card-shadow); border:0.5px solid var(--card-border); overflow:hidden; margin:14px 0; }
  .meta-row { display:flex; padding:10px 16px; font-size:13px; border-bottom:0.5px solid var(--border); gap:12px; }
  .meta-row:last-child { border-bottom:none; }
  .meta-key { width:120px; flex-shrink:0; color:var(--text-secondary); font-weight:500; }
  .meta-value { flex:1; color:var(--text-primary); word-break:break-word; }
  .section { margin:16px 0; }
  .section-heading { font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
  .section-body { font-size:14px; color:var(--text-primary); line-height:1.7; word-break:break-word; }
  .rich-text { line-height:1.7; word-break:break-word; overflow-wrap:anywhere; }
  .rich-text p { margin:0 0 0.45em; }
  .rich-text p:last-child { margin-bottom:0; }
  .rich-text ul, .rich-text ol { margin:0.35em 0 0.45em 1.1em; padding:0; }
  .rich-text li { margin:0.15em 0; }
  .rich-text strong, .rich-text b { font-weight:600; }
  .rich-text em, .rich-text i { font-style:italic; }
  .rich-text code { font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background:var(--bg-tertiary); padding:1px 4px; border-radius:4px; font-size:0.92em; }

    (function() {

    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function linkifyText(s) {

    function autoLinkEscaped(escaped) {

    function sanitizeRichTextHtml(input) {

      function safeHref(href) {

    function statusBadge(status) {
      if (!status) return '';
      if (status.indexOf('\u672a') >= 0) return '<span class="item-badge pending">' + escapeHtml(status) + '</span>';
      return '<span class="item-badge done">' + escapeHtml(status) + '</span>';
    }
    function attendanceBadge(status) {
      if (!status) return '<span class="attendance-status">-</span>';

      if (status.indexOf('\u53d7\u4ed8') >= 0 || status.indexOf('\u767b\u9332\u671f\u9593') >= 0 || status.indexOf('\u30ed\u30b0\u30a4\u30f3\u671f\u9593') >= 0 || status.indexOf('\u767b\u9332\u53ef\u80fd') >= 0) {

      if (status.indexOf('\u672a\u51fa\u5e2d') >= 0) {

    function attendanceDateTime(att) {

      if (!m) return NaN;
      return new Date(parseInt(m[1], 10), parseInt(m[2], 10) - 1, parseInt(m[3], 10)).getTime();

    // Urgency helpers for task-style cards
    function parseDeadlineFromPeriod(period) {
      // period is like "2026/04/01 00:00 ～ 2026/07/04 23:59" — extract end date only
      if (!period) return 0;
      var parts = period.split(/[~\uff5e]/);
      if (parts.length < 2) return 0;
      var end = parts[1].trim();
      if (!end) return 0;
      return new Date(end.replace(/\//g, '-')).getTime() || 0;

    function taskUrgency(period, status) {
      if (status && status.indexOf('\u672a') < 0) return 'done';
      var deadline = parseDeadlineFromPeriod(period);
      if (!deadline) return 'normal';
      var diff = deadline - Date.now();
      if (diff <= 0) return 'overdue';
      if (diff < 86400000) return 'critical';
      if (diff < 4 * 86400000) return 'soon';
      return 'normal';

    function taskUrgencyPct(period, status) {
      if (status && status.indexOf('\u672a') < 0) return 1;
      var deadline = parseDeadlineFromPeriod(period);
      if (!deadline) return 0;
      var diff = deadline - Date.now();
      if (diff <= 0) return 1;
      var horizon = 7 * 86400000;
      if (diff >= horizon) return 0;
      return 1 - diff / horizon;

    function taskRemaining(period, status) {
      if (status && status.indexOf('\u672a') < 0) return status;
      var deadline = parseDeadlineFromPeriod(period);
      if (!deadline) return '';

      if (diff < 3600000) return '\u6b8b\u308a' + Math.ceil(diff / 60000) + '\u5206';
      if (diff < 86400000) return '\u6b8b\u308a' + Math.floor(diff / 3600000) + '\u6642\u9593';

      if (status.indexOf('\u672a') >= 0) return 'pending';
      return 'done';
    }
    function urgencyOrder(period, status) {
      var u = taskUrgency(period, status);
      if (u === 'overdue') return 0;
      if (u === 'critical') return 1;
      if (u === 'soon') return 2;
      if (u === 'normal') return 3;
      return 4; // done
    }
    function shortPeriod(period) {
      // Extract just the end date part: "～ 2026/07/04 23:59" -> "7/4 23:59"
      if (!period) return '';
      var parts = period.split(/[~\uff5e]/);
      var end = (parts[1] || '').trim();
      if (!end) return period;
      var m = end.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+:\d+)/);
      if (m) return parseInt(m[2]) + '/' + parseInt(m[3]) + ' ' + m[4];
      return end;
    }
    function pubDate(period) {
      // Extract just the start/publish date: "2026/04/01 00:00 ～ ..." -> "4/1"
      if (!period) return '';
      var parts = period.split(/[~\uff5e]/);
      var start = (parts[0] || '').trim();
      if (!start) return '';
      var m = start.match(/(\d+)\/(\d+)\/(\d+)/);
      if (m) return parseInt(m[2]) + '/' + parseInt(m[3]);
      return start;
    }
    function shortDate(d) {
      // "2026/04/01 09:00" -> "4/1"
      if (!d) return '';
      var m = d.match(/(\d+)\/(\d+)\/(\d+)/);
      if (m) return parseInt(m[2]) + '/' + parseInt(m[3]);
      return d;
    }

              val = els[0] ? els[0].value : '';

              val = els[0] ? els[0].value : '';
            } else {
              els.forEach(function(el) { if (el.checked) val = el.value; });
            }
            answers[String(i)] = val;
            if (q.required && !val) missing.push('Q' + q.number);
          }
          if (missing.length) {
            statusEl.textContent = '\u672a\u56de\u7b54: ' + missing.join(', ');
            statusEl.style.color = 'var(--red)';
            return;
          }
          submitBtn.disabled = true;
          submitBtn.textContent = '\u63d0\u51fa\u4e2d...';
          statusEl.textContent = '';
          statusEl.style.color = '';
          try {
            await inv('luna_submit_survey', { formFields: data.form_fields, answers: answers });
            submitBtn.textContent = '\u63d0\u51fa\u5b8c\u4e86';
            statusEl.textContent = '\u56de\u7b54\u304c\u63d0\u51fa\u3055\u308c\u307e\u3057\u305f';
            statusEl.style.color = 'var(--green)';
          } catch(e) {
            statusEl.textContent = '\u63d0\u51fa\u30a8\u30e9\u30fc: ' + String(e);
            statusEl.style.color = 'var(--red)';
            submitBtn.disabled = false;
            submitBtn.textContent = '\u518d\u8a66\u884c';
          }
        });
      } else if (submitBtn && !data.form_fields) {
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.4';
        statusEl.textContent = '\u30d5\u30a9\u30fc\u30e0\u60c5\u5831\u3092\u53d6\u5f97\u3067\u304d\u307e\u305b\u3093\u3067\u3057\u305f';
      }
    }

    function renderCourseDetail(data, idnumber, kgcPath) {
      var c = document.getElementById('content');
      if (!data) { c.innerHTML = '<div class="error">\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093</div>'; return; }
      _currentCourseName = data.course_name || null;

      // Luna link in titlebar
      document.getElementById('titlebar').innerHTML = '<button class="luna-open-btn" data-luna-course-url="https://luna.kwansei.ac.jp/lms/course?idnumber=' + encodeURIComponent(idnumber) + '" title="LUNA\u3067\u958b\u304f"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>LUNA</button>';

      // Hero Header
      var h = '<div class="hero">';
      h += '<div class="hero-title-row"><div class="hero-title">' + escapeHtml(data.course_name || '') + '</div></div>';
      // Build tooltip for full info
      var infoTip = [];
      if (data.semester) infoTip.push(data.semester);
      if (data.teachers) infoTip.push(data.teachers);
      if (data.ta_info) infoTip.push('TA: ' + data.ta_info);
      if (data.la_info) infoTip.push('LA: ' + data.la_info);
      h += '<div class="hero-info-row" title="' + escapeHtml(infoTip.join(' / ')) + '">';
      if (data.semester) h += '<span class="hero-label">' + escapeHtml(data.semester) + '</span>';
      if (data.teachers) { if (data.semester) h += '<span class="hero-sep"></span>'; h += '<span class="hero-subtitle hero-teachers">' + ICONS.person + ' ' + escapeHtml(data.teachers) + '</span>'; }
      if (data.ta_info) { h += '<span class="hero-sep"></span><span class="hero-ta-tag"><span class="ta-label">TA</span>' + escapeHtml(data.ta_info) + '</span>'; }
      if (data.la_info) { h += '<span class="hero-sep"></span><span class="hero-ta-tag"><span class="ta-label">LA</span>' + escapeHtml(data.la_info) + '</span>'; }
      h += '</div>';
      var hasMeta = (data.online_tools && data.online_tools.length) || data.syllabus_url;
      if (hasMeta) {
        h += '<div class="hero-meta">';
        if (data.online_tools) for (var t = 0; t < data.online_tools.length; t++) {
          var tool = data.online_tools[t];
          var chipClass = 'hero-badge';
          var chipIcon = '';
          if (tool.url.indexOf('zoom') >= 0) {
            chipClass += ' zoom';
            chipIcon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M4 5a2 2 0 0 0-2 2v7a4 4 0 0 0 4 4h7a2 2 0 0 0 2-2v-2l4.6 3.07A1 1 0 0 0 21 18.2V8.8a1 1 0 0 0-1.4-.87L15 11V9a4 4 0 0 0-4-4H4z"/></svg>';
          } else if (tool.url.indexOf('panopto') >= 0) {
            chipClass += ' panopto';
            chipIcon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
          }
          h += '<button class="' + chipClass + '" data-lti-path="' + escapeHtml(tool.url) + '">' + chipIcon + escapeHtml(tool.name) + '</button>';
        }
        if (data.syllabus_url) h += '<button class="hero-badge syllabus" data-syllabus-url="' + escapeHtml(data.syllabus_url) + '"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>\u30b7\u30e9\u30d0\u30b9</button>';
        h += '</div>';
      }
      h += '</div>';

      // Sections
      h += '<div class="sections-scroll">';

      // Announcements
      var annCount = data.announcements ? data.announcements.length : 0;
      if (annCount) {
        h += '<div class="sec">';
        h += '<div class="sec-head"><span class="sec-label">\u304a\u77e5\u3089\u305b</span><span class="sec-count">' + annCount + '</span></div>';
        h += '<div class="sec-grid">';
        for (var a = 0; a < data.announcements.length; a++) {
          var ann = data.announcements[a];
          h += '<button class="item-card" data-ann-id="' + escapeHtml(ann.info_id || '') + '" data-ann-title="' + escapeHtml(ann.title || '') + '">';
          h += '<div class="item-row"><span class="item-title">' + escapeHtml(ann.title) + '</span>';
          if (ann.is_new) h += '<span class="item-badge new">NEW</span>';
          h += '</div>';
          if (ann.start_date) h += '<span class="item-sub">' + shortDate(ann.start_date) + '</span>';
          h += '</button>';
        }
        h += '</div></div>';
      }

      // Attendance
      var attCount = data.attendances ? data.attendances.length : 0;
      if (attCount) {
        var keep = {};
        if (attCount <= 3) {
          for (var ai = 0; ai < attCount; ai++) keep[ai] = true;
        } else {
          var dated = [];
          for (var di = 0; di < attCount; di++) {
            var tm = attendanceDateTime(data.attendances[di]);
            if (!isNaN(tm)) dated.push({ idx: di, time: tm });
          }
          if (dated.length >= 3) {
            dated.sort(function(a, b) { return a.time - b.time; });
            var now = new Date();
            var today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            var right = 0;
            while (right < dated.length && dated[right].time < today) right++;

            var start = right - 1;
            if (start < 0) start = 0;
            if (start > dated.length - 3) start = dated.length - 3;
            keep[dated[start].idx] = true;
            keep[dated[start + 1].idx] = true;
            keep[dated[start + 2].idx] = true;
          } else {
            keep[0] = true;
            keep[1] = true;
            keep[2] = true;
          }
        }
        var hiddenCount = 0;
        for (var hk = 0; hk < attCount; hk++) {
          if (!keep[hk]) hiddenCount++;
        }

        h += '<div class="sec">';
        h += '<div class="sec-head"><span class="sec-label">\u51fa\u5e2d</span><span class="sec-count">' + attCount + '</span>';
        if (hiddenCount > 0 && idnumber) {
          h += '<button class="attendance-open-btn" data-att-open-window-id="' + escapeHtml(idnumber) + '">\u5168\u3066</button>';
        }
        h += '</div>';
        h += '<div class="attendance-list">';
        for (var at = 0; at < data.attendances.length; at++) {
          var att = data.attendances[at];
          if (keep[at]) h += attendanceCardHtml(att, at);
        }
        h += '</div></div>';
      }

      // Materials
      var matCount = data.materials ? data.materials.length : 0;
      if (matCount) {
        h += '<div class="sec">';
        h += '<div class="sec-head"><span class="sec-label">\u6559\u6750</span><span class="sec-count">' + matCount + '</span></div>';
        h += '<div class="sec-grid mat-grid">';
        for (var m = 0; m < data.materials.length; m++) {
          var mat = data.materials[m];
          var hasFiles = mat.files && mat.files.length;
          h += '<div class="mat-card" data-material-idx="' + m + '">';
          h += '<div class="mat-title">' + escapeHtml(mat.title) + '</div>';
          if (mat.description) h += '<div class="mat-desc rich-text rich-text-compact">' + renderRichText(mat.description, true) + '</div>';
          if (mat.period) h += '<div class="mat-time">' + pubDate(mat.period) + '</div>';
          if (hasFiles) {
            h += '<div class="mat-files">';
            for (var fi = 0; fi < mat.files.length; fi++) {
              var f = mat.files[fi];
              var flt = f.link_type || (f.file_type === '0' ? 'file' : 'web');
              var isLink = flt !== 'file';
              h += '<button class="mat-file-btn' + (isLink ? ' mat-link-btn' : '') + '" data-mat-idx="' + m + '" data-file-idx="' + fi + '">';
              if (isLink) {
                h += '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
              } else {
                h += '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
              }
              h += '<span>' + escapeHtml(f.display_name || f.file_name) + '</span></button>';
            }
            h += '</div>';
          }
          h += '</div>';
        }
        h += '</div></div>';
      }

      // Reports
      var repCount = data.reports ? data.reports.length : 0;
      var pendingReps = data.reports ? data.reports.filter(function(r) { return r.status && r.status.indexOf('\u672a') >= 0; }).length : 0;
      if (repCount) {
        h += '<div class="sec">';
        h += '<div class="sec-head"><span class="sec-label">\u8ab2\u984c</span><span class="sec-count">' + repCount + '</span>';
        if (pendingReps > 0) h += '<span class="item-badge pending sec-badge">\u672a\u63d0\u51fa ' + pendingReps + '</span>';
        h += '</div>';
        h += '<div class="task-list">';
        var repIdx = data.reports.map(function(_, i) { return i; });
        repIdx.sort(function(a, b) {
          var da = urgencyOrder(data.reports[a].period, data.reports[a].status);
          var db = urgencyOrder(data.reports[b].period, data.reports[b].status);
          if (da !== db) return da - db;
          var ta = parseDeadlineFromPeriod(data.reports[a].period) || Infinity;
          var tb = parseDeadlineFromPeriod(data.reports[b].period) || Infinity;
          return ta - tb;
        });
        for (var ri = 0; ri < repIdx.length; ri++) {
          var r = repIdx[ri];
          var rep = data.reports[r];
          var urg = taskUrgency(rep.period, rep.status);
          var pct = taskUrgencyPct(rep.period, rep.status);
          var remain = taskRemaining(rep.period, rep.status);
          h += '<button class="task-card" data-report-idx="' + r + '">';
          h += '<div class="urgency-bar ' + urg + '"><div class="urgency-fill" style="height:' + Math.max(Math.round(pct * 100), 6) + '%"></div></div>';
          h += '<div class="task-body">';
          h += '<div class="task-name">' + escapeHtml(rep.title) + '</div>';
          h += '<div class="task-sub">';
          if (rep.status) h += '<span class="task-type">' + escapeHtml(rep.status) + '</span>';
          if (rep.status && rep.period) h += '<span class="task-sep"></span>';
          if (rep.period) h += '<span class="task-date">' + shortPeriod(rep.period) + '</span>';
          h += '</div>';
          h += '</div>';
          if (remain) h += '<span class="remaining ' + urg + '">' + remain + '</span>';
          h += '<svg class="task-arrow" width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          h += '</button>';
        }
        h += '</div></div>';
      }

      // Exams
      var exCount = data.examinations ? data.examinations.length : 0;
      var pendingEx = data.examinations ? data.examinations.filter(function(e) { return e.status && e.status.indexOf('\u672a') >= 0; }).length : 0;
      if (exCount) {
        h += '<div class="sec">';
        h += '<div class="sec-head"><span class="sec-label">\u30c6\u30b9\u30c8</span><span class="sec-count">' + exCount + '</span>';
        if (pendingEx > 0) h += '<span class="item-badge pending sec-badge">\u672a\u56de\u7b54 ' + pendingEx + '</span>';
        h += '</div>';
        h += '<div class="task-list">';
        var exIdx = data.examinations.map(function(_, i) { return i; });
        exIdx.sort(function(a, b) {
          var da = urgencyOrder(data.examinations[a].period, data.examinations[a].status);
          var db = urgencyOrder(data.examinations[b].period, data.examinations[b].status);
          if (da !== db) return da - db;
          var ta = parseDeadlineFromPeriod(data.examinations[a].period) || Infinity;
          var tb = parseDeadlineFromPeriod(data.examinations[b].period) || Infinity;
          return ta - tb;
        });
        for (var xi = 0; xi < exIdx.length; xi++) {
          var x = exIdx[xi];
          var exam = data.examinations[x];
          var exUrg = taskUrgency(exam.period, exam.status);
          var exPct = taskUrgencyPct(exam.period, exam.status);
          var exRemain = taskRemaining(exam.period, exam.status);
          h += '<button class="task-card" data-exam-url="' + escapeHtml(exam.url || '') + '" data-exam-title="' + escapeHtml(exam.title) + '">';
          h += '<div class="urgency-bar ' + exUrg + '"><div class="urgency-fill" style="height:' + Math.max(Math.round(exPct * 100), 6) + '%"></div></div>';
          h += '<div class="task-body">';
          h += '<div class="task-name">' + escapeHtml(exam.title) + '</div>';
          h += '<div class="task-sub">';
          if (exam.status) h += '<span class="task-type">' + escapeHtml(exam.status) + '</span>';
          if (exam.status && exam.period) h += '<span class="task-sep"></span>';
          if (exam.period) h += '<span class="task-date">' + shortPeriod(exam.period) + '</span>';
          h += '</div>';
          h += '</div>';
          if (exRemain) h += '<span class="remaining ' + exUrg + '">' + exRemain + '</span>';
          h += '<svg class="task-arrow" width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          h += '</button>';
        }
        h += '</div></div>';
      }

      // Discussions
      var discCount = data.discussions ? data.discussions.length : 0;
      if (discCount) {
        h += '<div class="sec">';
        h += '<div class="sec-head"><span class="sec-label">\u63b2\u793a\u677f</span><span class="sec-count">' + discCount + '</span></div>';
        h += '<div class="sec-grid">';
        for (var d = 0; d < data.discussions.length; d++) {
          var disc = data.discussions[d];
          h += '<button class="item-card" data-disc-idx="' + d + '">';
          h += '<div class="item-row"><span class="item-title">' + escapeHtml(disc.title) + '</span>' + statusBadge(disc.status) + '</div>';
          if (disc.period) h += '<span class="item-sub">' + shortPeriod(disc.period) + '</span>';
          h += '</button>';
        }
        h += '</div></div>';
      }

      // Surveys
      var survCount = data.surveys ? data.surveys.length : 0;
      if (survCount) {
        var pendingSurv = data.surveys.filter(function(s) { return s.status && s.status.indexOf('\u672a') >= 0; }).length;
        h += '<div class="sec">';
        h += '<div class="sec-head"><span class="sec-label">\u30a2\u30f3\u30b1\u30fc\u30c8</span><span class="sec-count">' + (pendingSurv ? pendingSurv + '/' : '') + survCount + '</span></div>';
        var survIdx = data.surveys.map(function(_, i) { return i; });
        survIdx.sort(function(a, b) {
          var da2 = urgencyOrder(data.surveys[a].period, data.surveys[a].status);
          var db2 = urgencyOrder(data.surveys[b].period, data.surveys[b].status);
          if (da2 !== db2) return da2 - db2;
          var ta2 = parseDeadlineFromPeriod(data.surveys[a].period) || Infinity;
          var tb2 = parseDeadlineFromPeriod(data.surveys[b].period) || Infinity;
          return ta2 - tb2;
        });
        h += '<div class="sec-grid">';
        for (var sv = 0; sv < survIdx.length; sv++) {
          var surv = data.surveys[survIdx[sv]];
          var su = taskUrgency(surv.period, surv.status);
          h += '<button class="item-card task ' + su + '" data-surv-idx="' + survIdx[sv] + '">';
          h += '<div class="item-row"><span class="item-title">' + escapeHtml(surv.title) + '</span>' + statusBadge(surv.status) + '</div>';
          var srem = taskRemaining(surv.period, surv.status);
          if (srem || surv.period) h += '<span class="item-sub">' + escapeHtml(srem || shortPeriod(surv.period)) + '</span>';
          h += '</button>';
        }
        h += '</div></div>';
      }

      // KG Detail
      if (kgcPath) {
        h += '<div class="sec">';
        h += '<button class="kg-toggle" id="kg-toggle"><span class="kg-toggle-label">' + ICONS.kg + ' KG \u6388\u696d\u8a73\u7d30</span>';
        h += '<span class="kg-chevron" id="kg-chevron">' + ICONS.chevron + '</span></button>';
        h += '<div class="kg-body" id="kg-body" style="display:none"><div class="kg-loading"><div class="spinner"></div><span>\u8aad\u307f\u8fbc\u307f\u4e2d...</span></div></div>';
        h += '</div>';
      }

      h += '</div>';
      c.innerHTML = h;

      // Event Wiring
      var invoke = window.__TAURI__?.core?.invoke;
      if (!invoke) return;

      // LTI tools
      c.querySelectorAll('[data-lti-path]').forEach(function(b) {
        b.addEventListener('click', function() { invoke('open_external_url', { url: 'https://luna.kwansei.ac.jp' + b.dataset.ltiPath }); });
      });
      c.querySelectorAll('[data-syllabus-url]').forEach(function(b) {
        b.addEventListener('click', function() { invoke('open_external_url', { url: b.dataset.syllabusUrl }); });
      });
      c.querySelectorAll('[data-luna-course-url]').forEach(function(b) {
        b.addEventListener('click', function() { invoke('open_external_url', { url: b.dataset.lunaCourseUrl }); });
      });
      document.getElementById('titlebar').querySelectorAll('[data-luna-course-url]').forEach(function(b) {
        b.addEventListener('click', function() { invoke('open_external_url', { url: b.dataset.lunaCourseUrl }); });
      });

      // Announcements
      c.querySelectorAll('[data-ann-id]').forEach(function(b) {
        b.addEventListener('click', function() {
          var id = b.dataset.annId, title = b.dataset.annTitle;
          if (id && idnumber) invoke('luna_open_detail_window', { path: '', title: title, mode: 'announcement', idnumber: idnumber, infoId: id });
        });
      });

      // Attendance sign-in
      c.querySelectorAll('.attendance-send-btn[data-att-idx]').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          var idx = parseInt(btn.dataset.attIdx, 10);
          var att = data.attendances && data.attendances[idx];
          if (!att || !att.attendance_id) return;
          var targetId = att.idnumber || idnumber;
          if (!targetId) return;

          var oneTimePass = window.prompt('\u8acb\u8f38\u5165\u51fa\u5e2d\u5bc6\u78bc (oneTimePass)') || '';
          if (!oneTimePass.trim()) {
            showStatus('\u5df2\u53d6\u6d88\u51fa\u5e2d\u767b\u9332');
            return;
          }
          var comment = window.prompt('\u8a55\u8ad6 (\u53ef\u9078)') || '';

          var orig = btn.textContent;
          btn.disabled = true;
          btn.textContent = '\u9001\u4fe1\u4e2d...';
          try {
            var msg = await invoke('luna_submit_attendance', {
              idnumber: targetId,
              attendanceId: att.attendance_id,
              oneTimePass: oneTimePass,
              comment: comment
            });
            showStatus(msg || '\u51fa\u5e2d\u3092\u767b\u9332\u3057\u307e\u3057\u305f', 'var(--green)');
            var fresh = await invoke('luna_fetch_course_detail', { idnumber: targetId });
            renderCourseDetail(fresh, targetId, kgcPath);
          } catch (e) {
            btn.disabled = false;
            btn.textContent = orig || '\u7f72\u540d\u767b\u5f55';
            showStatus('\u51fa\u5e2d\u767b\u9332\u30a8\u30e9\u30fc: ' + String(e));
          }
        });
      });
      c.querySelectorAll('[data-att-open-window-id]').forEach(function(b) {
        b.addEventListener('click', function() {
          invoke('luna_open_detail_window', {
            path: '',
            title: '\u51fa\u5e2d',
            mode: 'attendance',
            idnumber: b.dataset.attOpenWindowId
          });
        });
      });

      // Materials - individual file download buttons
      c.querySelectorAll('.mat-file-btn[data-mat-idx]').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var mi = parseInt(btn.dataset.matIdx), fi = parseInt(btn.dataset.fileIdx);
          var item = data.materials[mi]; if (!item || !item.files || !item.files[fi]) return;
          var f = item.files[fi];
          var flt = f.link_type || (f.file_type === '0' ? 'file' : 'web');
          if (flt !== 'file') openMaterialLink(idnumber, f, btn);
          else downloadMaterial(idnumber, f, btn, item.title);
        });
      });
      // Material card click fallback (opens detail window)
      c.querySelectorAll('.mat-card[data-material-idx]').forEach(function(b) {
        b.addEventListener('click', function(e) {
          if (e.target.closest('.mat-file-btn')) return;
          var item = data.materials[parseInt(b.dataset.materialIdx)];
          if (!item) return;
          invoke('luna_open_detail_window', { path: '', title: item.title, mode: 'material', period: item.period || null, status: item.description || null, idnumber: idnumber || null, infoId: item.files?.length ? JSON.stringify(item.files) : null });
        });
      });

      // Reports toggle
      // Reports - click to open detail
      c.querySelectorAll('[data-report-idx]').forEach(function(b) {
        b.addEventListener('click', function() {
          var item = data.reports[parseInt(b.dataset.reportIdx)];
          if (!item || !item.url) return;
          var up = new URLSearchParams(item.url.split('?')[1] || '');
          var reportId = up.get('reportId') || '';
          invoke('luna_open_detail_window', { path: item.url, title: item.title, mode: 'report', idnumber: idnumber || null, infoId: reportId || null, courseName: _currentCourseName || null });
        });
      });

      // Exams — open directly in browser webview (not custom detail parser)
      c.querySelectorAll('[data-exam-url]').forEach(function(b) {
        b.addEventListener('click', function() {
          if (b.dataset.examUrl) invoke('open_external_url', { url: 'https://luna.kwansei.ac.jp' + b.dataset.examUrl, title: b.dataset.examTitle || 'テスト' });
        });
      });

      // Discussions - click to open detail
      c.querySelectorAll('[data-disc-idx]').forEach(function(b) {
        b.addEventListener('click', function() {
          var item = data.discussions[parseInt(b.dataset.discIdx)];
          if (item?.url) invoke('luna_open_detail_window', { path: item.url, title: item.title, mode: 'discussion' });
        });
      });

      // Surveys - click to open detail
      c.querySelectorAll('[data-surv-idx]').forEach(function(b) {
        b.addEventListener('click', function() {
          var item = data.surveys[parseInt(b.dataset.survIdx)];
          if (item?.url) invoke('luna_open_detail_window', { path: item.url, title: item.title, mode: 'survey', courseName: _currentCourseName || null });
        });
      });

      // KG Detail
      if (kgcPath) {
        var kgT = document.getElementById('kg-toggle'), kgB = document.getElementById('kg-body'), kgC = document.getElementById('kg-chevron');
        var kgLoaded = false;
        kgT.addEventListener('click', async function() {
          var open = kgB.style.display !== 'none';
          kgB.style.display = open ? 'none' : '';
          kgC.style.transform = open ? '' : 'rotate(180deg)';
          if (!open && !kgLoaded) {
            kgLoaded = true;
            try {
              var detail = await invoke('fetch_course_detail', { path: kgcPath });
              if (detail.fields?.length) {
                var fh = '<div class="meta-table" style="margin:8px 0 0">';
                for (var f = 0; f < detail.fields.length; f++) fh += '<div class="meta-row"><span class="meta-key">' + escapeHtml(detail.fields[f][0]) + '</span><span class="meta-value">' + linkifyText(detail.fields[f][1] || '\u2014') + '</span></div>';
                fh += '</div>';
                kgB.innerHTML = fh;
              } else kgB.innerHTML = '<div style="color:var(--text-tertiary);font-size:12px;padding:16px;text-align:center">\u8a73\u7d30\u60c5\u5831\u306f\u3042\u308a\u307e\u305b\u3093</div>';
            } catch(e) { kgB.innerHTML = '<div style="color:var(--red);font-size:12px;padding:16px">' + escapeHtml(String(e)) + '</div>'; }
          }
        });
      }
    }

    function renderAttendanceDetail(data, idnumber) {
      var c = document.getElementById('content');
      if (!data) { c.innerHTML = '<div class="error">\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093</div>'; return; }

      document.getElementById('titlebar').innerHTML = '<button class="luna-open-btn" data-luna-course-url="https://luna.kwansei.ac.jp/lms/course?idnumber=' + encodeURIComponent(idnumber) + '#attendance" title="LUNA\u3067\u958b\u304f"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>LUNA</button>';

      var h = '<div class="detail-wrap">';
      if (data.course_name) h += '<div class="course-label">' + escapeHtml(data.course_name) + '</div>';
      h += '<div class="page-title">\u51fa\u5e2d</div>';

      var list = data.attendances || [];
      if (!list.length) {
        h += '<div class="card-empty" style="padding:40px 0">\u51fa\u5e2d\u60c5\u5831\u304c\u3042\u308a\u307e\u305b\u3093</div>';
      } else {
        h += '<div class="attendance-list">';
        for (var i = 0; i < list.length; i++) h += attendanceCardHtml(list[i], i);
        h += '</div>';
      }
      h += '</div>';
      c.innerHTML = h;

      var invoke = window.__TAURI__?.core?.invoke;
      if (!invoke) return;
      document.getElementById('titlebar').querySelectorAll('[data-luna-course-url]').forEach(function(b) {
        b.addEventListener('click', function() { invoke('open_external_url', { url: b.dataset.lunaCourseUrl }); });
      });
      c.querySelectorAll('.attendance-send-btn[data-att-idx]').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          var idx = parseInt(btn.dataset.attIdx, 10);
          var att = list[idx];
          if (!att || !att.attendance_id) return;
          var oneTimePass = window.prompt('\u8acb\u8f38\u5165\u51fa\u5e2d\u5bc6\u78bc (oneTimePass)') || '';
          if (!oneTimePass.trim()) { showStatus('\u5df2\u53d6\u6d88\u51fa\u5e2d\u767b\u9332'); return; }
          var comment = window.prompt('\u8a55\u8ad6 (\u53ef\u9078)') || '';
          var orig = btn.textContent;
          btn.disabled = true;
          btn.textContent = '\u9001\u4fe1\u4e2d...';
          try {
            var targetId = att.idnumber || idnumber;
            var msg = await invoke('luna_submit_attendance', { idnumber: targetId, attendanceId: att.attendance_id, oneTimePass: oneTimePass, comment: comment });
            showStatus(msg || '\u51fa\u5e2d\u3092\u767b\u9332\u3057\u307e\u3057\u305f', 'var(--green)');
            var fresh = await invoke('luna_fetch_course_detail', { idnumber: targetId });
            renderAttendanceDetail(fresh, targetId);
          } catch (e) {
            btn.disabled = false;
            btn.textContent = orig || '\u7f72\u540d\u767b\u5f55';
            showStatus('\u51fa\u5e2d\u767b\u9332\u30a8\u30e9\u30fc: ' + String(e));
          }
        });
      });
    }

    // Download helpers
    var _currentCourseName = null;
    var _currentDetailTitle = null;
    var _currentPagePath = null; // detail page path for attachment downloads
    async function downloadMaterial(idnumber, file, btn, materialTitle) {
      var invoke = window.__TAURI__?.core?.invoke; if (!invoke) return;
      var orig = btn.innerHTML; btn.innerHTML = '<span>\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u4e2d...</span>'; btn.disabled = true;
      try {
        var path = await invoke('luna_download_material', { idnumber: idnumber, fileName: file.file_name, objectName: file.object_name, resourceId: file.resource_id, fileType: file.file_type || '0', materialId: file.material_id || null, displayName: file.display_name || null, endDate: file.end_date || null, courseName: _currentCourseName || null, materialTitle: materialTitle || null });
        btn.innerHTML = '<span>' + ICONS.done + ' ' + escapeHtml(file.display_name || file.file_name) + '</span>';
        await invoke('luna_reveal_file', { path: path });
      } catch(e) { btn.innerHTML = orig; btn.disabled = false; showStatus('\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u30a8\u30e9\u30fc: ' + String(e)); }
    }
    async function openMaterialLink(idnumber, file, btn) {
      var invoke = window.__TAURI__?.core?.invoke; if (!invoke) return;
      var orig = btn.innerHTML; btn.innerHTML = '<span>\u958b\u3044\u3066\u3044\u307e\u3059...</span>'; btn.disabled = true;
      try {
        var url = await invoke('luna_resolve_material_link', { idnumber: idnumber, fileName: file.file_name, objectName: file.object_name, resourceId: file.resource_id, fileType: file.file_type || '0', materialId: file.material_id || null, displayName: file.display_name || null, endDate: file.end_date || null });
        await invoke('open_external_url', { url: url });
        btn.innerHTML = orig; btn.disabled = false;
      } catch(e) { btn.innerHTML = orig; btn.disabled = false; showStatus('\u30ea\u30f3\u30af\u3092\u958b\u3051\u307e\u305b\u3093\u3067\u3057\u305f: ' + String(e)); }
    }
    async function downloadAttachment(att, btn) {
      var invoke = window.__TAURI__?.core?.invoke; if (!invoke) return;
      var name = att.name || att.file_name || '';
      var orig = btn ? btn.innerHTML : null;
      if (btn) { btn.innerHTML = '<span>' + ICONS.clip + ' \u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u4e2d...</span>'; btn.disabled = true; }
      try {
        var result = await invoke('luna_download_file', {
          url: att.url || '',
          filename: name,
          pagePath: _currentPagePath || null,
          objectName: att.object_name || null,
          downloadAction: att.download_action || null,
          downloadParams: att.download_params || null,
          courseName: _currentCourseName || null,
          detailTitle: _currentDetailTitle || null
        });
        if (result.startsWith('http')) {
          await invoke('open_external_url', { url: result });
          if (btn) { btn.innerHTML = orig; btn.disabled = false; }
        } else {
          if (btn) btn.innerHTML = '<span>' + ICONS.done + ' ' + escapeHtml(name) + '</span>';
          await invoke('luna_reveal_file', { path: result });
        }
      } catch(e) {
        if (btn) { btn.innerHTML = orig; btn.disabled = false; }
        showStatus('\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u30a8\u30e9\u30fc: ' + String(e));
      }
    }
    async function openExternalLink(url, name) {
      var invoke = window.__TAURI__?.core?.invoke; if (!invoke) return;
      try {
        var fullUrl = url.startsWith('http') ? url : 'https://luna.kwansei.ac.jp' + url;
        await invoke('open_external_url', { url: fullUrl });
      } catch(e) { showStatus('\u30ea\u30f3\u30af\u3092\u958b\u3051\u307e\u305b\u3093\u3067\u3057\u305f: ' + String(e)); }
    }
    function showStatus(msg, color) {
      var st = document.querySelector('.status') || Object.assign(document.createElement('div'), { className: 'status' });
      st.textContent = msg; st.style.color = color || 'var(--red)';
      document.getElementById('content').appendChild(st);
    }

    // Router
    document.addEventListener('DOMContentLoaded', async function() {
      var params = new URLSearchParams(window.location.search);
      var mode = params.get('mode'), path = params.get('path');
      if (mode === 'material') { renderMaterialInfo(params); return; }
      var invoke = window.__TAURI__?.core?.invoke;
      if (!invoke) { renderDetail({ error: 'Tauri IPC \u304c\u5229\u7528\u3067\u304d\u307e\u305b\u3093' }); return; }
      try {
        if (mode === 'course') {
          var idn = params.get('idnumber'), kgcPath = params.get('kgcPath') || '';
          if (!idn) { renderDetail({ error: '\u30b3\u30fc\u30b9\u756a\u53f7\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          renderCourseDetail(await invoke('luna_fetch_course_detail', { idnumber: idn }), idn, kgcPath);
        } else if (mode === 'attendance') {
          var aid = params.get('idnumber');
          if (!aid) { renderDetail({ error: '\u30b3\u30fc\u30b9\u756a\u53f7\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          renderAttendanceDetail(await invoke('luna_fetch_course_detail', { idnumber: aid }), aid);
        } else if (mode === 'announcement') {
          var idn2 = params.get('idnumber'), infoId = params.get('infoId');
          if (!idn2 || !infoId) { renderDetail({ error: '\u30d1\u30e9\u30e1\u30fc\u30bf\u304c\u4e0d\u8db3\u3057\u3066\u3044\u307e\u3059' }); return; }
          renderDetail(await invoke('luna_fetch_announcement_detail', { idnumber: idn2, infoId: infoId }));
        } else if (mode === 'report') {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          _currentPagePath = path;
          if (params.get('courseName')) _currentCourseName = params.get('courseName');
          var reportData = await invoke('luna_fetch_detail', { path: path });
          renderDetail(reportData);
          // Add file submit UI if idnumber and reportId are available
          var repIdnumber = params.get('idnumber'), repReportId = params.get('reportId');
          if (repIdnumber && repReportId) {
            var submitWrap = document.createElement('div');
            submitWrap.className = 'report-submit-section';
            submitWrap.innerHTML =
              '<div class="report-submit-inner">' +
              '<div class="report-file-zone" id="reportDropZone">' +
              '<div class="report-file-icon">' + ICONS.clip + '</div>' +
              '<div class="report-file-label">ファイルを選択またはドラッグ&ドロップ</div>' +
              '<div class="report-file-hint">PDF, Word, Excel, PPT, 画像, ZIP (最大100MB)</div>' +
              '<input type="file" id="reportFileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.zip,.jpg,.jpeg,.png" style="display:none">' +
              '</div>' +
              '<div id="reportFileInfo" style="display:none">' +
              '<div class="report-file-selected">' +
              '<span id="reportFileName"></span>' +
              '<span id="reportFileSize" style="opacity:0.5;margin-left:8px"></span>' +
              '<button id="reportFileRemove" class="report-remove-btn" title="取消">&times;</button>' +
              '</div>' +
              '</div>' +
              '<button id="reportSubmitBtn" class="btn primary" style="width:100%;margin-top:12px" disabled>提出する</button>' +
              '<div id="reportProgress" style="display:none;margin-top:8px">' +
              '<div class="report-progress-bar"><div class="report-progress-fill" id="reportProgressFill"></div></div>' +
              '<div id="reportStatusText" style="font-size:12px;color:var(--text-secondary);margin-top:4px"></div>' +
              '</div>' +
              '</div>';
            document.getElementById('content').appendChild(submitWrap);

            var fileInput = document.getElementById('reportFileInput');
            var dropZone = document.getElementById('reportDropZone');
            var fileInfo = document.getElementById('reportFileInfo');
            var fileName = document.getElementById('reportFileName');
            var fileSize = document.getElementById('reportFileSize');
            var removeBtn = document.getElementById('reportFileRemove');
            var submitBtn2 = document.getElementById('reportSubmitBtn');
            var progressDiv = document.getElementById('reportProgress');
            var progressFill = document.getElementById('reportProgressFill');
            var statusText = document.getElementById('reportStatusText');
            var selectedFile = null;

            function formatSize(bytes) {
              if (bytes < 1024) return bytes + 'B';
              if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
              return (bytes/(1024*1024)).toFixed(1) + 'MB';
            }

            function selectFile(file) {
              if (!file) return;
              if (file.size > 100 * 1024 * 1024) { alert('100MBを超えるファイルは提出できません。'); return; }
              if (file.size <= 0) { alert('ファイルサイズが0バイトです。'); return; }
              selectedFile = file;
              fileName.textContent = file.name;
              fileSize.textContent = formatSize(file.size);
              dropZone.style.display = 'none';
              fileInfo.style.display = '';
              submitBtn2.disabled = false;
            }

            function clearFile() {
              selectedFile = null;
              fileInput.value = '';
              dropZone.style.display = '';
              fileInfo.style.display = 'none';
              submitBtn2.disabled = true;
              progressDiv.style.display = 'none';
            }

            dropZone.addEventListener('click', function() { fileInput.click(); });
            fileInput.addEventListener('change', function() { if (fileInput.files[0]) selectFile(fileInput.files[0]); });
            removeBtn.addEventListener('click', clearFile);

            dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
            dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]); });

            submitBtn2.addEventListener('click', async function() {
              if (!selectedFile) return;
              submitBtn2.disabled = true;
              submitBtn2.textContent = '提出中...';
              progressDiv.style.display = '';
              statusText.textContent = 'ファイルを読み込み中...';
              progressFill.style.width = '10%';

              try {
                var buf = await selectedFile.arrayBuffer();
                var bytes = new Uint8Array(buf);
                statusText.textContent = 'エンコード中...';
                progressFill.style.width = '30%';

                var binary = '';
                for (var i = 0; i < bytes.length; i += 8192) {
                  var chunk = bytes.subarray(i, i + 8192);
                  for (var j = 0; j < chunk.length; j++) binary += String.fromCharCode(chunk[j]);
                }

                statusText.textContent = 'アップロード中...';
                progressFill.style.width = '50%';

                var result = await invoke('luna_submit_report', {
                  idnumber: repIdnumber,
                  reportId: repReportId,
                  fileName: selectedFile.name,
                  fileBase64: btoa(binary)
                });

                progressFill.style.width = '100%';
                statusText.textContent = result;
                submitBtn2.textContent = result;
                submitBtn2.className = 'btn success';
              } catch(e) {
                progressFill.style.width = '0%';
                statusText.textContent = '提出エラー: ' + String(e);
                statusText.style.color = 'var(--red, #e53935)';
                submitBtn2.disabled = false;
                submitBtn2.textContent = '再試行';
              }
            });
          }
        } else if (mode === 'discussion') {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          renderDiscussion(await invoke('luna_fetch_discussion_detail', { url: path }));
        } else if (mode === 'thread') {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          renderThreadDetail(await invoke('luna_fetch_thread_posts', { url: path }), path);
        } else if (mode === 'survey') {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          _currentPagePath = path;
          if (params.get('courseName')) _currentCourseName = params.get('courseName');
          renderSurveyDetail(await invoke('luna_fetch_survey_detail', { path: path }));
        } else {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          _currentPagePath = path;
          if (params.get('courseName')) _currentCourseName = params.get('courseName');
          renderDetail(await invoke('luna_fetch_detail', { path: path }));
        }
      } catch(e) { renderDetail({ error: String(e) }); }
    });

    // Universal link interceptor
    document.addEventListener('click', function(e) {
      var a = e.target.closest?.('a[href]'); if (!a) return;
      var href = a.getAttribute('href'); if (!href || href === '#') return;
      e.preventDefault(); e.stopPropagation();
      if (href.startsWith('/')) href = 'https://luna.kwansei.ac.jp' + href;
      if (!href.startsWith('http://') && !href.startsWith('https://')) return;
      var inv = window.__TAURI__?.core?.invoke;
      if (inv) inv('kwic_open_link', { url: href, title: a.textContent.trim() || href });
    }, true);
  </script>
</body>
</html>
