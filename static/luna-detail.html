<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna 詳細</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f7;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --border: rgba(0, 0, 0, 0.08);
    --accent: #4a90d9;
    --red: #ff3b30;
    --bg-card: rgba(0, 0, 0, 0.03);
    --bg-hover: rgba(0, 0, 0, 0.04);
    color-scheme: light;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg-primary: #1c1c1e;
      --bg-secondary: #2c2c2e;
      --text-primary: #f5f5f7;
      --text-secondary: #98989d;
      --text-tertiary: #636366;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #4a90d9;
      --red: #ff453a;
      --bg-card: rgba(255, 255, 255, 0.05);
      --bg-hover: rgba(255, 255, 255, 0.06);
      color-scheme: dark;
    }
  }
  [data-theme="dark"] {
    --bg-primary: #1c1c1e;
    --bg-secondary: #2c2c2e;
    --text-primary: #f5f5f7;
    --text-secondary: #98989d;
    --text-tertiary: #636366;
    --border: rgba(255, 255, 255, 0.08);
    --accent: #4a90d9;
    --red: #ff453a;
    --bg-card: rgba(255, 255, 255, 0.05);
    --bg-hover: rgba(255, 255, 255, 0.06);
    color-scheme: dark;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 13px;
    line-height: 1.5;
    padding: 20px;
    -webkit-user-select: text;
    user-select: text;
  }
  .loading {
    text-align: center;
    padding: 40px 0;
    color: var(--text-secondary);
  }
  .spinner {
    width: 24px;
    height: 24px;
    margin: 0 auto 12px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    color: var(--red);
    text-align: center;
    padding: 20px;
    font-size: 13px;
  }
  .course-label {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 2px;
  }
  .page-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 16px;
    line-height: 1.3;
  }
  .meta-table {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .meta-row {
    display: flex;
    padding: 8px 12px;
    font-size: 12px;
    border-bottom: 0.5px solid var(--border);
    gap: 8px;
  }
  .meta-row:last-child { border-bottom: none; }
  .meta-key {
    width: 110px;
    flex-shrink: 0;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .meta-value {
    flex: 1;
    color: var(--text-primary);
    word-break: break-word;
  }
  .section {
    margin-bottom: 14px;
  }
  .section-heading {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .section-body {
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .attachments {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 0.5px solid var(--border);
  }
  .attachments h4 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .attachment {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--accent);
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    width: 100%;
    text-align: left;
    transition: background 0.15s ease;
    margin-bottom: 4px;
    border: none;
  }
  .attachment:hover { background: var(--bg-hover); }
  .attachment span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty {
    color: var(--text-tertiary);
    font-size: 13px;
    text-align: center;
    padding: 40px 0;
  }
  .status {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 16px;
    text-align: center;
  }
  /* Course detail styles */
  .course-semester {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .course-teachers {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .course-staff-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .assistant-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
  }
  .course-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tool-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 500;
    border: 0.5px solid var(--border);
    background: var(--bg-card);
    color: var(--accent);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .tool-chip:hover { background: var(--bg-hover); }
  .course-section {
    margin-bottom: 16px;
  }
  .course-section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .content-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .content-item {
    display: flex;
    flex-direction: column;
    padding: 8px 12px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: background 0.15s;
    width: 100%;
  }
  .content-item:hover { background: var(--bg-hover); }
  .content-item-main {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .content-item-title {
    flex: 1;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .content-item-status {
    font-size: 11px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .content-item-status.highlight { color: var(--red); font-weight: 600; }
  .content-item-period {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }
  .announcement-item {
    display: flex;
    flex-direction: column;
    padding: 8px 12px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: background 0.15s;
    width: 100%;
  }
  .announcement-item:hover { background: var(--bg-hover); }
  .ann-title-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ann-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ann-new-badge {
    font-size: 9px;
    font-weight: 700;
    color: var(--red);
    background: rgba(255, 59, 48, 0.1);
    padding: 1px 5px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .ann-date {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }
  .expand-actions {
    padding: 8px 12px;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .action-btn {
    padding: 6px 12px;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    transition: background 0.15s;
  }
  .action-btn:hover { background: var(--bg-hover); }
  .action-btn.accent {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .action-btn.accent:hover { opacity: 0.9; }
  .action-btn:disabled { opacity: 0.5; cursor: default; }
  .reply-input {
    width: 100%;
    box-sizing: border-box;
    padding: 6px 10px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 12px;
    font-family: inherit;
    resize: vertical;
  }
  .reply-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.12);
  }
  .content-item-files {
    font-size: 11px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  /* KG detail collapsible */
  .kg-detail-section {
    margin-top: 8px;
    border-top: 0.5px solid var(--border);
    padding-top: 12px;
  }
  .kg-detail-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    transition: background 0.15s;
  }
  .kg-detail-toggle:hover { background: var(--bg-hover); }
  .kg-detail-toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .kg-chevron {
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .kg-detail-body {
    margin-top: 8px;
  }
  .kg-detail-loading {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0;
    color: var(--text-tertiary);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <span>読み込み中...</span>
    </div>
  </div>
  <script>
    (function() {
      var t = localStorage.getItem('selah-theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
      }
    })();

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function linkifyText(str) {
      // Escape HTML first, then convert URLs to clickable links
      var escaped = escapeHtml(str);
      // Match URLs (http/https)
      return escaped.replace(/(https?:\/\/[^\s<)\]]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;cursor:pointer;word-break:break-all;">$1</a>');
    }

    function renderDetail(data) {
      var content = document.getElementById('content');

      if (data.error) {
        content.innerHTML = '<div class="error">' + escapeHtml(data.error) + '</div>';
        return;
      }

      var html = '';

      if (data.course_name) {
        html += '<div class="course-label">' + escapeHtml(data.course_name) + '</div>';
      }
      if (data.title) {
        html += '<div class="page-title">' + escapeHtml(data.title) + '</div>';
      }

      // Sections
      if (data.sections && data.sections.length > 0) {
        for (var i = 0; i < data.sections.length; i++) {
          var sec = data.sections[i];
          html += '<div class="section">';
          if (sec.heading) {
            html += '<div class="section-heading">' + escapeHtml(sec.heading) + '</div>';
          }
          html += '<div class="section-body">' + linkifyText(sec.body) + '</div>';
          html += '</div>';
        }
      }

      // Meta
      if (data.meta && data.meta.length > 0) {
        html += '<div class="meta-table">';
        for (var j = 0; j < data.meta.length; j++) {
          var m = data.meta[j];
          html += '<div class="meta-row"><span class="meta-key">' + escapeHtml(m[0]) + '</span><span class="meta-value">' + linkifyText(m[1] || '—') + '</span></div>';
        }
        html += '</div>';
      }

      // Attachments
      if (data.attachments && data.attachments.length > 0) {
        html += '<div class="attachments"><h4>添付ファイル</h4>';
        for (var k = 0; k < data.attachments.length; k++) {
          var att = data.attachments[k];
          html += '<button class="attachment" data-url="' + escapeHtml(att.url) + '" data-name="' + escapeHtml(att.name) + '">';
          html += '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>' + escapeHtml(att.name) + '</span>';
          html += '<span style="flex:none;opacity:0.6"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><polyline points="8 13 12 17 16 13"/></svg></span>';
          html += '</button>';
        }
        html += '</div>';
      }

      if (!data.sections?.length && !data.meta?.length && !data.attachments?.length) {
        html += '<div class="empty">詳細情報を取得できませんでした</div>';
      }

      content.innerHTML = html;

      // Attach download handlers
      var buttons = content.querySelectorAll('.attachment');
      for (var b = 0; b < buttons.length; b++) {
        buttons[b].addEventListener('click', function() {
          var url = this.getAttribute('data-url');
          var name = this.getAttribute('data-name');
          downloadAttachment(url, name);
        });
      }
    }

    function renderMaterialInfo(params) {
      var data = {
        title: params.get('title') || '',
        course_name: '',
        sections: [],
        attachments: [],
        meta: [],
      };
      var period = params.get('period');
      if (period) data.meta.push(['公開期間', period]);

      // Parse material files from infoId param (JSON array)
      var filesJson = params.get('infoId');
      var idnumber = params.get('idnumber') || '';
      var files = [];
      if (filesJson) {
        try { files = JSON.parse(filesJson); } catch(e) {}
      }

      renderDetail(data);

      // Render file download buttons
      if (files.length > 0) {
        var content = document.getElementById('content');
        var filesHtml = '<div class="attachments"><h4>ファイル (' + files.length + ')</h4>';
        for (var i = 0; i < files.length; i++) {
          var f = files[i];
          filesHtml += '<button class="attachment material-dl" data-idx="' + i + '">';
          filesHtml += '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>' + escapeHtml(f.display_name || f.file_name) + '</span>';
          filesHtml += '<span style="flex:none;opacity:0.6"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><polyline points="8 13 12 17 16 13"/></svg></span>';
          filesHtml += '</button>';
        }
        filesHtml += '</div>';
        content.insertAdjacentHTML('beforeend', filesHtml);

        // Attach download handlers
        var dlBtns = content.querySelectorAll('.material-dl');
        for (var b = 0; b < dlBtns.length; b++) {
          dlBtns[b].addEventListener('click', (function(file) {
            return function() {
              downloadMaterial(idnumber, file, this);
            };
          })(files[dlBtns[b].getAttribute('data-idx')]));
        }
      }
    }

    function renderDiscussion(data) {
      var content = document.getElementById('content');
      if (!data) {
        content.innerHTML = '<div class="error">データがありません</div>';
        return;
      }
      // Extract idnumber and forumId from current URL params for thread navigation
      var params = new URLSearchParams(window.location.search);
      var discussionPath = params.get('path') || '';
      var pathParams = new URLSearchParams(discussionPath.split('?')[1] || '');
      var idnumber = pathParams.get('idnumber') || '';
      var forumId = pathParams.get('forumId') || '';

      var html = '';
      if (data.course_name) {
        html += '<div class="course-label">' + escapeHtml(data.course_name) + '</div>';
      }
      if (data.title) {
        html += '<div class="page-title">' + escapeHtml(data.title) + '</div>';
      }
      // Description (theme content)
      if (data.description) {
        html += '<div class="section"><div class="section-body">' + linkifyText(data.description) + '</div></div>';
      }
      // Meta info
      if (data.meta && data.meta.length > 0) {
        html += '<div class="meta-table">';
        for (var j = 0; j < data.meta.length; j++) {
          var m = data.meta[j];
          html += '<div class="meta-row"><span class="meta-key">' + escapeHtml(m[0]) + '</span><span class="meta-value">' + linkifyText(m[1] || '—') + '</span></div>';
        }
        html += '</div>';
      }
      // Thread posts
      if (data.posts && data.posts.length > 0) {
        html += '<div style="margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border)">';
        html += '<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">スレッド一覧 (' + data.posts.length + ')</div>';
        for (var i = 0; i < data.posts.length; i++) {
          var p = data.posts[i];
          html += '<div class="thread-card" data-thread-id="' + escapeHtml(p.thread_id || '') + '" style="background:var(--bg-card);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer">';
          // Title row
          if (p.title) {
            html += '<div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:4px">' + escapeHtml(p.title) + '</div>';
          }
          // Content
          if (p.content) {
            html += '<div style="font-size:13px;color:var(--text-primary);line-height:1.6;margin-bottom:6px;white-space:pre-wrap;word-break:break-word">' + linkifyText(p.content) + '</div>';
          }
          // Meta row: author, date, status
          html += '<div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-tertiary)">';
          if (p.author) html += '<span style="font-weight:500;color:var(--text-secondary)">' + escapeHtml(p.author) + '</span>';
          if (p.date) html += '<span>' + escapeHtml(p.date) + '</span>';
          if (p.status) html += '<span style="margin-left:auto;opacity:0.8">' + escapeHtml(p.status) + '</span>';
          html += '</div>';
          html += '</div>';
        }
        html += '</div>';
      }
      if (!data.description && (!data.posts || data.posts.length === 0) && (!data.meta || data.meta.length === 0)) {
        html += '<div class="empty">掲示板の内容を取得できませんでした</div>';
      }
      content.innerHTML = html;

      // Make thread cards clickable - open thread detail window
      content.querySelectorAll('.thread-card').forEach(function(card) {
        card.addEventListener('click', async function() {
          var threadId = card.getAttribute('data-thread-id');
          if (!threadId || !idnumber || !forumId) return;
          var invoke = window.__TAURI__?.core?.invoke;
          if (!invoke) return;
          var threadUrl = '/lms/course/forums/thread?idnumber=' + idnumber + '&forumId=' + forumId + '&threadId=' + threadId + '&screen=2';
          var threadTitle = card.querySelector('div')?.textContent || 'スレッド';
          try {
            await invoke('luna_open_detail_window', {
              path: threadUrl,
              title: threadTitle,
              mode: 'thread',
            });
          } catch (e) { console.error(e); }
        });
      });
    }

    function renderThreadDetail(data, threadUrl) {
      var content = document.getElementById('content');
      if (!data) {
        content.innerHTML = '<div class="error">データがありません</div>';
        return;
      }
      var html = '';
      if (data.course_name) {
        html += '<div class="course-label">' + escapeHtml(data.course_name) + '</div>';
      }
      if (data.title) {
        html += '<div class="page-title">' + escapeHtml(data.title) + '</div>';
      }
      // Description
      if (data.description) {
        html += '<div class="section"><div class="section-body">' + linkifyText(data.description) + '</div></div>';
      }
      // Meta info
      if (data.meta && data.meta.length > 0) {
        html += '<div class="meta-table">';
        for (var j = 0; j < data.meta.length; j++) {
          var m = data.meta[j];
          html += '<div class="meta-row"><span class="meta-key">' + escapeHtml(m[0]) + '</span><span class="meta-value">' + linkifyText(m[1] || '—') + '</span></div>';
        }
        html += '</div>';
      }
      // Reply form
      html += '<div style="margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border)">';
      html += '<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">返信</div>';
      html += '<textarea id="replyContent" style="width:100%;box-sizing:border-box;min-height:80px;padding:8px 10px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg-card);color:var(--text-primary);font-size:13px;line-height:1.6;resize:vertical;font-family:inherit" placeholder="返信内容を入力..."></textarea>';
      html += '<div style="display:flex;justify-content:flex-end;margin-top:6px">';
      html += '<button id="replyBtn" style="padding:6px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer">送信</button>';
      html += '</div>';
      html += '</div>';
      content.innerHTML = html;

      // Wire up reply button
      var replyBtn = document.getElementById('replyBtn');
      var replyContent = document.getElementById('replyContent');
      replyBtn.addEventListener('click', async function() {
        var invoke = window.__TAURI__?.core?.invoke;
        if (!invoke || !replyContent.value.trim()) return;
        replyBtn.disabled = true;
        replyBtn.textContent = '送信中...';
        try {
          var result = await invoke('luna_reply_discussion', {
            url: threadUrl,
            content: replyContent.value.trim(),
          });
          replyContent.value = '';
          replyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11.5 14.5 16 9.5"/></svg>' + escapeHtml(result);
          setTimeout(function() { replyBtn.textContent = '送信'; replyBtn.disabled = false; }, 2000);
        } catch (e) {
          var statusEl = document.querySelector('.status');
          if (!statusEl) {
            statusEl = document.createElement('div');
            statusEl.className = 'status';
            content.appendChild(statusEl);
          }
          statusEl.textContent = '投稿エラー: ' + String(e);
          statusEl.style.color = 'var(--red)';
          replyBtn.textContent = '送信';
          replyBtn.disabled = false;
        }
      });
    }

    function renderCourseDetail(data, idnumber, kgcPath) {
      var content = document.getElementById('content');
      if (!data) {
        content.innerHTML = '<div class="error">データがありません</div>';
        return;
      }
      var html = '';
      // Course header
      html += '<div class="page-title">' + escapeHtml(data.course_name || '') + '</div>';
      if (data.semester) {
        html += '<div class="course-semester">' + escapeHtml(data.semester) + '</div>';
      }
      if (data.teachers) {
        html += '<div class="course-teachers"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>' + escapeHtml(data.teachers) + '</span></div>';
      }
      if (data.ta_info || data.la_info) {
        html += '<div class="course-staff-badges">';
        if (data.ta_info) html += '<span class="assistant-badge">TA: ' + escapeHtml(data.ta_info) + '</span>';
        if (data.la_info) html += '<span class="assistant-badge">LA: ' + escapeHtml(data.la_info) + '</span>';
        html += '</div>';
      }
      // Online tools + syllabus
      if ((data.online_tools && data.online_tools.length > 0) || data.syllabus_url) {
        html += '<div class="course-tools">';
        if (data.online_tools) {
          for (var t = 0; t < data.online_tools.length; t++) {
            var tool = data.online_tools[t];
            html += '<button class="tool-chip" data-lti-path="' + escapeHtml(tool.url) + '">' + escapeHtml(tool.name) + '</button>';
          }
        }
        if (data.syllabus_url) {
          html += '<button class="tool-chip" data-syllabus-url="' + escapeHtml(data.syllabus_url) + '">シラバス</button>';
        }
        html += '</div>';
      }

      // Announcements
      if (data.announcements && data.announcements.length > 0) {
        html += '<div class="course-section"><div class="course-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>お知らせ</div>';
        html += '<div class="content-list">';
        for (var a = 0; a < data.announcements.length; a++) {
          var ann = data.announcements[a];
          html += '<button class="announcement-item" data-ann-id="' + escapeHtml(ann.info_id || '') + '" data-ann-title="' + escapeHtml(ann.title || '') + '">';
          html += '<div class="ann-title-row"><span class="ann-title">' + escapeHtml(ann.title) + '</span>';
          if (ann.is_new) html += '<span class="ann-new-badge">NEW</span>';
          html += '</div>';
          if (ann.start_date) html += '<span class="ann-date">' + escapeHtml(ann.start_date) + '</span>';
          html += '</button>';
        }
        html += '</div></div>';
      }

      // Materials
      if (data.materials && data.materials.length > 0) {
        html += '<div class="course-section"><div class="course-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>教材</div>';
        html += '<div class="content-list">';
        for (var m = 0; m < data.materials.length; m++) {
          var mat = data.materials[m];
          html += '<button class="content-item" data-material-idx="' + m + '">';
          html += '<div class="content-item-main"><span class="content-item-title">' + escapeHtml(mat.title) + '</span>';
          if (mat.status) html += '<span class="content-item-files">' + escapeHtml(mat.status) + '</span>';
          html += '</div>';
          if (mat.period) html += '<span class="content-item-period">' + escapeHtml(mat.period) + '</span>';
          html += '</button>';
        }
        html += '</div></div>';
      }

      // Reports
      if (data.reports && data.reports.length > 0) {
        html += '<div class="course-section"><div class="course-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>課題</div>';
        html += '<div class="content-list" id="reports-list">';
        for (var r = 0; r < data.reports.length; r++) {
          var rep = data.reports[r];
          var statusHighlight = rep.status && rep.status.indexOf('未') >= 0 ? ' highlight' : '';
          html += '<div class="report-wrapper" data-report-idx="' + r + '">';
          html += '<button class="content-item" data-report-toggle="' + r + '">';
          html += '<div class="content-item-main"><span class="content-item-title">' + escapeHtml(rep.title) + '</span>';
          if (rep.status) html += '<span class="content-item-status' + statusHighlight + '">' + escapeHtml(rep.status) + '</span>';
          html += '</div>';
          if (rep.period) html += '<span class="content-item-period">' + escapeHtml(rep.period) + '</span>';
          html += '</button>';
          html += '<div class="expand-actions" style="display:none" id="report-expand-' + r + '">';
          if (rep.url) html += '<button class="action-btn" data-report-detail-url="' + escapeHtml(rep.url) + '" data-report-detail-title="' + escapeHtml(rep.title) + '">詳細を見る</button>';
          html += '<button class="action-btn accent" data-report-submit="' + r + '">ファイルを提出</button>';
          html += '</div>';
          html += '</div>';
        }
        html += '</div></div>';
      }

      // Examinations
      if (data.examinations && data.examinations.length > 0) {
        html += '<div class="course-section"><div class="course-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="16" x2="12" y2="16"/></svg>テスト</div>';
        html += '<div class="content-list">';
        for (var x = 0; x < data.examinations.length; x++) {
          var exam = data.examinations[x];
          var exStatusHighlight = exam.status && exam.status.indexOf('未') >= 0 ? ' highlight' : '';
          html += '<button class="content-item" data-exam-url="' + escapeHtml(exam.url || '') + '" data-exam-title="' + escapeHtml(exam.title) + '">';
          html += '<div class="content-item-main"><span class="content-item-title">' + escapeHtml(exam.title) + '</span>';
          if (exam.status) html += '<span class="content-item-status' + exStatusHighlight + '">' + escapeHtml(exam.status) + '</span>';
          html += '</div>';
          if (exam.period) html += '<span class="content-item-period">' + escapeHtml(exam.period) + '</span>';
          html += '</button>';
        }
        html += '</div></div>';
      }

      // Discussions
      if (data.discussions && data.discussions.length > 0) {
        html += '<div class="course-section"><div class="course-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>掲示板</div>';
        html += '<div class="content-list" id="discussions-list">';
        for (var d = 0; d < data.discussions.length; d++) {
          var disc = data.discussions[d];
          var dStatusHighlight = disc.status && disc.status.indexOf('未') >= 0 ? ' highlight' : '';
          html += '<div class="discussion-wrapper" data-disc-idx="' + d + '">';
          html += '<button class="content-item" data-disc-toggle="' + d + '">';
          html += '<div class="content-item-main"><span class="content-item-title">' + escapeHtml(disc.title) + '</span>';
          if (disc.status) html += '<span class="content-item-status' + dStatusHighlight + '">' + escapeHtml(disc.status) + '</span>';
          html += '</div>';
          if (disc.period) html += '<span class="content-item-period">' + escapeHtml(disc.period) + '</span>';
          html += '</button>';
          html += '<div class="expand-actions" style="display:none" id="disc-expand-' + d + '">';
          html += '<button class="action-btn" data-disc-view="' + d + '">スレッドを見る</button>';
          html += '<div style="display:flex;flex-direction:column;gap:4px;margin-top:4px">';
          html += '<input class="reply-input" type="text" placeholder="タイトル（必須）" maxlength="255" id="disc-title-' + d + '" />';
          html += '<textarea class="reply-input" placeholder="説明" rows="3" id="disc-content-' + d + '"></textarea>';
          html += '<button class="action-btn accent" data-disc-post="' + d + '">スレッド登録</button>';
          html += '</div>';
          html += '</div>';
          html += '</div>';
        }
        html += '</div></div>';
      }

      // Empty state
      if ((!data.materials || data.materials.length === 0) && (!data.reports || data.reports.length === 0) &&
          (!data.examinations || data.examinations.length === 0) && (!data.discussions || data.discussions.length === 0)) {
        html += '<div class="empty">コンテンツがありません</div>';
      }

      // KG course detail collapsible section
      if (kgcPath) {
        html += '<div class="course-section kg-detail-section">';
        html += '<button class="kg-detail-toggle" id="kg-detail-toggle">';
        html += '<span class="kg-detail-toggle-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="16" x2="12" y2="16"/></svg>KG 授業詳細</span>';
        html += '<svg class="kg-chevron" id="kg-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
        html += '</button>';
        html += '<div class="kg-detail-body" id="kg-detail-body" style="display:none">';
        html += '<div class="kg-detail-loading"><div class="spinner" style="width:16px;height:16px;border-width:2px"></div><span>読み込み中...</span></div>';
        html += '</div>';
        html += '</div>';
      }

      content.innerHTML = html;

      // Wire up KG detail toggle
      if (kgcPath) {
        var kgToggle = document.getElementById('kg-detail-toggle');
        var kgBody = document.getElementById('kg-detail-body');
        var kgChevron = document.getElementById('kg-chevron');
        var kgLoaded = false;
        kgToggle.addEventListener('click', async function() {
          var isOpen = kgBody.style.display !== 'none';
          if (isOpen) {
            kgBody.style.display = 'none';
            kgChevron.style.transform = '';
          } else {
            kgBody.style.display = '';
            kgChevron.style.transform = 'rotate(180deg)';
            if (!kgLoaded) {
              kgLoaded = true;
              var inv = window.__TAURI__?.core?.invoke;
              if (inv) {
                try {
                  var detail = await inv('fetch_course_detail', { path: kgcPath });
                  if (detail.fields && detail.fields.length > 0) {
                    var fhtml = '<div class="meta-table">';
                    for (var fi = 0; fi < detail.fields.length; fi++) {
                      fhtml += '<div class="meta-row"><span class="meta-key">' + escapeHtml(detail.fields[fi][0]) + '</span><span class="meta-value">' + linkifyText(detail.fields[fi][1] || '—') + '</span></div>';
                    }
                    fhtml += '</div>';
                    kgBody.innerHTML = fhtml;
                  } else {
                    kgBody.innerHTML = '<div style="color:var(--text-tertiary);font-size:12px;padding:8px 0">詳細情報はありません</div>';
                  }
                } catch (e) {
                  kgBody.innerHTML = '<div style="color:var(--red);font-size:12px;padding:8px 0">' + escapeHtml(String(e)) + '</div>';
                }
              }
            }
          }
        });
      }

      // Wire up event handlers
      var invoke = window.__TAURI__?.core?.invoke;
      if (!invoke) return;

      // LTI tools
      content.querySelectorAll('[data-lti-path]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          invoke('luna_launch_lti', { path: btn.getAttribute('data-lti-path') }).catch(console.error);
        });
      });
      // Syllabus
      content.querySelectorAll('[data-syllabus-url]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          invoke('open_external_url', { url: btn.getAttribute('data-syllabus-url') }).catch(console.error);
        });
      });

      // Announcements
      content.querySelectorAll('.announcement-item').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var infoId = btn.getAttribute('data-ann-id');
          var title = btn.getAttribute('data-ann-title');
          if (!infoId || !idnumber) return;
          invoke('luna_open_detail_window', { path: '', title: title, mode: 'announcement', idnumber: idnumber, infoId: infoId }).catch(console.error);
        });
      });

      // Materials
      content.querySelectorAll('[data-material-idx]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.getAttribute('data-material-idx'));
          var item = data.materials[idx];
          if (!item) return;
          invoke('luna_open_detail_window', {
            path: '',
            title: item.title,
            mode: 'material',
            period: item.period || null,
            status: item.status || null,
            idnumber: idnumber || null,
            infoId: item.files && item.files.length ? JSON.stringify(item.files) : null,
          }).catch(console.error);
        });
      });

      // Report toggles
      var expandedReport = null;
      content.querySelectorAll('[data-report-toggle]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = btn.getAttribute('data-report-toggle');
          var panel = document.getElementById('report-expand-' + idx);
          if (expandedReport === idx) {
            panel.style.display = 'none';
            expandedReport = null;
          } else {
            if (expandedReport !== null) {
              var prev = document.getElementById('report-expand-' + expandedReport);
              if (prev) prev.style.display = 'none';
            }
            panel.style.display = '';
            expandedReport = idx;
          }
        });
      });
      // Report detail buttons
      content.querySelectorAll('[data-report-detail-url]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var url = btn.getAttribute('data-report-detail-url');
          var title = btn.getAttribute('data-report-detail-title');
          invoke('luna_open_detail_window', { path: url, title: title }).catch(console.error);
        });
      });
      // Report submission
      content.querySelectorAll('[data-report-submit]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.getAttribute('data-report-submit'));
          var item = data.reports[idx];
          if (!item || !item.url || !idnumber) return;
          var urlParams = new URLSearchParams(item.url.split('?')[1] || '');
          var reportId = urlParams.get('reportId');
          if (!reportId) return;
          var input = document.createElement('input');
          input.type = 'file';
          input.accept = '.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.zip,.jpg,.jpeg,.png';
          input.onchange = async function() {
            var file = input.files && input.files[0];
            if (!file) return;
            btn.disabled = true;
            btn.textContent = '提出中...';
            try {
              var arrayBuf = await file.arrayBuffer();
              var bytes = new Uint8Array(arrayBuf);
              var binary = '';
              var chunkSize = 8192;
              for (var i = 0; i < bytes.length; i += chunkSize) {
                var chunk = bytes.subarray(i, i + chunkSize);
                for (var j = 0; j < chunk.length; j++) {
                  binary += String.fromCharCode(chunk[j]);
                }
              }
              var base64 = btoa(binary);
              var result = await invoke('luna_submit_report', {
                idnumber: idnumber,
                reportId: reportId,
                fileName: file.name,
                fileBase64: base64,
              });
              alert(result);
              // Refresh course data
              var newData = await invoke('luna_fetch_course_detail', { idnumber: idnumber });
              renderCourseDetail(newData, idnumber);
            } catch (e) {
              alert('提出エラー: ' + String(e));
              btn.disabled = false;
              btn.textContent = 'ファイルを提出';
            }
          };
          input.click();
        });
      });

      // Examination links
      content.querySelectorAll('[data-exam-url]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var url = btn.getAttribute('data-exam-url');
          var title = btn.getAttribute('data-exam-title');
          if (url) invoke('luna_open_detail_window', { path: url, title: title }).catch(console.error);
        });
      });

      // Discussion toggles
      var expandedDisc = null;
      content.querySelectorAll('[data-disc-toggle]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = btn.getAttribute('data-disc-toggle');
          var panel = document.getElementById('disc-expand-' + idx);
          if (expandedDisc === idx) {
            panel.style.display = 'none';
            expandedDisc = null;
          } else {
            if (expandedDisc !== null) {
              var prev = document.getElementById('disc-expand-' + expandedDisc);
              if (prev) prev.style.display = 'none';
            }
            panel.style.display = '';
            expandedDisc = idx;
          }
        });
      });
      // Discussion view threads
      content.querySelectorAll('[data-disc-view]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.getAttribute('data-disc-view'));
          var item = data.discussions[idx];
          if (!item || !item.url) return;
          invoke('luna_open_detail_window', { path: item.url, title: item.title, mode: 'discussion' }).catch(console.error);
        });
      });
      // Discussion post thread
      content.querySelectorAll('[data-disc-post]').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          var idx = parseInt(btn.getAttribute('data-disc-post'));
          var item = data.discussions[idx];
          if (!item || !item.url) return;
          var titleInput = document.getElementById('disc-title-' + idx);
          var contentInput = document.getElementById('disc-content-' + idx);
          if (!titleInput.value.trim()) return;
          btn.disabled = true;
          btn.textContent = '登録中...';
          try {
            var result = await invoke('luna_post_discussion', {
              url: item.url,
              title: titleInput.value.trim(),
              content: contentInput.value.trim(),
            });
            alert(result);
            titleInput.value = '';
            contentInput.value = '';
          } catch (e) {
            alert('投稿エラー: ' + String(e));
          }
          btn.disabled = false;
          btn.textContent = 'スレッド登録';
        });
      });
    }

    async function downloadMaterial(idnumber, file, btn) {
      var invoke = window.__TAURI__?.core?.invoke;
      if (!invoke) return;
      var origHtml = btn.innerHTML;
      btn.innerHTML = '<span>ダウンロード中...</span>';
      btn.disabled = true;
      try {
        var path = await invoke('luna_download_material', {
          idnumber: idnumber,
          fileName: file.file_name,
          objectName: file.object_name,
          resourceId: file.resource_id,
          fileType: file.file_type || '0',
          materialId: file.material_id || null,
          displayName: file.display_name || null,
          endDate: file.end_date || null,
        });
        btn.innerHTML = '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11.5 14.5 16 9.5"/></svg>' + escapeHtml(file.display_name || file.file_name) + '</span>';
        // Open in Finder
        await invoke('luna_reveal_file', { path: path });
      } catch (e) {
        btn.innerHTML = origHtml;
        btn.disabled = false;
        var statusEl = document.querySelector('.status');
        if (!statusEl) {
          statusEl = document.createElement('div');
          statusEl.className = 'status';
          document.getElementById('content').appendChild(statusEl);
        }
        statusEl.textContent = 'ダウンロードエラー: ' + String(e);
        statusEl.style.color = 'var(--red)';
      }
    }

    async function downloadAttachment(url, name) {
      var invoke = window.__TAURI__?.core?.invoke;
      if (!invoke) return;
      try {
        var result = await invoke('luna_download_file', { url: url, filename: name });
        if (result.startsWith('http')) {
          await invoke('open_external_url', { url: result });
        } else {
          await invoke('luna_reveal_file', { path: result });
        }
      } catch (e) {
        var statusEl = document.querySelector('.status');
        if (!statusEl) {
          statusEl = document.createElement('div');
          statusEl.className = 'status';
          document.getElementById('content').appendChild(statusEl);
        }
        statusEl.textContent = 'ダウンロードエラー: ' + String(e);
        statusEl.style.color = 'var(--red)';
      }
    }

    document.addEventListener('DOMContentLoaded', async function() {
      var params = new URLSearchParams(window.location.search);
      var mode = params.get('mode');
      var path = params.get('path');

      // Material info mode (no fetch needed)
      if (mode === 'material') {
        renderMaterialInfo(params);
        return;
      }

      var invoke = window.__TAURI__?.core?.invoke;
      if (!invoke) {
        renderDetail({ error: 'Tauri IPC が利用できません' });
        return;
      }

      // Course detail mode
      if (mode === 'course') {
        var idnumber = params.get('idnumber');
        var kgcPath = params.get('kgcPath') || '';
        if (!idnumber) {
          renderDetail({ error: 'コース番号が指定されていません' });
          return;
        }
        try {
          var courseData = await invoke('luna_fetch_course_detail', { idnumber: idnumber });
          renderCourseDetail(courseData, idnumber, kgcPath);
        } catch (e) {
          renderDetail({ error: String(e) });
        }
        return;
      }

      // Announcement detail mode
      if (mode === 'announcement') {
        var idnumber = params.get('idnumber');
        var infoId = params.get('infoId');
        if (!idnumber || !infoId) {
          renderDetail({ error: 'パラメータが不足しています' });
          return;
        }
        try {
          var detail = await invoke('luna_fetch_announcement_detail', { idnumber: idnumber, infoId: infoId });
          renderDetail(detail);
        } catch (e) {
          renderDetail({ error: String(e) });
        }
        return;
      }

      // Discussion theme list mode (themetop)
      if (mode === 'discussion') {
        if (!path) {
          renderDetail({ error: 'パスが指定されていません' });
          return;
        }
        try {
          var thread = await invoke('luna_fetch_discussion_detail', { url: path });
          renderDiscussion(thread);
        } catch (e) {
          renderDetail({ error: String(e) });
        }
        return;
      }

      // Thread detail mode (view a specific thread + reply)
      if (mode === 'thread') {
        if (!path) {
          renderDetail({ error: 'パスが指定されていません' });
          return;
        }
        try {
          var threadData = await invoke('luna_fetch_thread_posts', { url: path });
          renderThreadDetail(threadData, path);
        } catch (e) {
          renderDetail({ error: String(e) });
        }
        return;
      }

      // Detail fetch mode
      if (!path) {
        renderDetail({ error: 'パスが指定されていません' });
        return;
      }

      try {
        var detail = await invoke('luna_fetch_detail', { path: path });
        renderDetail(detail);
      } catch (e) {
        renderDetail({ error: String(e) });
      }
    });

    // Universal link interceptor: route all <a> clicks through smart browser
    document.addEventListener('click', function(e) {
      var a = e.target.closest ? e.target.closest('a[href]') : null;
      if (!a) return;
      var href = a.getAttribute('href');
      if (!href || href === '#') return;
      e.preventDefault();
      e.stopPropagation();
      // Resolve relative Luna URLs
      if (href.startsWith('/')) {
        href = 'https://luna.kwansei.ac.jp' + href;
      }
      // Only allow http/https
      if (!href.startsWith('http://') && !href.startsWith('https://')) return;
      var inv = window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke;
      if (inv) {
        inv('kwic_open_link', { url: href, title: a.textContent.trim() || href });
      }
    }, true);
  </script>
</body>
</html>
