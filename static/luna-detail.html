<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://ipc.localhost; script-src 'self' 'unsafe-inline' https://ipc.localhost; style-src 'self' 'unsafe-inline'; style-src-attr 'unsafe-inline'; connect-src ipc: http://ipc.localhost https://ipc.localhost; img-src 'self' data: https:">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f7;
    --bg-tertiary: #ededf0;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --border: rgba(0,0,0,0.05);
    --border-strong: rgba(0,0,0,0.10);
    --accent: #007aff;
    --accent-bg: rgba(0,122,255,0.08);
    --red: #ff3b30;
    --red-bg: rgba(255,59,48,0.08);
    --orange: #ff9500;
    --orange-bg: rgba(255,149,0,0.08);
    --green: #34c759;
    --green-bg: rgba(52,199,89,0.08);
    --yellow: #e6b800;
    --yellow-bg: rgba(245,197,66,0.10);
    --purple: #af52de;
    --purple-bg: rgba(175,82,222,0.08);
    --card-bg: #ffffff;
    --card-bg-hover: #ffffff;
    --card-border: rgba(0,0,0,0.03);
    --card-border-hover: rgba(0,0,0,0.08);
    --card-shadow: 0 0.5px 2px rgba(0,0,0,0.04);
    --card-shadow-hover: 0 2px 8px rgba(0,0,0,0.07);
    --card-radius: 16px;
    --inner-radius: 12px;
    color-scheme: light;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg-primary: #000000;
      --bg-secondary: #1c1c1e;
      --bg-tertiary: #2c2c2e;
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --text-tertiary: #7c7c80;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --accent: #0a84ff;
      --accent-bg: rgba(10,132,255,0.15);
      --red: #ff453a;
      --red-bg: rgba(255,69,58,0.15);
      --orange: #ff9f0a;
      --orange-bg: rgba(255,159,10,0.15);
      --green: #30d158;
      --green-bg: rgba(48,209,88,0.15);
      --yellow: #ffd60a;
      --yellow-bg: rgba(255,214,10,0.12);
      --purple: #bf5af2;
      --purple-bg: rgba(191,90,242,0.15);
      --card-bg: #2c2c2e;
      --card-bg-hover: #3a3a3c;
      --card-border: rgba(255,255,255,0.10);
      --card-border-hover: rgba(255,255,255,0.22);
      --card-shadow: none;
      --card-shadow-hover: none;
      color-scheme: dark;
    }
  }
  [data-theme="dark"] {
    --bg-primary: #000000;
    --bg-secondary: #1c1c1e;
    --bg-tertiary: #2c2c2e;
    --text-primary: #f5f5f7;
    --text-secondary: #a1a1a6;
    --text-tertiary: #7c7c80;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --accent: #0a84ff;
    --accent-bg: rgba(10,132,255,0.15);
    --red: #ff453a;
    --red-bg: rgba(255,69,58,0.15);
    --orange: #ff9f0a;
    --orange-bg: rgba(255,159,10,0.15);
    --green: #30d158;
    --green-bg: rgba(48,209,88,0.15);
    --yellow: #ffd60a;
    --yellow-bg: rgba(255,214,10,0.12);
    --purple: #bf5af2;
    --purple-bg: rgba(191,90,242,0.15);
    --card-bg: #2c2c2e;
    --card-bg-hover: #3a3a3c;
    --card-border: rgba(255,255,255,0.10);
    --card-border-hover: rgba(255,255,255,0.22);
    --card-shadow: none;
    --card-shadow-hover: none;
    color-scheme: dark;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  button { -webkit-appearance:none; appearance:none; }
  body {
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
    -webkit-user-select: text;
    user-select: text;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* Window Title Bar */
  .window-titlebar {
    position:sticky; top:0; z-index:200;
    height:32px;
    display:flex; align-items:center; justify-content:flex-end;
    padding:0 14px 0 78px;
    -webkit-app-region:drag;
    background:color-mix(in srgb, var(--bg-primary) 80%, transparent);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:0.5px solid var(--border);
  }
  .window-titlebar .luna-open-btn {
    -webkit-app-region:no-drag;
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:6px;
    font-size:11px; font-weight:500; letter-spacing:0.01em;
    color:var(--text-secondary); background:transparent;
    border:none; cursor:pointer; font-family:inherit;
    transition:background .15s, color .15s;
  }
  .window-titlebar .luna-open-btn:hover {
    background:var(--border); color:var(--text-primary);
  }
  .window-titlebar .luna-open-btn:active {
    background:var(--border-strong);
  }
  .window-titlebar .luna-open-btn svg { opacity:0.55; }

  /* Loading / Error */
  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; color:var(--text-tertiary); gap:12px; }
  .spinner { width:28px; height:28px; border:3px solid var(--border-strong); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error { color:var(--red); text-align:center; padding:40px 24px; font-size:14px; }

  /* Hero Header */
  .hero { padding:14px 24px 20px; background:var(--bg-primary); border-bottom:0.5px solid var(--border); }
  .hero-label { display:inline; font-size:12px; font-weight:500; color:var(--text-tertiary); letter-spacing:0.02em; }
  .hero-title-row { display:flex; align-items:flex-start; gap:10px; margin-bottom:2px; }
  .hero-title { font-size:22px; font-weight:700; line-height:1.25; letter-spacing:-0.02em; flex:1; min-width:0; }
  .hero-info-row { display:flex; align-items:center; flex-wrap:wrap; gap:4px 10px; margin-top:6px; min-width:0; }
  .hero-subtitle { font-size:13px; color:var(--text-secondary); display:inline-flex; align-items:center; gap:6px; flex-shrink:0; }
  .hero-subtitle svg { flex-shrink:0; opacity:0.5; }
  .hero-teachers { flex-shrink:1; min-width:0; }
  .hero-sep { width:1px; height:14px; background:var(--border-strong); flex-shrink:0; opacity:0.7; }
  .hero-ta-tag { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary); flex-shrink:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hero-ta-tag .ta-label { font-weight:600; color:var(--text-tertiary); font-size:10px; letter-spacing:0.03em; flex-shrink:0; }
  .hero-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .hero-badge {
    display:inline-flex; align-items:center; gap:4px;
    padding:6px 12px; border-radius:8px; font-size:11px; font-weight:600;
    cursor:pointer; border:none; font-family:inherit; transition:opacity .15s;
  }
  .hero-badge:hover { opacity:0.8; }
  .hero-badge.zoom { background:#2d8cff; color:#fff; }
  .hero-badge.panopto { background:#00a651; color:#fff; }
  .hero-badge.syllabus { background:#1a3a6c; color:#ffd60a; }
  .hero-badge.syllabus:hover { opacity:0.85; }
  .hero-badge.zoom:hover { opacity:0.85; background:#2d8cff; }
  .hero-badge.panopto:hover { opacity:0.85; background:#00a651; }
  .hero-badge.luna-link { display:none; }
  .hero-badge.ta { display:none; }

  /* Content Sections */
  .sections-scroll { padding:16px 20px; display:flex; flex-direction:column; gap:20px; }
  .sec { display:flex; flex-direction:column; gap:8px; }
  .sec-head { display:flex; align-items:center; gap:6px; padding:0 4px; }
  .sec-label { font-size:14px; font-weight:700; color:var(--text-primary); letter-spacing:-0.01em; }
  .sec-count { font-size:12px; font-weight:600; color:var(--text-tertiary); }
  .sec-badge { margin-left:2px; }
  .sec-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .sec-grid.mat-grid { grid-template-columns:repeat(3,1fr); align-items:stretch; }
  .sec-empty { font-size:12px; color:var(--text-tertiary); padding:8px 4px; }

  /* Item Cards (Bento tiles) */
  .item-card {
    background:var(--card-bg); border-radius:var(--inner-radius); box-shadow:var(--card-shadow);
    padding:12px; cursor:pointer; border:0.5px solid var(--card-border); width:100%; text-align:left; font-family:inherit;
    display:flex; flex-direction:column; gap:4px; height:80px; overflow:hidden;
    transition:box-shadow .15s, border-color .15s, background .15s;
  }
  .item-card:hover { background:var(--card-bg-hover); box-shadow:var(--card-shadow-hover); border-color:var(--card-border-hover); }

  /* List Items (inside cards) */
  .item-row { display:flex; align-items:flex-start; gap:6px; flex-wrap:wrap; }
  .item-title {
    font-size:13px;
    font-weight:500;
    color:var(--text-primary);
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    line-height:1.4;
    word-break:break-word;
    flex:1;
    /* 标准属性 line-clamp 以实现兼容性 */
    display:box;
    box-orient:vertical;
    line-clamp:2;
  }
  .item-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; flex-shrink:0; white-space:nowrap; }
  .item-badge.new { background:var(--red-bg); color:var(--red); }
  .item-badge.pending { background:var(--orange-bg); color:var(--orange); }
  .item-badge.done { background:var(--green-bg); color:var(--green); }
  .item-sub { font-size:11px; color:var(--text-tertiary); margin-top:auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* Material Card - fixed size + file download */
  .mat-card {
    background:var(--card-bg); border-radius:var(--inner-radius); box-shadow:var(--card-shadow);
    padding:10px; cursor:pointer; border:0.5px solid var(--card-border); width:100%; text-align:left; font-family:inherit;
    display:flex; flex-direction:column; gap:3px;
    min-height:70px; overflow:hidden;
    transition:box-shadow .15s, border-color .15s, background .15s;
  }
  .mat-card:hover { background:var(--card-bg-hover); box-shadow:var(--card-shadow-hover); border-color:var(--card-border-hover); }
  .mat-title {
    font-size:12px;
    font-weight:500;
    color:var(--text-primary);
    display:-webkit-box;
    display:box;
    -webkit-line-clamp:2;
    line-clamp:2;
    -webkit-box-orient:vertical;
    box-orient:vertical;
    overflow:hidden;
    line-height:1.3;
    word-break:break-word;
  }
  .mat-time { font-size:10px; color:var(--text-tertiary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mat-desc {
    font-size:11px; color:var(--text-secondary); line-height:1.35;
    display:-webkit-box; line-clamp:2; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; word-break:break-word;
  }
  .mat-files { display:flex; flex-wrap:wrap; gap:3px; margin-top:auto; flex-shrink:0; }
  .mat-file-btn {
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 7px; border-radius:6px; border:none; cursor:pointer;
    background:var(--accent-bg); color:var(--accent);
    font-size:10px; font-weight:500; font-family:inherit; text-align:left;
    transition:background .15s;
    max-width:100%; overflow:hidden;
  }
  .mat-file-btn:hover { background:color-mix(in srgb, var(--accent) 15%, transparent); }
  .mat-file-btn:disabled { opacity:0.5; cursor:default; }
  .mat-file-btn svg { flex-shrink:0; opacity:0.7; }
  .mat-file-btn span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mat-link-btn { color:var(--text-secondary); background:color-mix(in srgb, var(--text-secondary) 8%, transparent); }
  .mat-link-btn:hover { background:color-mix(in srgb, var(--text-secondary) 15%, transparent); }
  .mat-more { font-size:10px; color:var(--text-tertiary); padding:0 2px; }

  /* Task-style Cards (Reports/Exams) - matches LunaTodo layout */
  .task-list { display:flex; flex-direction:column; gap:4px; }
  .task-card {
    display:flex; align-items:center; gap:14px;
    padding:14px; border-radius:12px;
    background:var(--card-bg); border:0.5px solid var(--card-border);
    box-shadow:var(--card-shadow);
    cursor:pointer; font-family:inherit; text-align:left; width:100%;
    transition:border-color .15s, box-shadow .15s, transform .1s;
    position:relative;
  }
  .task-card:hover { background:var(--card-bg-hover); border-color:var(--card-border-hover); box-shadow:var(--card-shadow-hover); }
  .task-card:active { transform:scale(0.99); }

  /* Urgency bar (4px vertical) */
  .urgency-bar {
    flex-shrink:0; width:4px; border-radius:2px;
    background:var(--accent-bg); overflow:hidden; position:relative;
    align-self:stretch; margin:2px 0;
  }
  .urgency-fill {
    position:absolute; bottom:0; left:0; width:100%; border-radius:2px;
    background:var(--accent); transition:height .5s cubic-bezier(.2,.8,.2,1);
  }
  .urgency-bar.done { background:var(--green-bg); }
  .urgency-bar.done .urgency-fill { background:var(--green); }
  .urgency-bar.overdue { background:var(--red-bg); }
  .urgency-bar.overdue .urgency-fill { background:var(--red); }
  .urgency-bar.critical { background:var(--orange-bg); }
  .urgency-bar.critical .urgency-fill { background:var(--orange); animation:bar-pulse 2s ease-in-out infinite; }
  .urgency-bar.soon { background:var(--yellow-bg); }
  .urgency-bar.soon .urgency-fill { background:var(--yellow); }
  @keyframes bar-pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  /* Task body */
  .task-body { flex:1; min-width:0; }
  .task-name {
    font-size:14px; font-weight:600; color:var(--text-primary); line-height:1.35;
    margin-bottom:4px; overflow:hidden; text-overflow:ellipsis;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    display:box; line-clamp:2; box-orient:vertical;
  }
  .task-sub { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-tertiary); flex-wrap:wrap; }
  .task-sep { width:2px; height:2px; border-radius:50%; background:var(--text-tertiary); flex-shrink:0; opacity:0.5; }
  .task-type { white-space:nowrap; }
  .task-date { white-space:nowrap; font-variant-numeric:tabular-nums; }

  /* Remaining label (right side) */
  .remaining {
    flex-shrink:0; font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px;
    background:var(--accent-bg); color:var(--accent); white-space:nowrap; font-variant-numeric:tabular-nums;
  }
  .remaining.done { background:var(--green-bg); color:var(--green); }
  .remaining.overdue { background:var(--red-bg); color:var(--red); }
  .remaining.critical { background:var(--orange-bg); color:var(--orange); }
  .remaining.soon { background:var(--yellow-bg); color:var(--yellow); }

  /* Arrow */
  .task-arrow { flex-shrink:0; color:var(--text-tertiary); opacity:0.5; }

  /* Attendance cards */
  .attendance-list { display:flex; flex-direction:column; gap:6px; }
  .attendance-card {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:12px 14px; border-radius:12px;
    background:var(--card-bg); border:0.5px solid var(--card-border); box-shadow:var(--card-shadow);
  }
  .attendance-main { min-width:0; flex:1; }
  .attendance-title { font-size:13px; font-weight:600; color:var(--text-primary); line-height:1.35; }
  .attendance-date { font-size:11px; color:var(--text-tertiary); margin-top:2px; }
  .attendance-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .attendance-status { font-size:11px; color:var(--text-secondary); }
  .attendance-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; white-space:nowrap; }
  .attendance-badge.present { background:var(--green-bg); color:var(--green); }
  .attendance-badge.absent { background:var(--yellow-bg); color:var(--yellow); }
  .attendance-badge.open { background:var(--accent-bg); color:var(--accent); }
  .attendance-send-btn { padding:6px 10px; border-radius:8px; border:none; cursor:pointer; font-size:11px; font-weight:600; background:var(--accent); color:#fff; }
  .attendance-send-btn:disabled { opacity:0.55; cursor:default; }
  .attendance-open-btn { margin-left:auto; padding:5px 10px; border-radius:8px; border:none; cursor:pointer; font-size:11px; font-weight:600; background:var(--bg-tertiary); color:var(--text-secondary); }
  .attendance-open-btn:hover { background:var(--border-strong); color:var(--text-primary); }

  .btn { padding:8px 14px; border-radius:10px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; text-align:center; transition:opacity .15s,background .15s; }
  .btn:disabled { opacity:0.4; cursor:default; }
  .btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .btn.primary { background:var(--accent); color:#fff; }
  .btn.primary:hover:not(:disabled) { opacity:0.85; }
  .btn.secondary { background:var(--bg-tertiary); color:var(--text-primary); }
  .btn.secondary:hover:not(:disabled) { background:var(--border-strong); }
  .btn.success { background:#4caf50; color:#fff; }
  .text-input { width:100%; padding:8px 12px; border:0.5px solid var(--border-strong); border-radius:10px; background:var(--bg-tertiary); color:var(--text-primary); font-size:13px; font-family:inherit; resize:vertical; }
  .text-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg); }

  /* Report Submit */
  .report-submit-section { padding:0 24px 24px; }
  .report-file-zone { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 16px; border:2px dashed var(--border-strong); border-radius:12px; cursor:pointer; transition:border-color .15s,background .15s; }
  .report-file-zone:hover, .report-file-zone.dragover { border-color:var(--accent); background:var(--accent-bg); }
  .report-file-icon { margin-bottom:8px; opacity:0.5; }
  .report-file-icon svg { width:24px; height:24px; }
  .report-file-label { font-size:14px; font-weight:600; color:var(--text-primary); }
  .report-file-hint { font-size:11px; color:var(--text-secondary); margin-top:4px; }
  .report-file-selected { display:flex; align-items:center; padding:10px 14px; background:var(--bg-tertiary); border-radius:10px; font-size:13px; }
  .report-file-selected span:first-child { font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .report-remove-btn { background:none; border:none; font-size:18px; cursor:pointer; color:var(--text-secondary); padding:0 0 0 8px; line-height:1; }
  .report-remove-btn:hover { color:var(--red, #e53935); }
  .report-progress-bar { height:4px; background:var(--bg-tertiary); border-radius:2px; overflow:hidden; }
  .report-progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s ease; width:0; }
  .report-text-area { margin-bottom:12px; }
  .report-text-label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
  .report-text-area textarea { min-height:120px; }
  .report-divider { display:flex; align-items:center; gap:12px; margin:12px 0; color:var(--text-tertiary); font-size:12px; }
  .report-divider::before, .report-divider::after { content:''; flex:1; height:0.5px; background:var(--border); }

  /* Detail / Generic View */
  .detail-wrap { padding:24px; }
  .detail-wrap .page-title { font-size:20px; font-weight:700; margin-bottom:6px; letter-spacing:-0.01em; }
  .detail-wrap .course-label { font-size:12px; color:var(--text-tertiary); margin-bottom:4px; }
  .meta-table { background:var(--card-bg); border-radius:var(--card-radius); box-shadow:var(--card-shadow); border:0.5px solid var(--card-border); overflow:hidden; margin:14px 0; }
  .meta-row { display:flex; padding:10px 16px; font-size:13px; border-bottom:0.5px solid var(--border); gap:12px; }
  .meta-row:last-child { border-bottom:none; }
  .meta-key { width:120px; flex-shrink:0; color:var(--text-secondary); font-weight:500; }
  .meta-value { flex:1; color:var(--text-primary); word-break:break-word; }
  .meta-row.std-year-row { background:color-mix(in srgb, var(--accent) 5%, transparent); }
  .year-range-badge { display:inline-block; margin-left:8px; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; vertical-align:middle; white-space:nowrap; background:rgba(120,120,128,0.15); color:var(--text-secondary); }

  <div class="window-titlebar" id="titlebar" data-tauri-drag-region></div>

  <script>
    (function() {
      var t = localStorage.getItem('selah-theme');

    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function decodeHtmlEntities(s) {
      var raw = String(s || '');
      if (!raw || raw.indexOf('&') < 0) return raw;
      var t = document.createElement('textarea');

      return t.value;
    }
    function isLunaTransientDetailError(err) {
      var msg = String(err || '');
      return msg.indexOf('読込が一時的に不安定') >= 0
        || msg.indexOf('初回読込が安定していません') >= 0;
    }
    function delay(ms) {
      return new Promise(function(resolve) { setTimeout(resolve, ms); });
    }
    async function invokeLunaDetailWithRetry(command, payload, attempt) {
      var inv = window.__TAURI__?.core?.invoke;
      if (!inv) throw new Error('Tauri IPC が利用できません');
      try {
        return await inv(command, payload);
      } catch (err) {
        if (attempt >= 2 || !isLunaTransientDetailError(err)) throw err;
        await delay(500 * attempt);
        return invokeLunaDetailWithRetry(command, payload, attempt + 1);
      }
    }
    var UNIVERSITY_BASES = {
      luna: 'https://luna.kwansei.ac.jp',
      kwic: 'https://kwic.kwansei.ac.jp',
      kgc: 'https://kg-course.kwansei.ac.jp'
    };
    var AUTO_LINK_RE = /(https?:\/\/[^\s<)\]]+|\/(?:lms|portal|uniasv2)\/[^\s<)\]]+)/g;
    var LINK_MATCH_IGNORED_PARAMS = {
      _cid: true,
      _csrf: true,
      screen: true,
      directLink: true,
      pageViewListNum: true,
      selectCategoryCd: true
    };
    var _linkCacheJson = Object.create(null);
    var _linkSchedulePromise = null;
    var _linkLunaCourseCache = Object.create(null);
    var _linkLunaCourseFetches = Object.create(null);

    function guessBaseOriginForHref(href, currentMode) {
      var raw = decodeHtmlEntities(href).trim();
      if (raw.indexOf('/portal/') === 0) return UNIVERSITY_BASES.kwic;
      if (raw.indexOf('/uniasv2/') === 0) return UNIVERSITY_BASES.kgc;
      if (raw.indexOf('/lms/') === 0) return UNIVERSITY_BASES.luna;
      if (currentMode === 'kwic') return UNIVERSITY_BASES.kwic;
      if (currentMode === 'kgc' || currentMode === 'syllabus') return UNIVERSITY_BASES.kgc;
      return UNIVERSITY_BASES.luna;
    }

    function linkifyEscapedText(escaped) {
      return String(escaped || '').replace(AUTO_LINK_RE, function(raw) {
        var href = escapeHtml(raw);
        return '<a href="' + href + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;word-break:break-all;">' + raw + '</a>';
      });
    }

    function linkifyText(s) {
      return linkifyEscapedText(escapeHtml(s));
    }

    function autoLinkEscaped(escaped) {
      return linkifyEscapedText(escaped);
    }

    function resolveUniversityUrl(href) {
      var raw = decodeHtmlEntities(href).trim();
      if (!raw || raw === '#') return null;
      var mode = new URLSearchParams(window.location.search).get('mode') || '';
      try {
        if (/^https?:\/\//i.test(raw)) return new URL(raw);
        return new URL(raw, guessBaseOriginForHref(raw, mode));
      } catch (e) {
        return null;
      }
    }

    function detectUniversityService(url) {
      if (!url) return '';
      var host = (url.hostname || '').toLowerCase();
      var path = url.pathname || '';
      if (host.indexOf('luna.kwansei.ac.jp') >= 0 || path.indexOf('/lms/') === 0) return 'luna';
      if (host.indexOf('kwic.kwansei.ac.jp') >= 0 || path.indexOf('/portal/') === 0) return 'kwic';
      if (host.indexOf('kg-course.kwansei.ac.jp') >= 0 || path.indexOf('/uniasv2/') === 0) return 'kgc';
      return '';
    }

    function normalizeMatchText(s) {
      return String(s || '')
        .toLowerCase()
        .replace(/[\s\u3000\u00a0]+/g, '')
        .replace(/[|｜:：()（）【】「」『』\[\]<>＜＞・,，.．]/g, '');
    }

    function titlesLooselyMatch(a, b) {
      var na = normalizeMatchText(a);
      var nb = normalizeMatchText(b);
      if (!na || !nb) return false;
      return na === nb || na.indexOf(nb) >= 0 || nb.indexOf(na) >= 0;
    }

    function exactParam(url, key) {
      return (url && url.searchParams && url.searchParams.get(key)) || '';
    }

    function buildUrlMatchKey(input) {
      var url = input instanceof URL ? input : resolveUniversityUrl(input);
      if (!url) return '';
      var params = Array.from(url.searchParams.entries())
        .filter(function(pair) { return !LINK_MATCH_IGNORED_PARAMS[pair[0]]; })
        .sort(function(a, b) {
          return a[0] === b[0]
            ? String(a[1]).localeCompare(String(b[1]))

    // Urgency helpers for task-style cards
    function parseDeadlineFromPeriod(period) {
      // period is like "2026/04/01 00:00 ～ 2026/07/04 23:59" — extract end date only
      if (!period) return 0;
      var parts = period.split(/[~\uff5e]/);

      var end = parts[1].trim();
      if (!end) return 0;
      return new Date(end.replace(/\//g, '-')).getTime() || 0;
    }
    function taskUrgency(period, status) {
      if (status && status.indexOf('\u672a') < 0) return 'done';
      var deadline = parseDeadlineFromPeriod(period);
      if (!deadline) return 'normal';
      var diff = deadline - Date.now();
      if (diff <= 0) return 'overdue';
      if (diff < 86400000) return 'critical';
      if (diff < 4 * 86400000) return 'soon';
      return 'normal';
    }
    function taskUrgencyPct(period, status) {
      if (status && status.indexOf('\u672a') < 0) return 1;

      if (!deadline) return 0;

      if (diff <= 0) return 1;

      if (status && status.indexOf('\u672a') < 0) return status;
      var deadline = parseDeadlineFromPeriod(period);

      if (diff <= 0) {
        var elapsed = -diff;
        if (elapsed < 3600000) return Math.floor(elapsed / 60000) + '\u5206\u8d85\u904e';
        if (elapsed < 86400000) return Math.floor(elapsed / 3600000) + '\u6642\u9593\u8d85\u904e';
        return Math.floor(elapsed / 86400000) + '\u65e5\u8d85\u904e';
      }
      if (diff < 3600000) return '\u6b8b\u308a' + Math.ceil(diff / 60000) + '\u5206';
      if (diff < 86400000) return '\u6b8b\u308a' + Math.floor(diff / 3600000) + '\u6642\u9593';
      return '\u6b8b\u308a' + Math.floor(diff / 86400000) + '\u65e5';

    function renderThreadPosts(container, threadData, threadUrl) {
      if (!container) return;
      var posts = (threadData && threadData.posts) || [];
      if (!posts.length) {
        container.innerHTML = '<div style="text-align:center;padding:12px;color:var(--text-tertiary);font-size:12px">\u307e\u3060\u6295\u7a3f\u304c\u3042\u308a\u307e\u305b\u3093</div>';
        return;
      }
      var h = '<div class="post-list">';
      h += '<div class="post-list-header">\u6295\u7a3f (' + posts.length + ')</div>';
      for (var i = 0; i < posts.length; i++) {
        var p = posts[i];
        var flags = (p.status || '').split(',');
        var isTeacher = flags.indexOf('teacher') >= 0;
        var isSelf = flags.indexOf('self') >= 0;
        h += '<div class="post-bubble" data-post-idx="' + i + '">';
        h += '<div class="post-header">';
        if (isTeacher) h += '<span class="post-badge teacher">\u6559\u54e1</span>';
        if (isSelf) h += '<span class="post-badge self">\u81ea\u5206</span>';
        h += '<span class="post-author">' + escapeHtml(p.author || '') + '</span>';
        h += '<span class="post-date">' + escapeHtml(p.date || '') + '</span>';
        if (threadUrl && p.thread_id) h += '<button class="post-reply-btn" data-post-id="' + escapeHtml(p.thread_id) + '">\u8fd4\u4fe1</button>';
        h += '</div>';
        h += '<div class="post-body">' + renderRichText(p.content || '') + '</div>';
        h += '</div>';
      }
      h += '</div>';
      container.innerHTML = h;
      // Wire per-post reply buttons
      if (threadUrl) {
        container.querySelectorAll('.post-reply-btn').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var bubble = btn.closest('.post-bubble');
            if (bubble.querySelector('.post-reply-form')) return; // already open
            var postId = btn.dataset.postId || '';
            var replyDraftKey = lunaDraftKey(['discussion-reply', threadUrl, postId || 'root']);
            var form = document.createElement('div');
            form.className = 'post-reply-form';
            form.innerHTML = '<textarea rows="2" placeholder="\u8fd4\u4fe1\u5185\u5bb9\u3092\u5165\u529b..."></textarea>'
              + '<div class="post-reply-actions"><button class="post-reply-cancel">\u30ad\u30e3\u30f3\u30bb\u30eb</button><button class="post-reply-send">\u9001\u4fe1</button></div>';
            bubble.appendChild(form);
            var inlineReplyArea = form.querySelector('textarea');
            bindDraftField(inlineReplyArea, replyDraftKey);
            inlineReplyArea.focus();
            form.querySelector('.post-reply-cancel').addEventListener('click', function() { form.remove(); });
            form.querySelector('.post-reply-send').addEventListener('click', async function() {
              var inv = window.__TAURI__?.core?.invoke;
              var txt = inlineReplyArea.value.trim();
              if (!inv || !txt) return;
              var sendBtn = form.querySelector('.post-reply-send');
              sendBtn.disabled = true; sendBtn.textContent = '\u9001\u4fe1\u4e2d...';
              try {
                await inv('luna_reply_discussion', { url: threadUrl, content: txt, parentPostId: postId || null });
                clearDraftValue(replyDraftKey);
                form.innerHTML = '<div style="font-size:12px;color:var(--green,#34c759);padding:4px 0">\u2713 \u8fd4\u4fe1\u3057\u307e\u3057\u305f</div>';
                // Refresh posts
                setTimeout(async function() {
                  try {
                    var refreshed = await inv('luna_fetch_thread_posts', { url: threadUrl });
                    renderThreadPosts(container, refreshed, threadUrl);
                  } catch(e2) {}
                }, 1500);
              } catch(e) {
                alert('\u8fd4\u4fe1\u30a8\u30e9\u30fc: ' + String(e));
                sendBtn.textContent = '\u9001\u4fe1'; sendBtn.disabled = false;
              }
            });
          });
        });
      }
    }

    // Course Detail (Bento Layout)
    function renderSurveyDetail(data) {

      var h = '<div class="detail-wrap">';

      if (data.allow_edit) chips.push(['\u56de\u7b54\u306e\u5909\u66f4', data.allow_edit]);

      }
      if (data.attachments && data.attachments.length) {

        }
        h += '</div>';
      }
      if (data.questions && data.questions.length) {
        h += '<div class="survey-questions">';
        for (var qi = 0; qi < data.questions.length; qi++) {
          var q = data.questions[qi];
          h += '<div class="survey-q-card" data-qi="' + qi + '">';
          h += '<div class="survey-q-header"><span class="survey-q-num">Q' + escapeHtml(q.number) + '</span>';
          if (q.required) h += '<span class="survey-q-req">\u5fc5\u9808</span>';
          h += '</div>';
          h += '<div class="survey-q-body rich-text">' + renderRichText(q.body) + '</div>';
          if (q.options && q.options.length) {
            h += '<div class="survey-q-options">';
            for (var oi = 0; oi < q.options.length; oi++) {
              var opt = q.options[oi];
              var inputType = q.answer_type === 'checkbox' ? 'checkbox' : 'radio';
              if (q.answer_type === 'list') {
                if (oi === 0) h += '<select class="survey-select" name="sq' + qi + '"><option value="">-- \u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044 --</option>';
                h += '<option value="' + escapeHtml(opt.value) + '">' + escapeHtml(opt.label) + '</option>';
                if (oi === q.options.length - 1) h += '</select>';
              } else {
                h += '<label class="survey-opt-label"><input type="' + inputType + '" name="sq' + qi + '" value="' + escapeHtml(opt.value) + '"> ' + escapeHtml(opt.label) + '</label>';
              }
            }
            h += '</div>';
          }
          if (q.answer_type === 'text') {
            h += '<div class="survey-q-options"><textarea class="survey-text-input" rows="3" name="sq' + qi + '" placeholder="\u81ea\u7531\u8a18\u8ff0"></textarea></div>';
          }
          h += '</div>';
        }
        h += '</div>';
        // Submit area
        h += '<div class="survey-submit-area"><div style="text-align:center">';

        h += '<div class="survey-submit-status" id="surveySubmitStatus"></div>';
        h += '</div></div>';

      h += '</div>';

      // Attachment download
      c.querySelectorAll('.survey-att').forEach(function(b) {
        var sa = data.attachments[parseInt(b.dataset.survAttIdx)];
        if (!sa) return;
        var attObj = { url: sa.url || '', name: sa.file_name, object_name: sa.object_name || '', download_action: sa.download_action || '', download_params: sa.download_params || null };
        b.addEventListener('click', function(e) {
          if (e.target && e.target.classList && e.target.classList.contains('att-redownload')) return;
          downloadAttachment(attObj, b);
        });
        checkAndMarkDownloaded(attObj, b);
      });
      var surveyTextDraftKeys = [];
      if (data.questions && data.questions.length) {
        for (var qi = 0; qi < data.questions.length; qi++) {
          if (data.questions[qi].answer_type !== 'text') continue;
          var textInput = c.querySelector('.survey-q-card[data-qi="' + qi + '"] .survey-text-input');
          var textDraftKey = lunaDraftKey(['survey-text', _currentPagePath || window.location.search, qi]);
          bindDraftField(textInput, textDraftKey);
          surveyTextDraftKeys.push(textDraftKey);
        }
      }
      // Submit handler
      var submitBtn = document.getElementById('surveySubmitBtn');
      var statusEl = document.getElementById('surveySubmitStatus');
      if (submitBtn && data.form_fields) {
        submitBtn.addEventListener('click', async function() {
          var inv = window.__TAURI__?.core?.invoke; if (!inv) return;
          // Collect answers
          var answers = {};
          var qLen = data.questions.length;
          var missing = [];
          for (var i = 0; i < qLen; i++) {
            var q = data.questions[i];
            var els = c.querySelectorAll('[name="sq' + i + '"]');
            var val = '';
            if (q.answer_type === 'list') {
              val = els[0] ? els[0].value : '';
            } else if (q.answer_type === 'text') {
              val = els[0] ? els[0].value : '';
            } else {
              els.forEach(function(el) { if (el.checked) val = el.value; });
            }
            answers[String(i)] = val;
            if (q.required && !val) missing.push('Q' + q.number);
          }
          if (missing.length) {
            statusEl.textContent = '\u672a\u56de\u7b54: ' + missing.join(', ');
            statusEl.style.color = 'var(--red)';
            return;
          }
          submitBtn.disabled = true;
          submitBtn.textContent = '\u63d0\u51fa\u4e2d...';
          statusEl.textContent = '';
          statusEl.style.color = '';
          try {
            await inv('luna_submit_survey', { formFields: data.form_fields, answers: answers });
            clearDraftValues(surveyTextDraftKeys);
            submitBtn.textContent = '\u63d0\u51fa\u5b8c\u4e86';
            statusEl.textContent = '\u56de\u7b54\u304c\u63d0\u51fa\u3055\u308c\u307e\u3057\u305f';
            statusEl.style.color = 'var(--green)';
          } catch(e) {
            statusEl.textContent = '\u63d0\u51fa\u30a8\u30e9\u30fc: ' + String(e);
            statusEl.style.color = 'var(--red)';
            submitBtn.disabled = false;
            submitBtn.textContent = '\u518d\u8a66\u884c';
          }
        });
      } else if (submitBtn && !data.form_fields) {
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.4';
        statusEl.textContent = '\u30d5\u30a9\u30fc\u30e0\u60c5\u5831\u3092\u53d6\u5f97\u3067\u304d\u307e\u305b\u3093\u3067\u3057\u305f';
      }
    }

    function normalizeCourseName(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/\s+/g, '')
        .replace(/[　]/g, '')
        .trim();
    }

    function simplifyCourseName(text) {
      return String(text || '')
        .replace(/^.+\s\d{7,8}\s+/, '')
        .replace(/[\[［]\d+[\]］]/g, '')
        .replace(/[（(][^)）]*(?:学期|限|クラス|組|セメスター|Quarter|Semester)[^)）]*[)）]\s*$/i, '')
        .trim();
    }

    function formatLiveNoteDate(rec) {
      var filename = String(rec && rec.filename || '');
      var m = filename.match(/^(\d{4})(\d{2})(\d{2})_/);
      if (m) return m[1] + '/' + m[2] + '/' + m[3];
      var ts = Number(rec && rec.downloaded_at || 0);
      if (!isNaN(ts) && ts > 0) {
        var d = new Date(ts);
        if (!isNaN(d.getTime())) {
          return d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');
        }
      }
      return '日付不明';
    }

    async function loadCourseLiveNotes(courseName) {
      var sec = document.getElementById('live-notes-sec');
      var body = document.getElementById('live-notes-body');
      if (!sec || !body || !courseName) return;
      var invoke = window.__TAURI__?.core?.invoke;
      if (!invoke) return;
      try {
        var records = await invoke('scan_download_dir');
        var target = normalizeCourseName(courseName);
        var targetSimple = normalizeCourseName(simplifyCourseName(courseName));
        var notes = (records || []).filter(function(rec) {
          var rawName = String(rec && rec.course_name || '');
          var name = normalizeCourseName(rawName);
          var nameSimple = normalizeCourseName(simplifyCourseName(rawName));
          var filename = String(rec && rec.filename || '');
          var hay = normalizeCourseName([rawName, filename, rec && rec.path || ''].join(' '));
          if (!(rec && rec.file_exists) || filename.indexOf('_live.md') < 0) return false;
          if (name && (name === target || name === targetSimple || target.indexOf(name) >= 0 || name.indexOf(target) >= 0)) return true;
          if (nameSimple && (nameSimple === target || nameSimple === targetSimple || targetSimple.indexOf(nameSimple) >= 0 || nameSimple.indexOf(targetSimple) >= 0)) return true;
          return (!!target && hay.indexOf(target) >= 0) || (!!targetSimple && hay.indexOf(targetSimple) >= 0);
        });
        if (!notes.length) return;
        var seen = {};
        notes = notes.filter(function(note) {
          var key = String(note && note.path || '');
          if (!key || seen[key]) return false;
          seen[key] = true;
          return true;
        });
        notes.sort(function(a, b) { return Number(b.downloaded_at || 0) - Number(a.downloaded_at || 0); });
        var h = '<div class="sec-grid live-notes-grid">';
        for (var i = 0; i < notes.length; i++) {
          var note = notes[i];
          h += '<button class="item-card live-note-card" data-live-note-path="' + escapeHtml(note.path || '') + '">';
          h += '<span class="live-note-main"><span class="live-note-sub">' + escapeHtml(formatLiveNoteDate(note)) + '</span></span>';
          h += '<span style="flex:none;opacity:0.5">' + ICONS.external + '</span></button>';
        }
        h += '</div>';
        body.innerHTML = h;
        sec.style.display = '';
        body.querySelectorAll('[data-live-note-path]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var path = btn.dataset.liveNotePath;
            if (path) invoke('open_downloaded_file', { path: path });
          });
        });
      } catch (e) {
        console.warn('live notes load failed:', e);
      }
    }

    function parseStandardYearRange(value) {
      // Normalize full-width digits — KGC writes "１年" not "1年".
      var v = (value || '').trim().replace(/[０-９]/g, function(d) {
        return String.fromCharCode(d.charCodeAt(0) - 0xFEE0);
      });
      if (!v) return null;
      if (v.indexOf('全学年') >= 0 || v.indexOf('不問') >= 0) return [1, 99];
      var nums = (v.match(/\d+/g) || []).map(function(n) { return parseInt(n, 10); }).filter(function(n) { return n >= 1 && n <= 10; });
      if (nums.length === 0) return null;
      var min = Math.min.apply(null, nums);
      var max = v.indexOf('以上') >= 0 ? 99 : Math.max.apply(null, nums);
      return [min, max];
    }

        } else if (mode === 'attendance') {
          var aid = params.get('idnumber');
          if (!aid) { renderDetail({ error: '\u30b3\u30fc\u30b9\u756a\u53f7\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          renderAttendanceDetail(await invoke('luna_fetch_course_detail', { idnumber: aid }), aid);
        } else if (mode === 'announcement') {
          var idn2 = params.get('idnumber'), infoId = params.get('infoId');
          if (!idn2 || !infoId) { renderDetail({ error: '\u30d1\u30e9\u30e1\u30fc\u30bf\u304c\u4e0d\u8db3\u3057\u3066\u3044\u307e\u3059' }); return; }
          if (params.get('courseName')) _currentCourseName = params.get('courseName');
          renderDetail(await invokeLunaDetailWithRetry('luna_fetch_announcement_detail', {
            idnumber: idn2,
            infoId: infoId,
            expectedTitle: params.get('title') || ''
          }, 1));
        } else if (mode === 'report') {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          _currentPagePath = path;
          if (params.get('courseName')) _currentCourseName = params.get('courseName');
          var reportData;
          try {
            reportData = await invokeLunaDetailWithRetry('luna_fetch_detail', {
              path: path,
              expectedTitle: params.get('title') || ''
            }, 1);
          } catch(detailErr) {
            if (isLunaTransientDetailError(detailErr)) {
              reportData = {
                title: params.get('title') || '',
                course_name: params.get('courseName') || '',
                sections: [],
                attachments: [],
                meta: []
              };
            } else {
              throw detailErr;
            }
          }
          if (!reportData.title) reportData.title = params.get('title') || '';
          if (!reportData.course_name && params.get('courseName')) reportData.course_name = params.get('courseName');
          if ((!reportData.sections || !reportData.sections.length)
            && (!reportData.meta || !reportData.meta.length)
            && (!reportData.attachments || !reportData.attachments.length)) {
            var reportFallback = await buildReportFallbackData(
              path,
              params.get('title') || reportData.title || '',
              params.get('courseName') || reportData.course_name || ''
            );
            if (reportFallback) {
              reportData = reportFallback;
            }
          }
          if ((!reportData.sections || !reportData.sections.length)
            && (!reportData.meta || !reportData.meta.length)
            && (!reportData.attachments || !reportData.attachments.length)) {
            reportData.meta = [['状態', '課題の詳細本文は取得できませんでしたが、提出フォームは利用できます。']];
          }
          renderDetail(reportData);
          // Detect submission type by fetching the actual submission page
          var repIdnumber = params.get('idnumber'), repReportId = params.get('reportId');
          if (repIdnumber && repReportId) {
            var reportType = 'file';
            try { reportType = await invoke('luna_check_report_type', { idnumber: repIdnumber, reportId: repReportId }); } catch(e) {}
            var allowFile = reportType === 'file' || reportType === 'both';
            var allowText = reportType === 'text' || reportType === 'both';

            var submitWrap = document.createElement('div');
            submitWrap.className = 'report-submit-section';
            var innerHtml = '<div class="report-submit-inner">';

            // Text input area
            if (allowText) {
              innerHtml +=
                '<div class="report-text-area" id="reportTextArea">' +
                '<label class="report-text-label" for="reportTextInput">テキスト入力</label>' +
                '<textarea id="reportTextInput" class="text-input" rows="6" placeholder="ここに提出テキストを入力..."></textarea>' +
                '</div>';
            }

            // File drop zone
            if (allowFile) {
              if (allowText) innerHtml += '<div class="report-divider"><span>または</span></div>';
              innerHtml +=
                '<div class="report-file-zone" id="reportDropZone">' +
                '<div class="report-file-icon">' + ICONS.clip + '</div>' +
                '<div class="report-file-label">ファイルを選択またはドラッグ&ドロップ</div>' +
                '<div class="report-file-hint">PDF, Word, Excel, PPT, 画像, ZIP (最大100MB)</div>' +
                '<input type="file" id="reportFileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.zip,.jpg,.jpeg,.png" style="display:none">' +
                '</div>' +
                '<div id="reportFileInfo" style="display:none">' +
                '<div class="report-file-selected">' +
                '<span id="reportFileName"></span>' +
                '<span id="reportFileSize" style="opacity:0.5;margin-left:8px"></span>' +
                '<button id="reportFileRemove" class="report-remove-btn" title="取消">&times;</button>' +
                '</div>' +
                '</div>';
            }

            innerHtml +=
              '<button id="reportSubmitBtn" class="btn primary" style="width:100%;margin-top:12px" disabled>提出する</button>' +
              '<div id="reportProgress" style="display:none;margin-top:8px">' +
              '<div class="report-progress-bar"><div class="report-progress-fill" id="reportProgressFill"></div></div>' +
              '<div id="reportStatusText" style="font-size:12px;color:var(--text-secondary);margin-top:4px"></div>' +
              '</div>' +
              '</div>';
            submitWrap.innerHTML = innerHtml;
            document.getElementById('content').appendChild(submitWrap);

            var submitBtn2 = document.getElementById('reportSubmitBtn');
            var progressDiv = document.getElementById('reportProgress');
            var progressFill = document.getElementById('reportProgressFill');
            var statusText = document.getElementById('reportStatusText');
            var selectedFile = null;
            var textInput = document.getElementById('reportTextInput');
            var fileInput = allowFile ? document.getElementById('reportFileInput') : null;
            var dropZone = allowFile ? document.getElementById('reportDropZone') : null;
            var fileInfo = allowFile ? document.getElementById('reportFileInfo') : null;
            var fileNameEl = allowFile ? document.getElementById('reportFileName') : null;
            var fileSizeEl = allowFile ? document.getElementById('reportFileSize') : null;
            var removeBtn = allowFile ? document.getElementById('reportFileRemove') : null;
            var reportTextDraftKey = allowText ? lunaDraftKey(['report-text', repIdnumber || '', repReportId || path || _currentPagePath || window.location.search]) : '';

            function formatSize(bytes) {
              if (bytes < 1024) return bytes + 'B';
              if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
              return (bytes/(1024*1024)).toFixed(1) + 'MB';
            }

            function updateSubmitState() {
              var hasText = textInput && textInput.value.trim().length > 0;
              var hasFile = !!selectedFile;
              submitBtn2.disabled = !hasText && !hasFile;
            }

            if (textInput) {
              bindDraftField(textInput, reportTextDraftKey);
              textInput.addEventListener('input', updateSubmitState);
              updateSubmitState();
            }

            if (allowFile) {
              function selectFile(file) {
                if (!file) return;
                if (file.size > 100 * 1024 * 1024) { alert('100MBを超えるファイルは提出できません。'); return; }
                if (file.size <= 0) { alert('ファイルサイズが0バイトです。'); return; }
                selectedFile = file;
                fileNameEl.textContent = file.name;
                fileSizeEl.textContent = formatSize(file.size);
                dropZone.style.display = 'none';
                fileInfo.style.display = '';
                updateSubmitState();
              }

              function clearFile() {
                selectedFile = null;
                fileInput.value = '';
                dropZone.style.display = '';
                fileInfo.style.display = 'none';
                progressDiv.style.display = 'none';
                updateSubmitState();
              }

              dropZone.addEventListener('click', function() { fileInput.click(); });
              fileInput.addEventListener('change', function() { if (fileInput.files[0]) selectFile(fileInput.files[0]); });
              removeBtn.addEventListener('click', clearFile);
              dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
              dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
              dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]); });
            }

            submitBtn2.addEventListener('click', async function() {
              var hasText = textInput && textInput.value.trim().length > 0;
              var hasFile = !!selectedFile;
              if (!hasText && !hasFile) return;
              submitBtn2.disabled = true;
              submitBtn2.textContent = '提出中...';
              progressDiv.style.display = '';

              try {
                if (hasFile) {
                  // File submission
                  statusText.textContent = 'ファイルを読み込み中...';
                  progressFill.style.width = '10%';
                  var buf = await selectedFile.arrayBuffer();
                  var bytes = new Uint8Array(buf);
                  statusText.textContent = 'エンコード中...';
                  progressFill.style.width = '30%';
                  var binary = '';
                  for (var i = 0; i < bytes.length; i += 8192) {
                    var chunk = bytes.subarray(i, i + 8192);
                    for (var j = 0; j < chunk.length; j++) binary += String.fromCharCode(chunk[j]);
                  }
                  statusText.textContent = 'アップロード中...';
                  progressFill.style.width = '50%';
                  var result = await invoke('luna_submit_report', {
                    idnumber: repIdnumber,
                    reportId: repReportId,
                    fileName: selectedFile.name,
                    fileBase64: btoa(binary)
                  });
                  clearDraftValue(reportTextDraftKey);
                  progressFill.style.width = '100%';
                  statusText.textContent = result;
                  submitBtn2.textContent = result;
                  submitBtn2.className = 'btn success';
                } else {
                  // Text submission
                  statusText.textContent = '提出中...';
                  progressFill.style.width = '50%';
                  var result = await invoke('luna_submit_report_text', {
                    idnumber: repIdnumber,
                    reportId: repReportId,
                    submissionText: textInput.value.trim()
                  });
                  clearDraftValue(reportTextDraftKey);
                  progressFill.style.width = '100%';
                  statusText.textContent = result;
                  submitBtn2.textContent = result;
                  submitBtn2.className = 'btn success';
                  if (textInput) textInput.disabled = true;
                }
              } catch(e) {
                progressFill.style.width = '0%';
                statusText.textContent = '提出エラー: ' + String(e);
                statusText.style.color = 'var(--red, #e53935)';
                submitBtn2.disabled = false;
                submitBtn2.textContent = '再試行';
              }
            });
          }
        } else if (mode === 'discussion') {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          renderDiscussion(await invoke('luna_fetch_discussion_detail', { url: path }));
        } else if (mode === 'thread') {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          renderThreadDetail(await invoke('luna_fetch_thread_posts', { url: path }), path);
        } else if (mode === 'survey') {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          _currentPagePath = path;
          if (params.get('courseName')) _currentCourseName = params.get('courseName');
          renderSurveyDetail(await invoke('luna_fetch_survey_detail', { path: path }));
        } else if (mode === 'kwic') {
          var kwicId = params.get('informationId') || '';
          if (!kwicId) { renderDetail({ error: '\u901a\u77e5ID\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          renderKwicDetail(await invoke('kwic_fetch_detail', {
            informationId: kwicId,
            informationType: params.get('informationType') || '',
            personCategoryCd: params.get('personCategoryCd') || '',
            categoryCd: params.get('categoryCd') || '',
          }));
        } else if (mode === 'kgc') {
          var kgcPath = params.get('path') || '';
          var kgcName = params.get('name') || '授業詳細';
          if (!kgcPath) { renderDetail({ error: 'パスが指定されていません' }); return; }
          renderKgcDetail(await invoke('fetch_course_detail', { path: kgcPath }), kgcName);
        } else if (mode === 'syllabus') {
          var wlabel = params.get('wlabel') || '';
          var sylName = params.get('name') || '授業詳細';
          if (!wlabel) { renderDetail({ error: 'ラベルが指定されていません' }); return; }
          // Show a skeleton immediately — the backend creates the window first
          // and fetches KGC data in the background, emitting `syllabus-ready`
          // (or `syllabus-error`) when it's done.
          renderSyllabusLoading(sylName);
          var event = window.__TAURI__?.event;
          if (!event) {
            renderDetail({ error: 'Tauri event API が利用できません' });
            return;
          }
          var settled = false;
          var unlistenReady = await event.listen('syllabus-ready', async function() {
            if (settled) return;
            settled = true;
            try {
              var detail = await invoke('get_syllabus_detail', { label: wlabel });
              renderKgcDetail(detail, sylName);
            } catch (e) {
              renderDetail({ error: '詳細データの取得に失敗: ' + String(e) });
            }
            try { unlistenReady(); } catch {}
            try { unlistenError(); } catch {}
          });
          var unlistenError = await event.listen('syllabus-error', function(ev) {
            if (settled) return;
            settled = true;
            renderDetail({ error: String(ev?.payload || '取得に失敗しました') });
            try { unlistenReady(); } catch {}
            try { unlistenError(); } catch {}
          });
          // Race condition guard: backend might emit before we register the
          // listener. After listening, optimistically poll the store once.
          try {
            var maybeDetail = await invoke('get_syllabus_detail', { label: wlabel });
            if (maybeDetail && !settled) {
              settled = true;
              renderKgcDetail(maybeDetail, sylName);
              try { unlistenReady(); } catch {}
              try { unlistenError(); } catch {}
            }
          } catch (_) { /* not ready yet — wait for the event */ }
        } else {
          if (!path) { renderDetail({ error: '\u30d1\u30b9\u304c\u6307\u5b9a\u3055\u308c\u3066\u3044\u307e\u305b\u3093' }); return; }
          _currentPagePath = path;
          if (params.get('courseName')) _currentCourseName = params.get('courseName');
          renderDetail(await invokeLunaDetailWithRetry('luna_fetch_detail', {
            path: path,
            expectedTitle: params.get('title') || ''
          }, 1));
        }
      } catch(e) { renderDetail({ error: String(e) }); }
    });

    // Universal link interceptor
    document.addEventListener('click', function(e) {
      var a = e.target.closest?.('a[href]'); if (!a) return;
      var href = a.getAttribute('href'); if (!href || href === '#') return;
      e.preventDefault(); e.stopPropagation();
      (async function() {
        var title = a.textContent.trim() || href;
        var target = await resolveUniversityLinkTarget(href, title);
        if (target && await openResolvedUniversityLink(target)) return;
        var fallback = resolveUniversityUrl(href);
        if (!fallback) return;
        var inv = window.__TAURI__?.core?.invoke;
        if (inv) {
          await inv('kwic_open_link', { url: fallback.toString(), title: title || fallback.toString() });
        }
      })().catch(function(err) {
        console.warn('internal link open failed:', err);
      });
    }, true);
  </script>

  <!-- ── Attendance Modal ── -->
  <div id="att-modal" class="att-modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="att-modal-title-txt">
    <div class="att-modal-card">
      <div class="att-modal-header">
        <span class="att-modal-title" id="att-modal-title-txt">出席登録</span>
        <button class="att-modal-close" id="att-modal-close" type="button" aria-label="閉じる">✕</button>
      </div>
      <div id="att-modal-meta" class="att-modal-meta" style="display:none"></div>
      <div class="att-modal-body">
        <div>
          <div class="att-field-label">パスワード <span class="att-required">必須</span></div>
          <input type="text" id="att-pass-input" class="text-input" placeholder="担当教員に確認してください" autocomplete="off" spellcheck="false">
        </div>
        <div>
          <div class="att-field-label">コメント <span class="att-char-count"><span id="att-comment-count">0</span> / 1300</span></div>
          <textarea id="att-comment-input" class="text-input att-comment-textarea" maxlength="1300" placeholder="任意"></textarea>
        </div>
      </div>
      <div class="att-modal-actions">
        <button class="btn secondary" id="att-modal-cancel" type="button">キャンセル</button>
        <button class="btn primary" id="att-modal-submit" type="button">出席登録</button>
      </div>
    </div>
  </div>

  <script>
  // ── Attendance Modal Controller ──
  (function() {
    var modal, closeBtn, metaDiv, passInput, commentInput, commentCount, cancelBtn, submitBtn;
    var _resolveModal = null;
    var _commentDraftKey = '';

    function init() {
      modal       = document.getElementById('att-modal');
      closeBtn    = document.getElementById('att-modal-close');
      metaDiv     = document.getElementById('att-modal-meta');
      passInput   = document.getElementById('att-pass-input');
      commentInput= document.getElementById('att-comment-input');
      commentCount= document.getElementById('att-comment-count');
      cancelBtn   = document.getElementById('att-modal-cancel');
      submitBtn   = document.getElementById('att-modal-submit');

      closeBtn.addEventListener('click', dismiss);
      cancelBtn.addEventListener('click', dismiss);
      modal.addEventListener('click', function(e) { if (e.target === modal) dismiss(); });
      commentInput.addEventListener('input', function() {
        commentCount.textContent = commentInput.value.length;
        writeDraftValue(_commentDraftKey, commentInput.value);
      });
      submitBtn.addEventListener('click', function() {
        var pass = passInput.value.trim();
        if (!pass) { passInput.style.borderColor = 'var(--red)'; passInput.focus(); return; }
        if (_resolveModal) _resolveModal({ pass: pass, comment: commentInput.value });
      });
      passInput.addEventListener('input', function() { passInput.style.borderColor = ''; });
      document.addEventListener('keydown', function(e) {
        if (modal && modal.style.display !== 'none' && e.key === 'Escape') dismiss();
      });
    }

    function dismiss() {
      if (modal) modal.style.display = 'none';
      if (_resolveModal) { var r = _resolveModal; _resolveModal = null; r(null); }
    }

    // Returns Promise<{pass, comment}|null>
    window.openAttendanceModal = async function(att) {
      if (!modal) init();
      passInput.value = ''; passInput.style.borderColor = '';
      _commentDraftKey = attendanceCommentDraftKey(att);
      commentInput.value = readDraftValue(_commentDraftKey);
      commentCount.textContent = String(commentInput.value.length);
      metaDiv.style.display = 'none'; metaDiv.innerHTML = '';
      submitBtn.disabled = false;
      modal.style.display = 'flex';
      passInput.focus();

      // Prefetch time-window info in the background
      var invoke = window.__TAURI__?.core?.invoke;
      if (invoke && att && att.idnumber && att.attendance_id) {
        invoke('luna_prefetch_attendance_form', {
          idnumber: att.idnumber,
          attendanceId: att.attendance_id
        }).then(function(info) {
          if (!info || info.already_registered || modal.style.display === 'none') return;
          var rows = '';
          if (info.open_start || info.open_end) {
            rows += '<div class="att-modal-meta-row">'
              + '<span class="att-modal-meta-label">受付時間</span>'
              + '<span class="att-modal-meta-value">' + escapeHtml(info.open_start || '') + ' ～ ' + escapeHtml(info.open_end || '') + '</span>'
              + '</div>';
          }
          if (info.late_start || info.late_end) {
            rows += '<div class="att-modal-meta-row">'
              + '<span class="att-modal-meta-label">遅刻時間</span>'
              + '<span class="att-modal-meta-value">' + escapeHtml(info.late_start || '') + ' ～ ' + escapeHtml(info.late_end || '') + '</span>'
              + '</div>';
          }
          if (info.content) {
            rows += '<div class="att-modal-meta-row">'
              + '<span class="att-modal-meta-label">内容</span>'
              + '<span class="att-modal-meta-value">' + escapeHtml(info.content) + '</span>'
              + '</div>';
          }
          if (rows) { metaDiv.innerHTML = rows; metaDiv.style.display = 'flex'; }
        }).catch(function() {});
      }

      return new Promise(function(resolve) {
        _resolveModal = function(result) { _resolveModal = null; modal.style.display = 'none'; resolve(result); };
      });
    };
  })();
  </script>
</body>
