<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://ipc.localhost; script-src 'self' 'unsafe-inline' https://ipc.localhost; worker-src 'self'; style-src 'self' 'unsafe-inline'; style-src-attr 'unsafe-inline'; img-src 'self' data: https: file:">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f7;
    --bg-code: #f4f4f6;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #98989d;
    --border: rgba(0, 0, 0, 0.08);
    --accent: #002855;
    --accent-hover: #003d80;
    --blue: #007aff;
    --green: #34c759;
    --orange: #ff9500;
    --red: #ff3b30;
    --md-font-size: 14px;
    --glass-bg: rgba(255, 255, 255, 0.5);
    --glass-border: rgba(255, 255, 255, 0.5);
    --glass-blur: blur(24px);
    --glass-saturate: saturate(180%);
    --shadow-glass: 0 2px 16px rgba(0, 0, 0, 0.05), 0 0 0.5px rgba(0, 0, 0, 0.08);
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg-primary: #1c1c1e;
      --bg-secondary: #2c2c2e;
      --bg-code: #2c2c2e;
      --text-primary: #f5f5f7;
      --text-secondary: #98989d;
      --text-tertiary: #6e6e73;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #4a90d9;
      --accent-hover: #6aa8f0;
      --blue: #0a84ff;
      --green: #30d158;
      --orange: #ff9f0a;
      --red: #ff453a;
      --glass-bg: rgba(44, 44, 46, 0.45);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(40px);
      --glass-saturate: saturate(200%);
      --shadow-glass: 0 2px 16px rgba(0, 0, 0, 0.2), 0 0 0.5px rgba(0, 0, 0, 0.3);
      color-scheme: dark;
    }
  }
  [data-theme="dark"] {
    --bg-primary: #1c1c1e;
    --bg-secondary: #2c2c2e;
    --bg-code: #2c2c2e;
    --text-primary: #f5f5f7;
    --text-secondary: #98989d;
    --text-tertiary: #6e6e73;
    --border: rgba(255, 255, 255, 0.08);
    --accent: #4a90d9;
    --accent-hover: #6aa8f0;
    --blue: #0a84ff;
    --green: #30d158;
    --orange: #ff9f0a;
    --red: #ff453a;
    --glass-bg: rgba(44, 44, 46, 0.45);
    --glass-border: rgba(255, 255, 255, 0.1);
    --glass-blur: blur(24px);
    --glass-saturate: saturate(180%);
    --shadow-glass: 0 2px 16px rgba(0, 0, 0, 0.2), 0 0 0.5px rgba(0, 0, 0, 0.3);
    color-scheme: dark;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Noto Sans JP", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    line-height: 1.65;
    -webkit-user-select: text;
    user-select: text;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg-primary);
    flex-shrink: 0;
    -webkit-user-select: none;
    user-select: none;
    flex-wrap: wrap;
  }
  .tb-spacer { flex: 1; }
  .tb-group {
    display: inline-flex;
    align-items: center;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .tb-group .tb-btn {
    border: none;
    background: none;
    border-radius: 0;
    border-right: 0.5px solid var(--border);
  }
  .tb-group .tb-btn:last-child { border-right: none; }
  .tb-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 4px; padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px; font-weight: 500;
    color: var(--text-secondary); background: var(--bg-secondary);
    border: 1px solid var(--border); cursor: pointer;
    font-family: inherit;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .tb-btn:hover:not(:disabled) { background: var(--border); color: var(--text-primary); }
  .tb-btn:disabled { opacity: 0.4; cursor: default; }
  .tb-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .tb-btn.primary:hover:not(:disabled) { background: var(--accent-hover); color: #fff; }
  .tb-btn.primary:disabled { background: var(--text-tertiary); border-color: var(--text-tertiary); color: #fff; opacity: 0.5; }
  .tb-btn.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .tb-btn .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
    margin-left: 2px;
  }
  .tb-label {
    font-size: 10px;
    color: var(--text-tertiary);
    padding: 0 6px;
    font-variant-numeric: tabular-nums;
    min-width: 32px;
    text-align: center;
  }

  .layout {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  .toc {
    width: 220px;
    flex-shrink: 0;
    border-right: 0.5px solid var(--border);
    background: var(--bg-secondary);
    overflow-y: auto;
    padding: 16px 6px 24px;
  }
  .toc.hidden { display: none; }
  .toc-header {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 10px 10px;
  }
  .toc-empty {
    font-size: 11px;
    color: var(--text-tertiary);
    padding: 8px 10px;
  }
  .toc-item {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: inherit;
    line-height: 1.45;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toc-item:hover { background: var(--bg-primary); color: var(--text-primary); }
  .toc-item.active { background: var(--bg-primary); color: var(--accent); font-weight: 600; }
  .toc-item.lv-2 { padding-left: 22px; }
  .toc-item.lv-3 { padding-left: 34px; font-size: 11.5px; }
  .toc-item.lv-4 { padding-left: 46px; font-size: 11.5px; color: var(--text-tertiary); }
  .toc-item.lv-5 { padding-left: 58px; font-size: 11px; color: var(--text-tertiary); }
  .toc-item.lv-6 { padding-left: 70px; font-size: 11px; color: var(--text-tertiary); }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .doc {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 36px 60px;
    font-size: var(--md-font-size);
  }
  .doc h1, .doc h2, .doc h3, .doc h4, .doc h5, .doc h6 {
    margin: 1.4em 0 0.5em;
    line-height: 1.3;
    font-weight: 700;
    scroll-margin-top: 16px;
  }
  .doc h1 { font-size: 1.7em; padding-bottom: 0.3em; border-bottom: 0.5px solid var(--border); }
  .doc h2 { font-size: 1.35em; padding-bottom: 0.25em; border-bottom: 0.5px solid var(--border); }
  .doc h3 { font-size: 1.15em; }
  .doc h4 { font-size: 1em; }
  .doc h5 { font-size: 0.92em; color: var(--text-secondary); }
  .doc h6 { font-size: 0.85em; color: var(--text-tertiary); }
  .doc p { margin: 0.7em 0; }
  .doc a { color: var(--blue); text-decoration: none; }
  .doc a:hover { text-decoration: underline; }
  .doc ul, .doc ol { padding-left: 1.6em; margin: 0.6em 0; }
  .doc li { margin: 0.2em 0; }
  .doc li > p { margin: 0.2em 0; }
  .doc blockquote {
    border-left: 3px solid var(--border);
    padding: 0.2em 0.9em;
    color: var(--text-secondary);
    margin: 0.8em 0;
  }
  .doc code {
    background: var(--bg-code);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.88em;
  }
  .doc pre {
    background: var(--bg-code);
    padding: 12px 14px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 0.8em 0;
    border: 0.5px solid var(--border);
  }
  .doc pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
    line-height: 1.55;
  }
  .doc table {
    border-collapse: collapse;
    margin: 0.8em 0;
    font-size: 0.92em;
    display: block;
    overflow-x: auto;
    max-width: 100%;
  }
  .doc th, .doc td {
    border: 0.5px solid var(--border);
    padding: 6px 10px;
    text-align: left;
  }
  .doc th { background: var(--bg-secondary); font-weight: 600; }
  .doc hr { border: none; border-top: 0.5px solid var(--border); margin: 1.4em 0; }
  .doc img { max-width: 100%; height: auto; border-radius: 6px; cursor: zoom-in; transition: opacity 0.15s; display: block; margin: 8px auto; }
  .doc img:hover { opacity: 0.88; }
  .doc input[type="checkbox"] { margin-right: 4px; }

  .editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .editor {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: calc(var(--md-font-size) - 1px);
    line-height: 1.6;
    padding: 24px 36px 48px;
    display: block;
    tab-size: 2;
  }

  .hidden { display: none !important; }

  .loading, .error {
    padding: 48px 36px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
  }
  .error { color: var(--red); }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-primary);
    color: var(--bg-primary);
    padding: 8px 16px;
    border-radius: 18px;
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { background: var(--red); color: #fff; }

  /* ── Knowledge whiteboard (replaces ```live-whiteboard fenced blocks) ── */
  .mdr-whiteboard {
    position: relative;
    margin: 14px 0 10px;
    padding: 10px;
    border-radius: 12px;
    border: 0.5px solid color-mix(in srgb, var(--accent) 20%, var(--border));
    background: color-mix(in srgb, var(--bg-primary) 92%, transparent);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
  }
  .mdr-wb-canvas {
    position: relative;
    width: 100%;
    height: 390px;
    border-radius: 8px;
    overflow: hidden;
    background:
      linear-gradient(color-mix(in srgb, var(--text-tertiary) 9%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in srgb, var(--text-tertiary) 9%, transparent) 1px, transparent 1px),
      color-mix(in srgb, var(--bg-secondary) 70%, transparent);
    background-size: 22px 22px;
    cursor: grab;
    touch-action: none;
  }
  .mdr-wb-canvas.dragging { cursor: grabbing; }
  .mdr-wb-stage {
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: 50% 50%;
  }
  .mdr-wb-zoom {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 8;
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 4px;
    border-radius: 14px;
    border: 0.5px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur) var(--glass-saturate);
    -webkit-backdrop-filter: var(--glass-blur) var(--glass-saturate);
    box-shadow: var(--shadow-glass), 0 4px 16px rgba(0, 0, 0, 0.06);
  }
  .mdr-wb-zoom button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 34px;
    height: 30px;
    padding: 0 10px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--text-tertiary);
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .mdr-wb-zoom button:hover {
    background: color-mix(in srgb, var(--text-primary) 8%, transparent);
    color: var(--text-primary);
  }
  .mdr-whiteboard.dense .mdr-wb-canvas { height: 500px; }
  .mdr-whiteboard.very-dense .mdr-wb-canvas { height: 560px; }
  .mdr-wb-links {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    color: color-mix(in srgb, var(--blue) 52%, var(--text-tertiary));
    overflow: visible;
  }
  .mdr-wb-links line,
  .mdr-wb-links path {
    fill: none;
    stroke: var(--edge-color, currentColor);
    stroke-width: 0.75;
    stroke-linecap: round;
    opacity: 0.74;
  }
  .mdr-wb-links path.edge-kind-core {
    --edge-color: color-mix(in srgb, var(--text-tertiary) 76%, var(--text-secondary));
  }
  .mdr-wb-links path.edge-kind-result {
    --edge-color: color-mix(in srgb, var(--green) 62%, var(--text-tertiary));
  }
  .mdr-wb-links path.edge-kind-question {
    --edge-color: color-mix(in srgb, var(--orange) 64%, var(--text-tertiary));
  }
  .mdr-wb-links path.edge-kind-support {
    --edge-color: color-mix(in srgb, var(--text-tertiary) 76%, var(--text-secondary));
  }
  .mdr-wb-links path.edge-source-external {
    stroke-dasharray: 3 2.2;
    opacity: 0.64;
  }
  .mdr-wb-links path.term-edge {
    stroke-width: 0.95;
    opacity: 0.86;
    stroke-dasharray: none;
  }
  .mdr-wb-links path.redundant {
    stroke-dasharray: 1.6 1.4;
    opacity: 0.42;
  }
  /* Click-to-focus: dim everything outside the selected node's neighbourhood. */
  .mdr-wb-canvas.has-selection .mdr-wb-links path,
  .mdr-wb-canvas.has-selection .mdr-wb-edge-label,
  .mdr-wb-canvas.has-selection .mdr-wb-node {
    transition: opacity 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
  }
  .mdr-wb-canvas.has-selection .mdr-wb-links path { opacity: 0.12; }
  .mdr-wb-canvas.has-selection .mdr-wb-links path.is-highlighted { opacity: 0.95; stroke-width: 1.1; }
  .mdr-wb-canvas.has-selection .mdr-wb-edge-label { opacity: 0.14; }
  .mdr-wb-canvas.has-selection .mdr-wb-edge-label.is-highlighted { opacity: 1; }
  .mdr-wb-canvas.has-selection .mdr-wb-node { opacity: 0.24; }
  .mdr-wb-canvas.has-selection .mdr-wb-node.is-highlighted { opacity: 1; }
  .mdr-wb-canvas.has-selection .mdr-wb-node.is-selected {
    opacity: 1;
    box-shadow:
      0 0 0 2px color-mix(in srgb, var(--blue) 65%, transparent),
      0 6px 16px rgba(33, 116, 223, 0.22);
  }
  .mdr-wb-node { cursor: pointer; }
  .mdr-wb-edge-label {
    position: absolute;
    transform: translate(-50%, -50%);
    transform-origin: 50% 50%;
    z-index: 2;
    max-width: 132px;
    padding: 2px 8px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--bg-primary) 96%, transparent);
    border: 0.5px solid var(--edge-label-border, color-mix(in srgb, var(--blue) 24%, transparent));
    color: var(--edge-label-color, color-mix(in srgb, var(--blue) 78%, var(--text-secondary)));
    font-size: 10px;
    font-weight: 800;
    line-height: 1.15;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mdr-wb-edge-label.edge-kind-core {
    --edge-label-border: color-mix(in srgb, var(--text-tertiary) 30%, transparent);
    --edge-label-color: color-mix(in srgb, var(--text-tertiary) 82%, var(--text-secondary));
  }
  .mdr-wb-edge-label.edge-kind-result {
    --edge-label-border: color-mix(in srgb, var(--green) 30%, transparent);
    --edge-label-color: color-mix(in srgb, var(--green) 76%, var(--text-secondary));
  }
  .mdr-wb-edge-label.edge-kind-question {
    --edge-label-border: color-mix(in srgb, var(--orange) 32%, transparent);
    --edge-label-color: color-mix(in srgb, var(--orange) 76%, var(--text-secondary));
  }
  .mdr-wb-edge-label.edge-kind-support {
    --edge-label-border: color-mix(in srgb, var(--text-tertiary) 28%, transparent);
    --edge-label-color: color-mix(in srgb, var(--text-tertiary) 82%, var(--text-secondary));
  }
  .mdr-wb-edge-label.edge-source-external {
    border-style: dashed;
  }
  .mdr-wb-node {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 3;
    width: 124px;
    min-height: 66px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border-radius: 8px;
    border: 0.5px solid color-mix(in srgb, var(--blue) 24%, var(--border));
    background: color-mix(in srgb, var(--bg-primary) 96%, transparent);
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
    text-align: center;
  }
  .mdr-whiteboard.dense .mdr-wb-node {
    width: 106px;
    min-height: 58px;
    padding: 6px 8px;
  }
  .mdr-whiteboard.very-dense .mdr-wb-node {
    width: 94px;
    min-height: 50px;
    padding: 5px 6px;
  }
  .mdr-wb-node.role-main {
    width: 144px;
    min-height: 74px;
    border-width: 1px;
    box-shadow: 0 5px 14px rgba(33, 116, 223, 0.14);
  }
  .mdr-wb-node.role-branch {
    width: 116px;
    min-height: 62px;
    opacity: 0.94;
  }
  .mdr-whiteboard.dense .mdr-wb-node.role-main {
    width: 126px;
    min-height: 66px;
  }
  .mdr-whiteboard.very-dense .mdr-wb-node.role-main {
    width: 110px;
    min-height: 58px;
  }
  .mdr-wb-node.kind-core {
    background: color-mix(in srgb, var(--blue) 14%, var(--bg-primary));
    border-color: color-mix(in srgb, var(--blue) 38%, var(--border));
  }
  .mdr-wb-node.kind-result {
    background: color-mix(in srgb, var(--green) 13%, var(--bg-primary));
    border-color: color-mix(in srgb, var(--green) 34%, var(--border));
  }
  .mdr-wb-node.kind-question {
    background: color-mix(in srgb, var(--orange) 13%, var(--bg-primary));
    border-color: color-mix(in srgb, var(--orange) 32%, var(--border));
  }
  .mdr-wb-node.external {
    border-style: dashed;
    border-color: color-mix(in srgb, var(--accent) 38%, var(--border));
    background:
      linear-gradient(135deg, color-mix(in srgb, var(--accent) 9%, transparent), transparent 52%),
      color-mix(in srgb, var(--bg-primary) 96%, transparent);
  }
  .mdr-wb-source-badge {
    position: absolute;
    top: -7px;
    right: -7px;
    max-width: 44px;
    padding: 1px 6px;
    border-radius: 999px;
    border: 0.5px solid color-mix(in srgb, var(--accent) 36%, var(--border));
    background: color-mix(in srgb, var(--bg-primary) 96%, transparent);
    color: color-mix(in srgb, var(--accent) 82%, var(--text-secondary));
    font-size: 9px;
    font-weight: 800;
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
  }
  .mdr-wb-node-label {
    max-width: 100%;
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 800;
    line-height: 1.25;
    overflow-wrap: anywhere;
  }
  .mdr-whiteboard.dense .mdr-wb-node-label { font-size: 11px; }
  .mdr-whiteboard.very-dense .mdr-wb-node-label { font-size: 10px; }
  .mdr-wb-node-detail {
    max-width: 100%;
    color: var(--text-secondary);
    font-size: 10.5px;
    font-weight: 600;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
    overflow-wrap: anywhere;
  }
  .mdr-whiteboard.dense .mdr-wb-node-detail {
    font-size: 9.5px;
    -webkit-line-clamp: 3;
    line-clamp: 3;
  }
  .mdr-whiteboard.very-dense .mdr-wb-node-detail {
    display: -webkit-box;
    font-size: 9px;
    -webkit-line-clamp: 2;
    line-clamp: 2;
  }
  .mdr-wb-node.node-type-term {
    width: auto;
    min-width: 64px;
    max-width: 96px;
    min-height: 0;
    padding: 5px 8px;
    gap: 0;
    border-radius: 999px;
    opacity: 0.86;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.06);
  }
  .mdr-whiteboard.dense .mdr-wb-node.node-type-term,
  .mdr-whiteboard.very-dense .mdr-wb-node.node-type-term {
    min-width: 54px;
    max-width: 80px;
    padding: 4px 7px;
  }
  .mdr-wb-node.node-type-term .mdr-wb-node-label {
    font-size: 10.5px;
    line-height: 1.18;
  }
  .mdr-wb-node.node-type-term .mdr-wb-node-detail {
    display: none;
  }
  .mdr-wb-node.node-type-term:is(:hover, :focus-visible, .is-selected) {
    max-width: 142px;
    padding: 7px 9px;
    border-radius: 8px;
    opacity: 0.96;
    z-index: 5;
  }
  .mdr-wb-node.node-type-term:is(:hover, :focus-visible, .is-selected) .mdr-wb-node-detail {
    display: -webkit-box;
    margin-top: 3px;
    font-size: 9px;
    -webkit-line-clamp: 3;
    line-clamp: 3;
  }

  @media (max-width: 700px) {
    .mdr-wb-canvas { height: 320px; }
    .mdr-whiteboard.dense .mdr-wb-canvas { height: 400px; }
    .mdr-whiteboard.very-dense .mdr-wb-canvas { height: 460px; }
    .mdr-wb-node { width: 108px; min-height: 58px; }
    .mdr-whiteboard.dense .mdr-wb-node { width: 94px; min-height: 50px; }
  }
</style>
</head>
<body>
<div class="toolbar">
  <button class="tb-btn" id="tocToggleBtn" type="button" title="目次の表示/非表示">目次を表示</button>

  <div class="tb-spacer"></div>

  <div class="tb-group" title="本文の文字サイズを変更">
    <button class="tb-btn" id="fontDownBtn" type="button">文字を縮小</button>
    <span class="tb-label" id="fontLabel">14px</span>
    <button class="tb-btn" id="fontUpBtn" type="button">文字を拡大</button>
  </div>

  <button class="tb-btn" id="editToggleBtn" type="button">編集モード</button>
  <button class="tb-btn primary hidden" id="saveBtn" type="button" disabled>保存<span class="dot hidden" id="dirtyDot"></span></button>
  <button class="tb-btn hidden" id="cancelBtn" type="button">編集を取り消す</button>

  <button class="tb-btn" id="shareBtn" type="button">共有</button>
  <button class="tb-btn" id="revealBtn" type="button">Finderで表示</button>
  <button class="tb-btn" id="externalBtn" type="button">外部アプリで開く</button>
</div>

<div class="layout">
  <aside class="toc hidden" id="toc">
    <div class="toc-header">目次</div>
    <div id="tocList"></div>
  </aside>

  <div class="main">
    <div class="scroll" id="viewScroll">
      <div class="doc" id="doc">
        <div class="loading"><span class="spinner"></span>読み込み中…</div>
      </div>
    </div>
    <div class="editor-wrap hidden" id="editorWrap">
      <textarea class="editor" id="editor" spellcheck="false" placeholder="# 新規 Markdown"></textarea>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="marked.umd.js"></script>
<script src="purify.min.js"></script>
<script src="whiteboard-layout.js"></script>
<script>
(function() {
  try {
    var t = localStorage.getItem('selah-theme');
    if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}

  var tauri = window.__TAURI__ || {};
  var invoke = tauri.core && tauri.core.invoke;
  var listen = tauri.event && tauri.event.listen;

  var currentPath = '';
  var savedMarkdown = '';      // last value known to be on disk
  var editing = false;
  var FONT_KEY = 'selah-md-font-size';
  var TOC_KEY = 'selah-md-toc-open';
  var FONT_STEPS = [12, 13, 14, 15, 16, 18, 20];
  var fontSize = 14;
  var tocVisible = false;
  var tocHeadings = []; // [{ id, level, text, el }]
  var activeTocId = null;
  var lastPayloadKey = '';
  var renderWorker = null;
  var renderWorkerCallbacks = {};
  var renderRequestSeq = 0;
  var activeRenderSeq = 0;

  var $ = function (id) { return document.getElementById(id); };

  // ── Font size ──
  function applyFontSize() {
    document.documentElement.style.setProperty('--md-font-size', fontSize + 'px');
    $('fontLabel').textContent = fontSize + 'px';
    $('fontDownBtn').disabled = fontSize <= FONT_STEPS[0];
    $('fontUpBtn').disabled = fontSize >= FONT_STEPS[FONT_STEPS.length - 1];
  }
  function setFontSize(px) {
    fontSize = px;
    try { localStorage.setItem(FONT_KEY, String(px)); } catch (e) {}
    applyFontSize();
  }
  function bumpFont(delta) {
    var idx = FONT_STEPS.indexOf(fontSize);
    if (idx < 0) idx = FONT_STEPS.indexOf(14);
    var next = Math.max(0, Math.min(FONT_STEPS.length - 1, idx + delta));
    setFontSize(FONT_STEPS[next]);
  }
  try {
    var stored = parseInt(localStorage.getItem(FONT_KEY) || '', 10);
    if (FONT_STEPS.indexOf(stored) !== -1) fontSize = stored;
  } catch (e) {}
  applyFontSize();

  // ── TOC ──
  function setTocVisible(v) {
    tocVisible = !!v && tocHeadings.length > 0;
    $('toc').classList.toggle('hidden', !tocVisible);
    $('tocToggleBtn').classList.toggle('active', tocVisible);
    $('tocToggleBtn').textContent = tocVisible ? '目次を隠す' : '目次を表示';
    try { localStorage.setItem(TOC_KEY, tocVisible ? '1' : '0'); } catch (e) {}
  }
  function updateTocAvailability() {
    var hasHeadings = tocHeadings.length > 0;
    var btn = $('tocToggleBtn');
    btn.disabled = !hasHeadings;
    if (!hasHeadings && tocVisible) setTocVisible(false);
  }
  function slugify(text, used) {
    var base = String(text || '')
      .trim()
      .toLowerCase()
      .replace(/[\s　]+/g, '-')
      .replace(/[^\w\-぀-ヿ一-鿿가-힯]/g, '')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
    if (!base) base = 'section';
    var id = base, n = 1;
    while (used[id]) { id = base + '-' + (++n); }
    used[id] = true;
    return id;
  }
  function buildToc() {
    var headings = $('doc').querySelectorAll('h1, h2, h3, h4, h5, h6');
    var used = Object.create(null);
    tocHeadings = [];
    headings.forEach(function (h) {
      if (!h.id) h.id = slugify(h.textContent, used);
      else used[h.id] = true;
      tocHeadings.push({
        id: h.id,
        level: parseInt(h.tagName.substring(1), 10),
        text: h.textContent || '',
        el: h,
      });
    });
    var list = $('tocList');
    list.innerHTML = '';
    if (tocHeadings.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'toc-empty';
      empty.textContent = '見出しがありません';
      list.appendChild(empty);
    } else {
      // Normalize levels so the shallowest heading becomes lv-1 for visual indent.
      var minLevel = tocHeadings.reduce(function (m, h) { return Math.min(m, h.level); }, 6);
      tocHeadings.forEach(function (h) {
        var btn = document.createElement('button');
        var displayLevel = Math.min(6, h.level - minLevel + 1);
        btn.className = 'toc-item lv-' + displayLevel;
        btn.type = 'button';
        btn.textContent = h.text;
        btn.title = h.text;
        btn.dataset.id = h.id;
        btn.addEventListener('click', function () { scrollToHeading(h.id); });
        list.appendChild(btn);
      });
    }
    updateTocAvailability();
    updateActiveHeading();
  }
  function scrollToHeading(id) {
    var el = document.getElementById(id);
    if (!el) return;
    $('viewScroll').scrollTo({ top: el.offsetTop - 12, behavior: 'smooth' });
  }
  function updateActiveHeading() {
    if (tocHeadings.length === 0) return;
    var scrollEl = $('viewScroll');
    var top = scrollEl.scrollTop + 24;
    var current = tocHeadings[0];
    for (var i = 0; i < tocHeadings.length; i++) {
      if (tocHeadings[i].el.offsetTop <= top) current = tocHeadings[i];
      else break;
    }
    if (current.id === activeTocId) return;
    activeTocId = current.id;
    $('tocList').querySelectorAll('.toc-item').forEach(function (b) {
      b.classList.toggle('active', b.dataset.id === activeTocId);
    });
  }

  // ── Title / dirty state ──
  function setTitleText(filename) {
    document.title = filename || 'Markdown';
  }
  function setDirty(dirty) {
    $('saveBtn').disabled = !dirty;
    $('dirtyDot').classList.toggle('hidden', !dirty);
  }
  function currentEditorIsDirty() {
    return editing && $('editor').value !== savedMarkdown;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
    });
  }

  function renderMarkdownOnMain(markdown) {
    if (window.marked) {
      window.marked.setOptions({ gfm: true, breaks: false });
      return window.marked.parse(markdown);
    }
    return '<pre>' + escapeHtml(markdown) + '</pre>';
  }

  function getRenderWorker() {
    if (!('Worker' in window)) return null;
    if (renderWorker) return renderWorker;
    try {
      renderWorker = new Worker('markdown-render-worker.js');
      renderWorker.onmessage = function (ev) {
        var data = ev.data || {};
        var cb = renderWorkerCallbacks[data.id];
        if (!cb) return;
        delete renderWorkerCallbacks[data.id];
        if (data.error) cb.reject(new Error(data.error));
        else cb.resolve(String(data.html || ''));
      };
      renderWorker.onerror = function (err) {
        var callbacks = renderWorkerCallbacks;
        renderWorkerCallbacks = {};
        renderWorker = null;
        Object.keys(callbacks).forEach(function (key) {
          callbacks[key].reject(err);
        });
      };
      return renderWorker;
    } catch (e) {
      renderWorker = null;
      return null;
    }
  }

  function parseMarkdown(markdown) {
    var worker = getRenderWorker();
    if (!worker) return Promise.resolve(renderMarkdownOnMain(markdown));
    var id = ++renderRequestSeq;
    return new Promise(function (resolve, reject) {
      renderWorkerCallbacks[id] = { resolve: resolve, reject: reject };
      try {
        worker.postMessage({ id: id, markdown: markdown });
      } catch (e) {
        delete renderWorkerCallbacks[id];
        reject(e);
      }
    }).catch(function () {
      return renderMarkdownOnMain(markdown);
    });
  }

  function sanitizeMarkdownHtml(html) {
    if (window.DOMPurify) {
      return window.DOMPurify.sanitize(html, {
        FORBID_TAGS: ['script', 'style', 'iframe', 'object', 'embed', 'form'],
        FORBID_ATTR: ['onerror', 'onload', 'onclick', 'onmouseover', 'onfocus'],
      });
    }
    return html;
  }

  // ── Render markdown ──
  async function render(markdown) {
    var renderSeq = ++activeRenderSeq;
    var html = await parseMarkdown(markdown);
    if (renderSeq !== activeRenderSeq) return false;
    html = sanitizeMarkdownHtml(html);
    var doc = $('doc');
    doc.innerHTML = html;
    $('viewScroll').scrollTop = 0;
    activeTocId = null;

    // Image lightbox — handled by shared lightbox.js via event delegation

    doc.querySelectorAll('a[href]').forEach(function (a) {
      a.addEventListener('click', function (ev) {
        var href = a.getAttribute('href') || '';
        if (href.startsWith('#')) {
          ev.preventDefault();
          scrollToHeading(href.slice(1));
          return;
        }
        ev.preventDefault();
        if (!invoke) return;
        if (/^https?:/i.test(href)) {
          invoke('open_in_system_browser', { url: href }).catch(function (e) {
            console.error('[md-reader] open URL failed:', e);
          });
        }
      });
    });

    renderWhiteboardBlocks(doc);
    buildToc();
    return true;
  }

  // ── Knowledge whiteboard rendering ──
  // Backend emits a `live-whiteboard` fenced code block alongside the bullet
  // list in saved Live notes. The reader swaps that block for an interactive
  // mini-board (matching the Live view), keeping the bullet list as a textual
  // fallback / source-of-truth for raw markdown editors.
  var WB_MAX_NODES = 18;
  var WB_MAX_EDGES = 24;

  function renderWhiteboardBlocks(root) {
    // Pass 1: structured JSON fence (new Live saves embed full board data).
    root
      .querySelectorAll('pre > code.language-live-whiteboard, pre > code[class~="language-live-whiteboard"]')
      .forEach(function (codeEl) {
        var pre = codeEl.parentElement;
        if (!pre) return;
        var data = null;
        try { data = JSON.parse(codeEl.textContent || ''); }
        catch (e) { console.warn('[md-reader] whiteboard JSON parse failed:', e); return; }
        var layout = window.WhiteboardLayout && window.WhiteboardLayout.compute(data, {
          maxNodes: WB_MAX_NODES,
          maxEdges: WB_MAX_EDGES,
          fallbackBoardTitle: '知識整理ボード'
        });
        if (!layout) return;
        var card = buildWhiteboardCard(layout);
        card.dataset.whiteboardSource = 'json';
        pre.replaceWith(card);
      });

    // Pass 2: bullet-list fallback for legacy saves (no JSON fence). Detect any
    // `### 知識整理ボード: …` heading and reconstruct nodes/edges from the
    // following <ul> + optional "関係:" <ul>. Skip if a JSON-sourced card was
    // already inserted into the same section.
    var headingPattern = /^知[识識]整理ボード/;
    root.querySelectorAll('h3').forEach(function (h) {
      if (!headingPattern.test((h.textContent || '').trim())) return;
      // Already rendered by pass 1?
      var probe = h.nextElementSibling;
      while (probe && !/^H[1-6]$/.test(probe.tagName)) {
        if (probe.classList && probe.classList.contains('mdr-whiteboard')) return;
        probe = probe.nextElementSibling;
      }
      var board = parseBoardFromBullets(h);
      if (!board) return;
      var layout = window.WhiteboardLayout && window.WhiteboardLayout.compute(board, {
        maxNodes: WB_MAX_NODES,
        maxEdges: WB_MAX_EDGES,
        fallbackBoardTitle: '知識整理ボード'
      });
      if (!layout) return;
      var card = buildWhiteboardCard(layout);
      card.dataset.whiteboardSource = 'bullets';
      h.parentNode.insertBefore(card, h.nextSibling);
    });
  }

  function parseBoardFromBullets(heading) {
    var title = (heading.textContent || '')
      .replace(/^知[识識]整理ボード[:：]\s*/, '')
      .trim();
    var nodes = [];
    var edges = [];
    var inRelations = false;
    var el = heading.nextElementSibling;
    while (el && !/^H[1-6]$/.test(el.tagName)) {
      if (el.tagName === 'P' && /関係[:：]\s*$/.test((el.textContent || '').trim())) {
        inRelations = true;
      } else if (el.tagName === 'UL') {
        el.querySelectorAll(':scope > li').forEach(function (li) {
          if (!inRelations) {
            var strong = li.querySelector('strong');
            if (!strong) return;
            var label = (strong.textContent || '').trim();
            if (!label) return;
            var full = (li.textContent || '').trim();
            var rest = full.slice(full.indexOf(label) + label.length).replace(/^[:：]\s*/, '');
            var external = false, externalSource = '', sourceExcerpt = '';
            var detail = rest;
            var em = rest.match(/（外部補足(?:[:：]\s*([^）]+))?）/);
            if (em) {
              external = true;
              externalSource = em[1] ? em[1].trim() : '';
              detail = rest.replace(em[0], '').trim();
            } else {
              var lm = rest.match(/（講義内根拠[:：]\s*([^）]+)）/);
              if (lm) {
                sourceExcerpt = lm[1].trim();
                detail = rest.replace(lm[0], '').trim();
              }
            }
            nodes.push({
              id: 'n' + (nodes.length + 1),
              label: label,
              detail: detail,
              kind: 'support',
              source_type: external ? 'external' : 'lecture',
              source_excerpt: sourceExcerpt,
              external_source: externalSource
            });
          } else {
            var text = (li.textContent || '').trim();
            var m = text.match(/^(.+?)\s+(?:→|--([^-]+)-->|-->|→)\s+(.+)$/);
            if (!m) {
              m = text.match(/^(.+?)\s+--(.+?)-->\s+(.+)$/);
            }
            if (!m) return;
            var fromLabel = m[1].trim();
            var edgeLabel = m[2] ? m[2].trim() : '';
            var toLabel = m[3].trim();
            var fromNode = nodes.find(function (n) { return n.label === fromLabel; });
            var toNode = nodes.find(function (n) { return n.label === toLabel; });
            if (fromNode && toNode) {
              edges.push({ from: fromNode.id, to: toNode.id, label: edgeLabel });
            }
          }
        });
      }
      el = el.nextElementSibling;
    }
    if (nodes.length < 2) return null;
    return { title: title || '知識整理ボード', layout: 'grid', nodes: nodes, edges: edges };
  }


  function buildWhiteboardCard(layout) {
    var dense = layout.nodes.length > 8;
    var veryDense = layout.nodes.length > 14;
    var stagePreset = whiteboardStagePreset(layout.nodes.length);
    var card = document.createElement('div');
    card.className = 'mdr-whiteboard';
    if (dense) card.classList.add('dense');
    if (veryDense) card.classList.add('very-dense');

    var canvas = document.createElement('div');
    canvas.className = 'mdr-wb-canvas';
    var stage = document.createElement('div');
    stage.className = 'mdr-wb-stage';
    stage.style.width = stagePreset.width + 'px';
    stage.style.height = stagePreset.height + 'px';

    // Per-card selection state. Click a node to focus it; everything outside
    // its 1-hop neighbourhood dims. Click the empty canvas to clear.
    var selectedNodeId = null;
    var edgePathById = {};
    var edgeLabelById = {};
    var nodeElById = {};
    var edgesById = {};
    layout.edges.forEach(function (e) { edgesById[e.id] = e; });

    function applyHighlight() {
      var hasSel = selectedNodeId != null;
      canvas.classList.toggle('has-selection', hasSel);
      var highlightNodes = {};
      var highlightEdges = {};
      if (hasSel) {
        highlightNodes[selectedNodeId] = true;
        layout.edges.forEach(function (e) {
          if (e.from === selectedNodeId) { highlightNodes[e.to] = true; highlightEdges[e.id] = true; }
          else if (e.to === selectedNodeId) { highlightNodes[e.from] = true; highlightEdges[e.id] = true; }
        });
      }
      Object.keys(edgePathById).forEach(function (id) {
        edgePathById[id].classList.toggle('is-highlighted', !!highlightEdges[id]);
      });
      Object.keys(edgeLabelById).forEach(function (id) {
        edgeLabelById[id].classList.toggle('is-highlighted', !!highlightEdges[id]);
      });
      Object.keys(nodeElById).forEach(function (id) {
        var el = nodeElById[id];
        el.classList.toggle('is-highlighted', !!highlightNodes[id]);
        el.classList.toggle('is-selected', id === selectedNodeId);
      });
    }

    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'mdr-wb-links');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.setAttribute('aria-hidden', 'true');
    layout.edges.forEach(function (e) {
      var path = document.createElementNS(svgNS, 'path');
      var cls = [
        'edge-kind-' + (e.colorKind || 'support'),
        'edge-source-' + (e.colorSourceType || 'lecture')
      ];
      if (e.trunk) cls.push('trunk');
      if (e.redundant) cls.push('redundant');
      if (e.termEdge) cls.push('term-edge');
      path.setAttribute('class', cls.join(' '));
      var cx = (e.cx != null) ? e.cx : (e.x1 + e.x2) / 2;
      var cy = (e.cy != null) ? e.cy : (e.y1 + e.y2) / 2;
      path.setAttribute('d', 'M ' + e.x1 + ' ' + e.y1 + ' Q ' + cx + ' ' + cy + ' ' + e.x2 + ' ' + e.y2);
      svg.appendChild(path);
      edgePathById[e.id] = path;
    });
    stage.appendChild(svg);

    layout.edges.forEach(function (e) {
      if (!e.label) return;
      var lab = document.createElement('span');
      lab.className = 'mdr-wb-edge-label edge-kind-' + (e.colorKind || 'support') + ' edge-source-' + (e.colorSourceType || 'lecture');
      lab.style.left = e.lx + '%';
      lab.style.top = e.ly + '%';
      lab.textContent = e.label;
      stage.appendChild(lab);
      edgeLabelById[e.id] = lab;
    });

    layout.nodes.forEach(function (n) {
      var isExternal = n.sourceType === 'external';
      var node = document.createElement('div');
      node.className = 'mdr-wb-node kind-' + n.kind + ' role-' + n.role + (n.nodeType === 'term' ? ' node-type-term' : '') + (isExternal ? ' external' : '');
      node.style.left = n.x + '%';
      node.style.top = n.y + '%';
      if (isExternal && n.sourceLabel) {
        node.title = '外部出典: ' + n.sourceLabel;
      }
      if (isExternal) {
        var badge = document.createElement('span');
        badge.className = 'mdr-wb-source-badge';
        badge.textContent = '外部';
        node.appendChild(badge);
      }
      var lbl = document.createElement('span');
      lbl.className = 'mdr-wb-node-label';
      lbl.textContent = n.label;
      node.appendChild(lbl);
      if (n.detail) {
        var det = document.createElement('span');
        det.className = 'mdr-wb-node-detail';
        det.textContent = n.detail;
        node.appendChild(det);
      }
      node.addEventListener('click', function (ev) {
        ev.stopPropagation();
        selectedNodeId = (selectedNodeId === n.id) ? null : n.id;
        applyHighlight();
      });
      stage.appendChild(node);
      nodeElById[n.id] = node;
    });

    // Suppress canvas-clear-on-click if the pointer dragged (panning). The
    // viewport handler also tracks drag, but we keep our own threshold so
    // node selection logic is self-contained.
    var dragStartPos = null;
    var wasDragged = false;
    canvas.addEventListener('pointerdown', function (ev) {
      dragStartPos = { x: ev.clientX, y: ev.clientY };
      wasDragged = false;
    }, true);
    canvas.addEventListener('pointermove', function (ev) {
      if (!dragStartPos) return;
      if (Math.abs(ev.clientX - dragStartPos.x) > 4 || Math.abs(ev.clientY - dragStartPos.y) > 4) {
        wasDragged = true;
      }
    }, true);
    canvas.addEventListener('click', function (ev) {
      if (wasDragged) return;
      // Click that bubbled from a node has stopPropagation, so reaching here
      // means an empty-area click.
      if (selectedNodeId != null) {
        selectedNodeId = null;
        applyHighlight();
      }
    });

    canvas.appendChild(stage);
    attachWhiteboardViewport(card, canvas, stage, stagePreset);
    card.appendChild(canvas);
    return card;
  }

  function whiteboardStagePreset(nodeCount) {
    if (nodeCount > 14) return { width: 1360, height: 820, zoom: 0.86 };
    if (nodeCount > 8) return { width: 1220, height: 760, zoom: 0.9 };
    return { width: 1040, height: 660, zoom: 0.96 };
  }

  function attachWhiteboardViewport(card, canvas, stage, preset) {
    var zoom = preset.zoom;
    var panX = 0;
    var panY = 0;
    var drag = null;
    var controls = document.createElement('div');
    controls.className = 'mdr-wb-zoom';
    var outBtn = document.createElement('button');
    var resetBtn = document.createElement('button');
    var inBtn = document.createElement('button');
    outBtn.type = resetBtn.type = inBtn.type = 'button';
    outBtn.textContent = '−';
    inBtn.textContent = '＋';
    outBtn.title = 'Zoom out';
    inBtn.title = 'Zoom in';
    resetBtn.title = 'Reset zoom';
    controls.appendChild(outBtn);
    controls.appendChild(resetBtn);
    controls.appendChild(inBtn);
    card.appendChild(controls);

    function clampZoom(value) {
      return Math.min(2.8, Math.max(0.35, Math.round(value * 100) / 100));
    }
    function render() {
      stage.style.transform = 'translate(-50%, -50%) translate(' + panX + 'px, ' + panY + 'px) scale(' + zoom + ')';
      resetBtn.textContent = Math.round(zoom * 100) + '%';
    }
    function setZoom(value) {
      zoom = clampZoom(value);
      render();
    }
    outBtn.addEventListener('click', function () { setZoom(zoom - 0.15); });
    inBtn.addEventListener('click', function () { setZoom(zoom + 0.15); });
    resetBtn.addEventListener('click', function () {
      zoom = preset.zoom;
      panX = 0;
      panY = 0;
      render();
    });
    canvas.addEventListener('wheel', function (ev) {
      ev.preventDefault();
      setZoom(zoom + (ev.deltaY > 0 ? -0.08 : 0.08));
    }, { passive: false });
    canvas.addEventListener('pointerdown', function (ev) {
      var target = ev.target && ev.target.closest ? ev.target : null;
      if (ev.button !== 0 || (target && target.closest('.mdr-wb-zoom'))) return;
      // Don't start a pan when the user is clicking a node — pointer capture
      // would swallow the click event and break the highlight toggle.
      if (target && target.closest('.mdr-wb-node')) return;
      drag = { x: ev.clientX, y: ev.clientY, panX: panX, panY: panY };
      canvas.classList.add('dragging');
      canvas.setPointerCapture(ev.pointerId);
    });
    canvas.addEventListener('pointermove', function (ev) {
      if (!drag) return;
      panX = drag.panX + ev.clientX - drag.x;
      panY = drag.panY + ev.clientY - drag.y;
      render();
    });
    function endDrag(ev) {
      drag = null;
      canvas.classList.remove('dragging');
      try { canvas.releasePointerCapture(ev.pointerId); } catch (e) {}
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);
    render();
  }

  function renderAfterFirstPaint(markdown, done) {
    $('doc').innerHTML = '<div class="loading"><span class="spinner"></span>レンダリング中…</div>';
    var run = function () {
      render(markdown).then(function (applied) {
        if (applied && done) done();
      }).catch(function (e) {
        showError('Markdownの表示に失敗しました: ' + (e && e.message ? e.message : String(e)));
      });
    };
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(function () { requestAnimationFrame(run); });
    } else {
      setTimeout(run, 0);
    }
  }

  function showError(msg) {
    $('doc').innerHTML = '<div class="error">' + escapeHtml(msg) + '</div>';
    tocHeadings = [];
    $('tocList').innerHTML = '';
    updateTocAvailability();
  }

  // ── Edit mode ──
  function enterEdit() {
    $('editor').value = savedMarkdown;
    setDirty(false);
    editing = true;
    $('viewScroll').classList.add('hidden');
    $('editorWrap').classList.remove('hidden');
    $('editToggleBtn').classList.add('hidden');
    $('saveBtn').classList.remove('hidden');
    $('cancelBtn').classList.remove('hidden');
    setTimeout(function () { $('editor').focus(); }, 0);
  }
  function exitEdit() {
    editing = false;
    $('editorWrap').classList.add('hidden');
    $('viewScroll').classList.remove('hidden');
    $('editToggleBtn').classList.remove('hidden');
    $('saveBtn').classList.add('hidden');
    $('cancelBtn').classList.add('hidden');
    setDirty(false);
  }
  function cancelEdit() {
    if (currentEditorIsDirty()) {
      if (!confirm('編集中の内容は破棄されます。よろしいですか?')) return;
    }
    exitEdit();
  }

  // ── Toast ──
  var toastTimer = null;
  function toast(msg, isError) {
    var el = $('toast');
    el.textContent = msg;
    el.classList.toggle('error', !!isError);
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 1800);
  }

  // ── Save ──
  async function save() {
    if (!invoke || !currentPath) return false;
    var contents = $('editor').value;
    var btn = $('saveBtn');
    btn.disabled = true;
    var dot = $('dirtyDot');
    var label = btn.firstChild;
    var prev = label && label.nodeValue;
    if (label && label.nodeType === 3) label.nodeValue = '保存中…';
    try {
      await invoke('write_markdown_file', { path: currentPath, contents: contents });
      savedMarkdown = contents;
      await render(savedMarkdown);
      setDirty(false);
      toast('保存しました');
      exitEdit();
      return true;
    } catch (e) {
      console.error('[md-reader] save failed:', e);
      toast('保存失敗: ' + (e && e.message ? e.message : String(e)), true);
      setDirty(true);
      return false;
    } finally {
      if (label && label.nodeType === 3) label.nodeValue = prev || '保存';
      btn.disabled = !currentEditorIsDirty();
    }
  }

  async function shareCurrentFile() {
    if (!invoke || !currentPath) return;
    var btn = $('shareBtn');
    var prev = btn.textContent;
    btn.disabled = true;
    btn.textContent = '共有中…';
    try {
      if (currentEditorIsDirty()) {
        var saved = await save();
        if (!saved) return;
      }
      await invoke('share_downloaded_file_native', { path: currentPath });
    } catch (e) {
      console.error('[md-reader] share failed:', e);
      toast('共有失敗: ' + (e && e.message ? e.message : String(e)), true);
    } finally {
      btn.textContent = prev || '共有';
      btn.disabled = !currentPath;
    }
  }

  function applyPayload(payload) {
    if (!payload) return;
    var payloadMarkdown = String(payload.markdown || '');
    var payloadKey = [
      payload.path || '',
      payload.filename || '',
      payload.error || '',
      payloadMarkdown.length,
      payloadMarkdown.slice(0, 96),
      payloadMarkdown.slice(-96)
    ].join('\x1f');
    if (payloadKey === lastPayloadKey) return;
    lastPayloadKey = payloadKey;
    currentPath = payload.path || currentPath;
    setTitleText(payload.filename || '');
    if (payload.error) {
      savedMarkdown = '';
      showError(payload.error);
      $('editToggleBtn').disabled = true;
      $('shareBtn').disabled = true;
      return;
    }
    savedMarkdown = payloadMarkdown;
    $('shareBtn').disabled = !currentPath;
    renderAfterFirstPaint(savedMarkdown, function () {
      if (editing) {
        toast('ファイルが更新されました');
      } else {
        $('editToggleBtn').disabled = false;
      }
      // Restore previously-chosen TOC visibility once headings are available.
      try {
        var pref = localStorage.getItem(TOC_KEY);
        if (pref === '1' && tocHeadings.length > 0 && !tocVisible) setTocVisible(true);
      } catch (e) {}
    });
  }

  // ── Wiring ──
  $('shareBtn').disabled = true;
  $('tocToggleBtn').addEventListener('click', function () { setTocVisible(!tocVisible); });
  $('fontDownBtn').addEventListener('click', function () { bumpFont(-1); });
  $('fontUpBtn').addEventListener('click', function () { bumpFont(1); });
  $('editToggleBtn').addEventListener('click', enterEdit);
  $('cancelBtn').addEventListener('click', cancelEdit);
  $('saveBtn').addEventListener('click', save);
  $('shareBtn').addEventListener('click', shareCurrentFile);
  $('editor').addEventListener('input', function () { setDirty(currentEditorIsDirty()); });
  $('viewScroll').addEventListener('scroll', function () {
    if (!editing && tocVisible) updateActiveHeading();
  });

  document.addEventListener('keydown', function (ev) {
    var mod = ev.metaKey || ev.ctrlKey;
    if (mod && ev.key === 's') {
      ev.preventDefault();
      if (editing && currentEditorIsDirty()) save();
      return;
    }
    if (mod && ev.key === 'e') {
      ev.preventDefault();
      if (editing) cancelEdit(); else enterEdit();
      return;
    }
    if (mod && (ev.key === '+' || ev.key === '=')) { ev.preventDefault(); bumpFont(1); return; }
    if (mod && ev.key === '-') { ev.preventDefault(); bumpFont(-1); return; }
    if (editing && ev.key === 'Escape') { ev.preventDefault(); cancelEdit(); return; }
  });

  window.addEventListener('beforeunload', function (ev) {
    if (currentEditorIsDirty()) {
      ev.preventDefault();
      ev.returnValue = '';
    }
  });

  $('revealBtn').addEventListener('click', function () {
    if (!invoke || !currentPath) return;
    invoke('luna_reveal_file', { path: currentPath }).catch(function (e) {
      console.error('[md-reader] reveal failed:', e);
    });
  });
  $('externalBtn').addEventListener('click', function () {
    if (!invoke || !currentPath) return;
    invoke('open_downloaded_file_external', { path: currentPath }).catch(function (e) {
      console.error('[md-reader] open external failed:', e);
    });
  });

  document.addEventListener('DOMContentLoaded', function () {
    if (listen) {
      listen('markdown-content', function (ev) {
        var p = ev && ev.payload;
        if (!p) return;
        // Tauri may deliver `markdown-content` events to every reader window
        // regardless of the backend's emit_to target, so ignore payloads meant
        // for another file once this window has bound to its own path.
        if (currentPath && p.path && p.path !== currentPath) return;
        applyPayload(p);
      });
    }
    if (invoke) {
      var label = (tauri.window && tauri.window.getCurrentWindow && tauri.window.getCurrentWindow().label) || '';
      // Attempt to fetch the pre-stored payload immediately, then retry a few
      // times with increasing delays to handle slow WebView2 initialisation on
      // Windows where the IPC channel may not be fully ready at DOMContentLoaded.
      var attempts = 0;
      var delays = [0, 300, 700, 1500];
      function tryFetchPayload() {
        invoke('get_pending_markdown_payload', { label: label }).then(function (payload) {
          if (payload) {
            applyPayload(payload);
          } else if (attempts < delays.length - 1) {
            attempts++;
            setTimeout(tryFetchPayload, delays[attempts]);
          }
        }).catch(function () {
          if (attempts < delays.length - 1) {
            attempts++;
            setTimeout(tryFetchPayload, delays[attempts]);
          }
        });
      }
      tryFetchPayload();
    }
  });
})();
</script>
<script src="lightbox.js"></script>
</body>
</html>
