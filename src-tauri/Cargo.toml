[package]
name = "selah-app"
version = "0.1.1"
description = "Selah - 新月の下で、知性を繋ぐ。すべての関学生に。"
authors = ["haru"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.10.3", features = ["tray-icon", "unstable"] }
tauri-plugin-log = "2"
reqwest = { version = "0.12", features = ["cookies", "json", "native-tls", "multipart"] }
tokio = { version = "1", features = ["full"] }
scraper = "0.22"
regex = "1"
base64 = "0.22"
url = "2"
urlencoding = "2.1.3"
dirs = "6"
cookie_store = "0.21"
reqwest_cookie_store = "0.8"
chrono = "0.4"
tauri-plugin-notification = "2.3.3"
